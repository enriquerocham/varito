<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#7A4A00"/>
<title>Varito — Tu dinerito, siempre a la mano</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  /* Varito brand — green/navy */
  --green: #4CAF50;
  --green-light: #E8F5E9;
  --green-mid: #81C784;
  --green-deep: #1B5E20;
  --navy: #1A2340;
  --navy-light: #E8EAF0;
  --navy-mid: #3D4F7C;
  --accent: #2E7D32;
  --sand: #F7F9F7;
  --sand-mid: #E8EDE8;
  --sand-dark: #CDD6CD;
  --ink: #1A2340;
  --ink-mid: #4A5568;
  --ink-soft: #90A4A0;
  --white: #FFFFFF;
  --success: #2E7D32;
  --success-light: #E8F5E9;
  --warn: #F57F17;
  --warn-light: #FFF8E1;
  --danger: #C62828;
  --danger-light: #FFEBEE;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 28px;
  --r-pill: 999px;
  --shadow-sm: 0 1px 4px rgba(26,35,64,0.07);
  --shadow-md: 0 4px 16px rgba(26,35,64,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

#app { display: block; min-height: 100vh; }
.app-shell { display: flex; flex-direction: column; min-height: 100vh; width: 100%; max-width: 430px; margin: 0 auto; background: var(--white); position: relative; }

/* ── Top bar ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 10px; background: var(--white); border-bottom: 0.5px solid var(--sand-mid); position: sticky; top: 0; z-index: 50; }
.top-bar .logo { display: flex; align-items: center; }
.top-bar-actions { display: flex; align-items: center; gap: 10px; }

/* ── Hero card ── */
.hero-card { background: var(--navy); margin: 16px; border-radius: var(--r-xl); padding: 22px 22px 20px; position: relative; overflow: hidden; }
.hero-wave { position: absolute; bottom: -8px; right: -16px; opacity: 0.08; pointer-events: none; }
.hero-label { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.hero-amount { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -1.5px; line-height: 1; }
.hero-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; margin-bottom: 16px; }
.hero-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { padding: 5px 12px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); cursor: pointer; transition: all 0.15s; }
.chip.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 700; }

/* ── Section titles ── */
.section-title { font-size: 13px; font-weight: 600; color: var(--ink); padding: 16px 20px 8px; letter-spacing: 0.2px; display: flex; align-items: center; justify-content: space-between; }
.section-title a { font-size: 11px; color: var(--green); font-weight: 500; text-decoration: none; cursor: pointer; }

/* ── Quick actions ── */
.quick-actions { display: flex; gap: 10px; padding: 0 16px; }
.qa-btn { flex: 1; background: var(--sand); border-radius: var(--r-lg); padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: background 0.15s; border: none; }
.qa-btn:hover { background: var(--green-light); }
.qa-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.qa-icon.rose { background: var(--green-light); color: var(--green-deep); }
.qa-icon.mauve { background: var(--navy-light); color: var(--navy-mid); }
.qa-icon.green { background: var(--success-light); color: var(--success); }
.qa-label { font-size: 11px; color: var(--ink-mid); font-weight: 500; text-align: center; }

/* ── Client list ── */
.client-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.client-row { background: var(--white); border: 0.5px solid var(--sand-mid); border-radius: var(--r-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
.client-row:hover { background: var(--sand); }
.c-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.c-info { flex: 1; min-width: 0; }
.c-name { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.c-detail { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.c-right { text-align: right; flex-shrink: 0; }
.c-amount { font-size: 14px; font-weight: 600; color: var(--ink); }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: var(--r-pill); font-size: 10px; font-weight: 600; margin-top: 3px; }
.badge-ok { background: var(--success-light); color: var(--success); }
.badge-warn { background: var(--warn-light); color: #8B5E1A; }
.badge-late { background: var(--danger-light); color: var(--danger); }
.badge-new { background: var(--green-light); color: var(--green-deep); }

/* ── Avatar colors ── */
.av-rose { background: var(--green-light); color: var(--green-deep); }
.av-mauve { background: var(--navy-light); color: var(--navy-mid); }
.av-amber { background: #FFF8E1; color: #8B5E1A; }
.av-teal { background: #E0F2F1; color: #00695C; }
.av-blue { background: #E3F2FD; color: #1565C0; }

/* ── Bottom nav ── */
.tab-bar { height: 64px; border-top: 0.5px solid var(--sand-mid); display: flex; align-items: center; justify-content: space-around; padding: 0 4px; background: var(--white); position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; z-index: 100; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 18px; border-radius: 12px; cursor: pointer; transition: background 0.15s; flex: 1; border: none; background: transparent; }
.tab:hover { background: var(--sand); }
.tab .tab-icon { font-size: 22px; color: var(--ink-soft); }
.tab .tab-lbl { font-size: 10px; color: var(--ink-soft); font-weight: 400; }
.tab.active .tab-icon { color: var(--green-deep); }
.tab.active .tab-lbl { color: var(--green-deep); font-weight: 600; }

/* ── Scroll area ── */
.scroll-area { flex: 1; overflow-y: visible; overflow-x: hidden; padding-bottom: 80px; }

/* ── Page header ── */
.page-header { background: var(--navy); padding: 52px 20px 20px; position: relative; overflow: hidden; }
.page-header .back-btn { position: absolute; top: 14px; left: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; cursor: pointer; border: none; }
.page-header h1 { font-size: 20px; font-weight: 600; color: #fff; }
.page-header p { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 3px; }

/* ── Stat cards ── */
.stats-row { display: flex; gap: 10px; padding: 14px 16px; background: var(--sand); }
.stat-card { flex: 1; background: var(--white); border-radius: var(--r-md); padding: 12px; border: 0.5px solid var(--sand-mid); text-align: center; }
.stat-val { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.stat-lbl { font-size: 10px; color: var(--ink-soft); }

/* ── Forms ── */
.form-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.5px; text-transform: uppercase; }
.field input, .field select, .field textarea { padding: 11px 14px; border-radius: var(--r-md); border: 1px solid var(--sand-mid); background: var(--sand); font-size: 14px; color: var(--ink); font-family: 'Inter', sans-serif; outline: none; transition: border 0.15s, background 0.15s; -webkit-appearance: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green); background: var(--white); }
.field textarea { resize: none; min-height: 72px; line-height: 1.5; }
.field-hint { font-size: 11px; color: var(--ink-soft); }

/* ── Method chips ── */
.method-row { display: flex; gap: 8px; }
.method-chip { flex: 1; padding: 9px 6px; border-radius: var(--r-md); border: 1px solid var(--sand-mid); text-align: center; font-size: 11px; font-weight: 500; color: var(--ink-mid); cursor: pointer; background: var(--sand); transition: all 0.15s; }
.method-chip.active { background: var(--green-light); border-color: var(--green); color: var(--green-deep); }

/* ── Photo upload ── */
.photo-zone { border: 1.5px dashed var(--green); border-radius: var(--r-lg); padding: 20px; text-align: center; background: var(--green-light); cursor: pointer; transition: background 0.15s; }
.photo-zone:hover { background: #C8E6C9; }
.photo-zone i { font-size: 28px; color: var(--green); margin-bottom: 6px; display: block; }
.photo-zone .pz-label { font-size: 12px; color: var(--green-deep); font-weight: 500; }
.photo-zone .pz-sub { font-size: 10px; color: var(--accent); margin-top: 2px; }
.photo-zone input[type=file] { display: none; }
.photo-preview-box { border-radius: var(--r-lg); overflow: hidden; background: var(--sand-mid); position: relative; }
.photo-preview-box img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
.photo-remove { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(26,35,64,0.6); border: none; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; cursor: pointer; }

/* ── Buttons ── */
.btn { padding: 13px; border-radius: var(--r-lg); font-size: 14px; font-weight: 600; border: none; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; font-family: 'Inter', sans-serif; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--navy); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-success { background: var(--success); color: #fff; }
.btn-mauve { background: var(--navy); color: #fff; }
.btn-secondary { background: var(--sand); border: 1px solid var(--sand-mid); color: var(--ink-mid); }
.btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-light); }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: var(--r-md); width: auto; flex: 1; }
.btn-row { display: flex; gap: 8px; padding: 0 16px 16px; }

/* ── Payment history ── */
.payment-list { padding: 0 16px 16px; }
.pmt-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--sand-mid); }
.pmt-row:last-child { border-bottom: none; }
.pmt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pmt-dot.paid { background: var(--success); }
.pmt-dot.pending { background: var(--ink-soft); }
.pmt-dot.late { background: var(--danger); }
.pmt-info { flex: 1; }
.pmt-date { font-size: 12px; color: var(--ink-mid); }
.pmt-note { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
.pmt-amount { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; }

/* ── Amortization table ── */
.amort-wrap { overflow-x: auto; margin: 0 16px; border-radius: var(--r-md); border: 0.5px solid var(--sand-mid); }
.amort-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.amort-table th { background: var(--navy-light); color: var(--navy); font-weight: 600; padding: 8px 10px; text-align: left; }
.amort-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--sand-mid); color: var(--ink-mid); }
.amort-table tr:last-child td { border-bottom: none; }
.amort-table tr.paid td { color: var(--ink-soft); }
.amort-table tr.paid td:first-child::before { content: "✓ "; color: var(--success); }
.amort-table tr.current td { color: var(--ink); font-weight: 600; background: #F1F8F1; }
.amort-table tr.late td { color: var(--danger); }

/* ── Empty state ── */
.empty-state { padding: 40px 20px; text-align: center; }
.empty-state i { font-size: 40px; color: var(--green-mid); margin-bottom: 12px; display: block; }
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--ink-mid); margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

/* ── Toast ── */
.toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--ink); color: #fff; padding: 12px 18px; border-radius: var(--r-pill); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: toastIn 0.25s ease; white-space: nowrap; pointer-events: all; box-shadow: var(--shadow-md); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(26,35,64,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
.modal-sheet { background: var(--white); border-radius: var(--r-xl) var(--r-xl) 0 0; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; padding-bottom: 32px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--sand-mid); border-radius: 2px; margin: 12px auto 16px; }
.modal-title { font-size: 17px; font-weight: 600; color: var(--ink); padding: 0 20px 16px; }

/* ── FAB ── */
.fab { position: fixed; bottom: 80px; right: 16px; width: 50px; height: 50px; border-radius: 50%; background: var(--green); border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; cursor: pointer; box-shadow: 0 4px 16px rgba(46,125,50,0.4); transition: transform 0.15s; z-index: 99; }
.fab:hover { transform: scale(1.08); }

/* ── Alert pill ── */
.alert-pill { display: flex; align-items: center; gap: 8px; background: var(--warn-light); border-radius: var(--r-md); padding: 10px 14px; font-size: 12px; color: #8B5E1A; }

/* ── Toggle ── */
.toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 0.5px solid var(--sand-mid); }
.toggle-label { font-size: 13px; color: var(--ink-mid); }
.toggle { width: 40px; height: 22px; border-radius: 11px; background: var(--sand-mid); position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0; }
.toggle.on { background: var(--green); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left 0.2s; }
.toggle.on .toggle-thumb { left: 21px; }

/* ── Search ── */
.search-bar { display: flex; align-items: center; gap: 8px; background: var(--sand); border: 0.5px solid var(--sand-mid); border-radius: var(--r-pill); padding: 9px 14px; margin: 10px 16px; }
.search-bar i { font-size: 16px; color: var(--ink-soft); }
.search-bar input { border: none; background: transparent; font-size: 14px; color: var(--ink); outline: none; flex: 1; font-family: 'Inter', sans-serif; }

/* ── Confirm summary ── */
.confirm-card { background: var(--green-light); border-radius: var(--r-lg); padding: 14px 16px; margin: 0 16px; }
.confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid rgba(46,125,50,0.15); }
.confirm-row:last-child { border-bottom: none; }
.confirm-key { font-size: 11px; color: var(--accent); font-weight: 500; }
.confirm-val { font-size: 13px; color: var(--green-deep); font-weight: 600; }

/* ── Info box ── */
.info-box { background: var(--sand); border-radius: var(--r-md); padding: 10px 12px; font-size: 12px; color: var(--ink-mid); line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
.info-box i { color: var(--green); font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* ── Folio pill ── */
.folio-pill { background: var(--sand); border: 0.5px solid var(--sand-mid); border-radius: var(--r-md); padding: 9px 14px; margin: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.folio-key { font-size: 10px; color: var(--ink-soft); }
.folio-val { font-size: 11px; font-weight: 600; color: var(--ink); font-family: monospace; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 2px; }

/* ── Mobile ── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {{
  .tab-bar {{ padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }}
  .fab {{ bottom: calc(80px + env(safe-area-inset-bottom)); }}
}}
@media (min-width: 431px) {{
  .tab-bar {{ left: 50%; transform: translateX(-50%); width: 430px; }}
}}
html {{ scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }}
body {{ -webkit-tap-highlight-color: transparent; }}

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .tab-bar { padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }
    .fab { bottom: calc(80px + env(safe-area-inset-bottom)); }
  }
  @media (min-width: 431px) {
    .tab-bar { left: 50%; transform: translateX(-50%); width: 430px; }
  }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="app"></div>
<script>const ACREEDORA = 'Yaretzi Dalet Gutiérrez Castañeda';
const APP_NAME = 'Varito';
const INTERES_DEFAULT = 30;
const PENALIZACION_DIARIA = 10;

// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCDYns_aIfO87mtln-ORna-9sL_7Xm1IBk",
  authDomain: "varito-46d22.firebaseapp.com",
  projectId: "varito-46d22",
  storageBucket: "varito-46d22.firebasestorage.app",
  messagingSenderId: "228917831433",
  appId: "1:228917831433:web:8487695ba7d8c44d5e95d8"
};

// Load Firebase from CDN (loaded in HTML before this script)
let db = null;
let fbReady = false;
const fbCallbacks = [];

function onFbReady(fn) {
  if (fbReady) fn();
  else fbCallbacks.push(fn);
}

function initFirebase() {
  try {
    const app = firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    fbReady = true;
    fbCallbacks.forEach(fn => fn());
    console.log('Firebase conectado');
  } catch (e) {
    console.error('Firebase error:', e);
  }
}

// ── Store ─────────────────────────────────────────────────
const Store = (() => {
  // In-memory cache
  let state = { clientes: [], prestamos: [], pagos: [] };
  let loaded = false;
  const listeners = [];

  const notify = () => listeners.forEach(fn => fn());

  const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

  // ── Load all data from Firestore ──
  const loadAll = async () => {
    if (!db) return;
    try {
      const [cSnap, pSnap, pgSnap] = await Promise.all([
        db.collection('clientes').orderBy('createdAt', 'desc').get(),
        db.collection('prestamos').get(),
        db.collection('pagos').get(),
      ]);
      state.clientes  = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.prestamos = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.pagos     = pgSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      loaded = true;
      notify();
    } catch (e) {
      console.error('Error cargando datos:', e);
    }
  };

  // ── Subscribe to real-time updates ──
  const subscribeAll = () => {
    if (!db) return;
    db.collection('clientes').orderBy('createdAt','desc').onSnapshot(snap => {
      state.clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
    db.collection('prestamos').onSnapshot(snap => {
      state.prestamos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
    db.collection('pagos').onSnapshot(snap => {
      state.pagos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
  };

  return {
    ACREEDORA, APP_NAME, INTERES_DEFAULT, PENALIZACION_DIARIA,

    // Subscribe to state changes (re-render trigger)
    subscribe: (fn) => { listeners.push(fn); },

    isLoaded: () => loaded,

    init: () => {
      onFbReady(() => {
        subscribeAll();
        loadAll();
      });
    },

    getClientes:  () => [...state.clientes],
    getPrestamos: () => [...state.prestamos],
    getPagos:     () => [...state.pagos],

    getCliente:   (id) => state.clientes.find(c => c.id === id),
    getPrestamo:  (id) => state.prestamos.find(p => p.id === id),

    getPagosByPrestamo: (pid) =>
      state.pagos.filter(p => p.prestamoId === pid)
        .sort((a, b) => new Date(a.fecha) - new Date(b.fecha)),

    getPrestamosByCliente: (cid) =>
      state.prestamos.filter(p => p.clienteId === cid),

    getDomicilioCompleto: (c) =>
      [c.calle, c.numExt ? `#${c.numExt}` : '', c.numInt ? `Int. ${c.numInt}` : '',
       c.colonia, c.cp, c.ciudad].filter(Boolean).join(', '),

    // ── CRUD ──
    addCliente: async (data) => {
      const doc = { ...data, createdAt: new Date().toISOString().split('T')[0] };
      const ref = await db.collection('clientes').add(doc);
      return { id: ref.id, ...doc };
    },

    updateCliente: async (id, data) => {
      await db.collection('clientes').doc(id).update(data);
    },

    deleteCliente: async (id) => {
      const batch = db.batch();
      const ps = state.prestamos.filter(p => p.clienteId === id);
      for (const p of ps) {
        const pgs = state.pagos.filter(pg => pg.prestamoId === p.id);
        pgs.forEach(pg => batch.delete(db.collection('pagos').doc(pg.id)));
        batch.delete(db.collection('prestamos').doc(p.id));
      }
      batch.delete(db.collection('clientes').doc(id));
      await batch.commit();
    },

    addPrestamo: async (data) => {
      const folioNum = state.prestamos.length > 0
        ? Math.max(...state.prestamos.map(p => p.folioNum || 0)) + 1 : 1;
      const doc = { ...data, estado: 'activo', folioNum };
      const ref = await db.collection('prestamos').add(doc);
      return { id: ref.id, ...doc };
    },

    addPago: async (data) => {
      const ref = await db.collection('pagos').add(data);
      const prestamo = state.prestamos.find(p => p.id === data.prestamoId);
      if (prestamo) {
        const count = state.pagos.filter(p => p.prestamoId === data.prestamoId).length + 1;
        if (count >= prestamo.plazo) {
          await db.collection('prestamos').doc(data.prestamoId).update({ estado: 'liquidado' });
        }
      }
      return { id: ref.id, ...data };
    },

    getSaldoRestante: (prestamoId) => {
      const p = state.prestamos.find(pr => pr.id === prestamoId);
      if (!p) return 0;
      const pagado = state.pagos
        .filter(pg => pg.prestamoId === prestamoId)
        .reduce((s, pg) => s + pg.monto, 0);
      return Math.max(0, p.totalConInteres - pagado);
    },

    getPagosCount: (prestamoId) =>
      state.pagos.filter(pg => pg.prestamoId === prestamoId).length,

    getPenalizacion: (prestamo, cuota) => {
      if (cuota.estado !== 'vencido') return 0;
      const dias = Fmt.daysLate(cuota.fecha);
      return Math.round(prestamo.monto * (PENALIZACION_DIARIA / 100) * dias * 100) / 100;
    },

    getStats: () => {
      const activos = state.prestamos.filter(p => p.estado === 'activo');
      const cartera = activos.reduce((s, p) => {
        const pagado = state.pagos
          .filter(pg => pg.prestamoId === p.id)
          .reduce((a, pg) => a + pg.monto, 0);
        return s + Math.max(0, p.totalConInteres - pagado);
      }, 0);
      const hoy = new Date().toISOString().split('T')[0];
      const pagosHoy = state.pagos
        .filter(pg => pg.fecha === hoy)
        .reduce((s, pg) => s + pg.monto, 0);
      return {
        cartera,
        activos: activos.length,
        pagosHoy,
        liquidados: state.prestamos.filter(p => p.estado === 'liquidado').length
      };
    },

    getTableraAmortizacion: (prestamo) => {
      const cuotas = [];
      let saldo = prestamo.totalConInteres;
      const freq = { semanal: 7, quincenal: 15, mensual: 30 }[prestamo.frecuencia] || 15;
      const pagosHechos = state.pagos.filter(pg => pg.prestamoId === prestamo.id);
      const hoy = new Date().toISOString().split('T')[0];
      for (let i = 1; i <= prestamo.plazo; i++) {
        const fecha = new Date(prestamo.fechaInicio + 'T00:00:00');
        fecha.setDate(fecha.getDate() + freq * i);
        const fechaStr = fecha.toISOString().split('T')[0];
        const pagoHecho = pagosHechos.find(pg => pg.numCuota === i);
        saldo = Math.max(0, Math.round((saldo - prestamo.pagoCuota) * 100) / 100);
        let estado = 'pendiente';
        if (pagoHecho) estado = 'pagado';
        else if (fechaStr < hoy) estado = 'vencido';
        else if (fechaStr === hoy) estado = 'hoy';
        cuotas.push({ num: i, fecha: fechaStr, monto: prestamo.pagoCuota, saldoRestante: saldo, estado, pagoHecho });
      }
      return cuotas;
    },

    calcPrestamo: (monto, interesPct, plazo) => {
      const total = Math.round(monto * (1 + interesPct / 100) * 100) / 100;
      const cuota = Math.round((total / plazo) * 100) / 100;
      return { total, cuota };
    },
  };
})();
</script><script>const Fmt = {
  currency: (n) => '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
  date: (str) => {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  },
  dateShort: (str) => {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    return `${d}/${m}/${y.slice(2)}`;
  },
  initials: (nombre) => nombre.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(),
  avatarColor: (nombre) => {
    const colors = ['av-rose','av-mauve','av-amber','av-teal','av-blue'];
    let h = 0;
    for (let c of nombre) h = (h * 31 + c.charCodeAt(0)) % colors.length;
    return colors[Math.abs(h)];
  },
  folioPagare: (num) => `VR-PAG-${String(num).padStart(4,'0')}`,
  folioRecibo: (prestamoNum, cuotaNum) => `VR-REC-${String(prestamoNum).padStart(4,'0')}-${String(cuotaNum).padStart(2,'0')}`,
  today: () => new Date().toISOString().split('T')[0],
  daysLate: (fechaStr) => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fecha = new Date(fechaStr + 'T00:00:00');
    const diff = Math.floor((hoy - fecha) / 86400000);
    return Math.max(0, diff);
  },
  frecuenciaLabel: (f) => ({ semanal: 'Semanal', quincenal: 'Quincenal', mensual: 'Mensual' }[f] || f),
  statusLabel: (e) => ({ activo: 'Activo', liquidado: 'Liquidado', atrasado: 'Atrasado' }[e] || e),
  importe: (n) => {
    const unidades = ['','un ','dos ','tres ','cuatro ','cinco ','seis ','siete ','ocho ','nueve '];
    const decenas = ['','diez ','veinte ','treinta ','cuarenta ','cincuenta ','sesenta ','setenta ','ochenta ','noventa '];
    const especiales = ['diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
    const centenas = ['','ciento ','doscientos ','trescientos ','cuatrocientos ','quinientos ','seiscientos ','setecientos ','ochocientos ','novecientos '];
    const miles = ['','mil ','dos mil ','tres mil ','cuatro mil ','cinco mil ','seis mil ','siete mil ','ocho mil ','nueve mil ','diez mil ','once mil ','doce mil ','trece mil ','catorce mil ','quince mil ','dieciséis mil ','diecisiete mil ','dieciocho mil ','diecinueve mil '];
    let entero = Math.floor(n);
    let cents = Math.round((n - entero) * 100);
    let result = '';
    if (entero >= 20000) return entero.toLocaleString('es-MX') + ' pesos ' + String(cents).padStart(2,'0') + '/100 M.N.';
    if (entero >= 1000) { result += miles[Math.floor(entero/1000)]; entero %= 1000; }
    if (entero >= 100) { result += centenas[Math.floor(entero/100)]; entero %= 100; }
    if (entero >= 10 && entero < 20) { result += especiales[entero-10] + ' '; entero = 0; }
    else if (entero >= 20) { result += decenas[Math.floor(entero/10)]; entero %= 10; }
    if (entero > 0) result += unidades[entero];
    return result.trim().charAt(0).toUpperCase() + result.trim().slice(1) + ' pesos ' + String(cents).padStart(2,'0') + '/100 M.N.';
  },
};

  .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid #3D2B4F;padding-bottom:12px;margin-bottom:18px}
  .logo{font-size:26px;font-weight:700;letter-spacing:-1px;color:#1A2340;font-family:Arial,sans-serif}
  .logo span{color:#4CAF50}
  .logo-sub{font-size:10px;color:#888;margin-top:2px}
  .folio-box{text-align:right;font-size:11px}
  .folio{font-weight:700;color:#3D2B4F;font-family:monospace;font-size:13px}
  h1{font-size:14px;letter-spacing:3px;text-align:center;color:#3D2B4F;margin:16px 0;text-transform:uppercase;border-top:0.5px solid #ccc;border-bottom:0.5px solid #ccc;padding:8px 0}
  .amount-box{border:2px solid #3D2B4F;border-radius:6px;padding:14px;text-align:center;margin:14px 0}
  .amount-box .lbl{font-size:9px;color:#888;letter-spacing:1.5px;text-transform:uppercase}
  .amount-box .val{font-size:30px;font-weight:700;color:#3D2B4F;font-family:Arial,sans-serif}
  .amount-box .letras{font-size:11px;color:#555;font-style:italic;margin-top:2px}
  .body-text{font-size:11.5px;line-height:1.9;margin-bottom:14px;text-align:justify}
  .body-text strong{color:#3D2B4F}
  .clausula{margin:10px 0 6px;font-size:11px;font-weight:700;color:#3D2B4F;text-transform:uppercase;letter-spacing:0.5px}
  table.info{width:100%;border-collapse:collapse;margin:12px 0;font-size:11px}
  table.info td{padding:6px 8px;border-bottom:0.5px solid #e8e8e8}
  table.info td:first-child{color:#666;width:36%;font-weight:600}
  table.info td:last-child{color:#1a1a1a}
  table.amort{width:100%;border-collapse:collapse;margin:12px 0;font-size:10.5px}
  table.amort th{background:#1A2340;color:#fff;padding:7px 8px;text-align:left;font-size:10px;letter-spacing:0.3px}
  table.amort td{padding:6px 8px;border-bottom:0.5px solid #eee}
  table.amort tr:nth-child(even) td{background:#faf8fc}
  .penal-box{background:#fff7f0;border:1px solid #e8b87a;border-radius:6px;padding:12px;margin:12px 0;font-size:11px;color:#7a4a00}
  .legal-box{background:#f8f6fc;border-left:3px solid #3D2B4F;padding:10px 14px;margin:12px 0;font-size:10.5px;color:#555;line-height:1.8}
  .signs{display:flex;gap:40px;margin-top:44px;padding-top:20px;border-top:0.5px solid #ddd}
  .sign-col{flex:1;text-align:center}
  .sign-space{height:52px}
  .sign-line{border-top:1px solid #333;margin:0 16px 5px}
  .sign-name{font-size:11px;font-weight:700;color:#3D2B4F}
  .sign-role{font-size:9.5px;color:#888;margin-top:1px}
  .footer{margin-top:20px;font-size:9px;color:#bbb;text-align:center;border-top:0.5px solid #eee;padding-top:10px}
  @media print{body{padding:20px} @page{margin:1.5cm}}
</style>

  establecida en la tabla anterior, se generará automáticamente un cargo moratorio equivalente al
  <strong>${Store.PENALIZACION_DIARIA}% del capital original (${Fmt.currency(prestamo.monto)})</strong>
  por cada día natural de atraso, es decir, <strong>${Fmt.currency(prestamo.monto * Store.PENALIZACION_DIARIA / 100)}</strong> por día.
  Dicho cargo se sumará al saldo insoluto sin necesidad de notificación previa,
  siendo exigible de manera inmediata.
</div>

<div class="clausula">Cláusula III — Vencimiento anticipado</div>
<p class="body-text">

  a declarar vencida la totalidad del adeudo de forma anticipada, haciéndose exigible la cantidad
  total insoluta más los cargos moratorios acumulados, sin necesidad de requerimiento judicial previo.
</p>

</script><script>const Toast = {
  container: null,
  init() {
    this.container = document.createElement('div');
    this.container.className = 'toast-container';
    document.body.appendChild(this.container);
  },
  show(msg, type = '', duration = 2800) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: 'ti-check', error: 'ti-x', '': 'ti-info-circle' };
    t.innerHTML = `<i class="ti ${icons[type] || 'ti-info-circle'}"></i> ${msg}`;
    this.container.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
  },
  success: (m) => Toast.show(m, 'success'),
  error: (m) => Toast.show(m, 'error'),
};

const Modal = {
  active: null,
  open(contentFn, title = '') {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    const sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    sheet.innerHTML = `<div class="modal-handle"></div>${title ? `<div class="modal-title">${title}</div>` : ''}`;
    const body = document.createElement('div');
    body.appendChild(contentFn());
    sheet.appendChild(body);
    backdrop.appendChild(sheet);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) Modal.close(); });
    document.body.appendChild(backdrop);
    this.active = backdrop;
  },
  close() {
    if (this.active) { this.active.remove(); this.active = null; }
  },
};
</script><script>const Dashboard = {
  filtro: 'todos',

      const ps = Store.getPrestamosByCliente(clienteId).filter(p => p.estado === 'activo');
      if (!ps.length) return 'inactivo';
      const tabla = ps.flatMap(p => Store.getTableraAmortizacion(p));
      const vencidas = tabla.filter(c => c.estado === 'vencido').length;
      const hoy = tabla.filter(c => c.estado === 'hoy').length;
      if (vencidas > 0) return 'atrasado';
      if (hoy > 0) return 'hoy';
      return 'corriente';
    };

    let clientesFiltrados = clientes.filter(c => {
      const ps = Store.getPrestamosByCliente(c.id).filter(p => p.estado === 'activo');
      if (this.filtro === 'todos') return ps.length > 0;
      const estado = getEstadoCliente(c.id);
      if (this.filtro === 'corriente') return estado === 'corriente' || estado === 'hoy';
      if (this.filtro === 'atrasado') return estado === 'atrasado';
      return true;
    });

              <p>Toca "Nuevo cliente" para registrar tu primer cliente y comenzar.</p>
            </div>
          ` : clientesFiltrados.slice(0, 5).map(c => {

            const saldo = ps.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
            const estado = getEstadoCliente(c.id);
            const badge = estado === 'atrasado'
              ? `<span class="badge badge-late">Con atraso</span>`
              : estado === 'hoy'
              ? `<span class="badge badge-warn">Vence hoy</span>`
              : `<span class="badge badge-ok">Al corriente</span>`;
            const freq = ps[0] ? Fmt.frecuenciaLabel(ps[0].frecuencia) : '';
            return `
              <div class="client-row" onclick="App.navigate('clienteDetalle', '${c.id}')">

                </div>
                <div class="c-right">
                  <div class="c-amount">${Fmt.currency(saldo)}</div>
                  ${badge}
                </div>
              </div>`;
          }).join('')}
        </div>
        <div style="height:16px"></div>
      </div>
    `;

    return el;
  }
};
</script><script>const Clientes = {
  query: '',
  render() {
    const clientes = Store.getClientes();
    const filtered = clientes.filter(c =>
      c.nombre.toLowerCase().includes(this.query.toLowerCase()) ||
      c.telefono.includes(this.query)
    );

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" onclick="App.navigate('dashboard')"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px">
          <h1 style="font-size:20px">Clientes</h1>
          <p>${clientes.length} registrados</p>
        </div>
      </div>
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Buscar por nombre o teléfono..." id="search-input" value="${this.query}" />
      </div>
      <div class="scroll-area" style="padding-bottom:80px">
        <div style="padding:6px 16px 12px">
          ${filtered.length === 0 ? `
            <div class="empty-state">
              <i class="ti ti-user-search"></i>
              <h3>Sin resultados</h3>
              <p>Intenta con otro nombre o teléfono</p>
            </div>
          ` : filtered.map(c => {
            const ps = Store.getPrestamosByCliente(c.id);
            const activos = ps.filter(p => p.estado === 'activo');
            const saldo = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
            const hasAtraso = activos.some(p => {
              const tabla = Store.getTableraAmortizacion(p);
              return tabla.some(t => t.estado === 'vencido');
            });
            return `
              <div class="client-row" style="margin-bottom:8px" onclick="App.navigate('clienteDetalle', '${c.id}')">
                <div class="c-avatar ${Fmt.avatarColor(c.nombre)}">${Fmt.initials(c.nombre)}</div>
                <div class="c-info">
                  <div class="c-name">${c.nombre}</div>
                  <div class="c-detail"><i class="ti ti-phone" style="font-size:10px"></i> ${c.telefono}</div>
                </div>
                <div class="c-right">
                  ${activos.length > 0
                    ? `<div class="c-amount">${Fmt.currency(saldo)}</div>
                       <span class="badge ${hasAtraso ? 'badge-late' : 'badge-ok'}">${hasAtraso ? 'Con atraso' : 'Al corriente'}</span>`
                    : `<span class="badge badge-new">${ps.length > 0 ? 'Liquidado' : 'Nuevo'}</span>`
                  }
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
      <button class="fab" onclick="App.navigate('nuevoCliente')">
        <i class="ti ti-user-plus"></i>
      </button>
    `;

    el.querySelector('#search-input').addEventListener('input', (e) => {
      this.query = e.target.value;
      App.renderView();
    });

    return el;
  }
};
</script><script>const ClienteDetalle = {
  render(clienteId) {
    const cliente = Store.getCliente(clienteId);
    if (!cliente) return App.navigate('clientes');

    const prestamos = Store.getPrestamosByCliente(clienteId);
    const activos = prestamos.filter(p => p.estado === 'activo');
    const saldoTotal = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
    const pagosTotal = prestamos.reduce((s, p) => s + Store.getPagosCount(p.id), 0);
    const domicilio = Store.getDomicilioCompleto(cliente);

    const el = document.createElement('div');

    // ── Header ──
    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `
      <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
        <div class="c-avatar ${Fmt.avatarColor(cliente.nombre)}" style="width:50px;height:50px;font-size:16px">${Fmt.initials(cliente.nombre)}</div>
        <div>
          <h1>${cliente.nombre}</h1>
          <p><i class="ti ti-phone" style="font-size:11px"></i> ${cliente.telefono}</p>
        </div>
      </div>`;
    el.appendChild(header);
    el.querySelector('#back-btn').onclick = () => App.navigate('clientes');

    // ── Stats ──
    const stats = document.createElement('div');
    stats.className = 'stats-row';
    stats.innerHTML = `
      <div class="stat-card"><div class="stat-val">${Fmt.currency(saldoTotal)}</div><div class="stat-lbl">Saldo total</div></div>
      <div class="stat-card"><div class="stat-val">${activos.length}</div><div class="stat-lbl">Activos</div></div>
      <div class="stat-card"><div class="stat-val">${pagosTotal}</div><div class="stat-lbl">Pagos hechos</div></div>`;
    el.appendChild(stats);

    // ── Scroll body ──
    const body = document.createElement('div');
    body.className = 'scroll-area';
    body.style.paddingBottom = '80px';

    // Datos del cliente
    const secDatos = document.createElement('div');
    secDatos.innerHTML = `
      <div class="section-title">
        Datos del cliente
        <div style="display:flex;gap:8px">
          <a id="edit-btn" style="color:var(--gold);cursor:pointer"><i class="ti ti-edit" style="font-size:13px"></i> Editar</a>
          <a id="delete-btn" style="color:var(--danger);cursor:pointer"><i class="ti ti-trash" style="font-size:13px"></i> Eliminar</a>
        </div>
      </div>
      <div style="padding:0 16px;display:flex;flex-direction:column;gap:6px">
        ${domicilio ? `<div class="info-box"><i class="ti ti-map-pin"></i><span>${domicilio}</span></div>` : ''}
        ${cliente.ine ? `<div class="info-box"><i class="ti ti-id"></i><span>INE: ${cliente.ine}</span></div>` : ''}
        ${cliente.refNombre ? `<div class="info-box"><i class="ti ti-user"></i><span>Ref: ${cliente.refNombre}${cliente.refParentesco ? ' ('+cliente.refParentesco+')' : ''} · ${cliente.refTelefono || ''}</span></div>` : ''}
        <div class="info-box"><i class="ti ti-calendar"></i><span>Cliente desde ${Fmt.date(cliente.createdAt)}</span></div>
        <div style="display:flex;gap:8px;margin-top:2px">
          <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:${cliente.fotoIneUrl ? 'var(--success)' : 'var(--ink-soft)'}">
            <i class="ti ti-id" style="font-size:14px"></i> INE ${cliente.fotoIneUrl ? '✓' : 'pendiente'}
          </div>
          <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:${cliente.fotoDomicilioUrl ? 'var(--success)' : 'var(--ink-soft)'}">
            <i class="ti ti-home" style="font-size:14px"></i> Domicilio ${cliente.fotoDomicilioUrl ? '✓' : 'pendiente'}
          </div>
        </div>
      </div>`;
    body.appendChild(secDatos);

    secDatos.querySelector('#edit-btn').onclick = () => App.navigate('editarCliente', clienteId);
    secDatos.querySelector('#delete-btn').addEventListener('click', async () => {
      const psActivos = prestamos.filter(p => p.estado === 'activo').length;
      const msg = psActivos > 0
        ? `Este cliente tiene ${psActivos} préstamo(s) activo(s). Se eliminarán todos sus registros. ¿Continuar?`
        : '¿Eliminar este cliente y todos sus registros?';
      if (!window.confirm(msg)) return;
      await Store.deleteCliente(clienteId);
      Toast.success('Cliente eliminado');
      App.navigate('clientes');
    });

    // ── Préstamos ──
    if (prestamos.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.style.paddingTop = '24px';
      empty.innerHTML = `<i class="ti ti-cash"></i><h3>Sin préstamos</h3><p>Crea el primer préstamo para este cliente</p>`;
      body.appendChild(empty);
    } else {
      prestamos.forEach(p => {
        const pagosHechos = Store.getPagosCount(p.id);
        const saldo = Store.getSaldoRestante(p.id);
        const tabla = Store.getTableraAmortizacion(p);
        const vencidas = tabla.filter(t => t.estado === 'vencido').length;
        const pagosLista = Store.getPagosByPrestamo(p.id);

        const secPrestamo = document.createElement('div');

        // Header del préstamo
        const hdr = document.createElement('div');
        hdr.className = 'section-title';
        hdr.style.marginTop = '8px';
        hdr.innerHTML = `
          <span>Préstamo ${Fmt.folioPagare(p.folioNum)}</span>
          <span class="badge ${p.estado === 'liquidado' ? 'badge-ok' : vencidas > 0 ? 'badge-late' : 'badge-new'}" style="font-size:10px">
            ${p.estado === 'liquidado' ? 'Liquidado' : vencidas > 0 ? vencidas + ' vencido' + (vencidas>1?'s':'') : 'Activo'}
          </span>`;
        secPrestamo.appendChild(hdr);

        // Mini stats
        const ms = document.createElement('div');
        ms.className = 'stats-row';
        ms.style.paddingTop = '0';
        ms.innerHTML = `
          <div class="stat-card"><div class="stat-val">${Fmt.currency(p.monto)}</div><div class="stat-lbl">Capital</div></div>
          <div class="stat-card"><div class="stat-val">${pagosHechos}/${p.plazo}</div><div class="stat-lbl">Pagos</div></div>
          <div class="stat-card"><div class="stat-val" style="${saldo > 0 ? 'color:var(--gold-deep)' : 'color:var(--success)'}">${Fmt.currency(saldo)}</div><div class="stat-lbl">Saldo</div></div>`;
        secPrestamo.appendChild(ms);

        // Botones
        const btns = document.createElement('div');
        btns.className = 'btn-row';
        btns.style.paddingTop = '0';
        if (p.estado === 'activo') {
          const btnPago = document.createElement('button');
          btnPago.className = 'btn btn-primary btn-sm';
          btnPago.innerHTML = '<i class="ti ti-plus"></i> Registrar pago';
          btnPago.onclick = () => App.navigate('registrarPago', p.id);
          btns.appendChild(btnPago);
        }
        const btnTabla = document.createElement('button');
        btnTabla.className = 'btn btn-secondary btn-sm';
        btnTabla.innerHTML = '<i class="ti ti-table"></i> Tabla';
        btnTabla.onclick = () => App.navigate('verTabla', p.id);
        btns.appendChild(btnTabla);

        const btnPagare = document.createElement('button');
        btnPagare.className = 'btn btn-secondary btn-sm';
        btnPagare.innerHTML = '<i class="ti ti-file-text"></i> Pagaré';
        btnPagare.onclick = () => PDF.generarPagare(p, cliente);
        btns.appendChild(btnPagare);
        secPrestamo.appendChild(btns);

        // Historial pagos
        const histTitle = document.createElement('div');
        histTitle.className = 'section-title';
        histTitle.style.cssText = 'font-size:12px;padding-top:4px';
        histTitle.textContent = 'Historial de pagos';
        secPrestamo.appendChild(histTitle);

        const hist = document.createElement('div');
        hist.className = 'payment-list';
        if (pagosLista.length === 0) {
          hist.innerHTML = '<div style="padding:12px 0;font-size:13px;color:var(--ink-soft);text-align:center">Sin pagos registrados aún</div>';
        } else {
          [...pagosLista].reverse().forEach((pg, i) => {
            const row = document.createElement('div');
            row.className = 'pmt-row';
            row.innerHTML = `
              <div class="pmt-dot paid"></div>
              <div class="pmt-info">
                <div class="pmt-date">${Fmt.date(pg.fecha)}</div>
                <div class="pmt-note">${pg.metodo.charAt(0).toUpperCase()+pg.metodo.slice(1)}${pg.folio ? ' · '+pg.folio : ''}${pg.nota ? ' · '+pg.nota : ''}${pg.comprobanteUrl ? ' · <span style="color:var(--gold)"><i class="ti ti-photo" style="font-size:11px"></i> Comprobante</span>' : ''}</div>
              </div>
              <div class="pmt-amount">${Fmt.currency(pg.monto)}</div>`;

            const btnRecibo = document.createElement('button');
            btnRecibo.style.cssText = 'background:none;border:none;cursor:pointer;padding:4px';
            btnRecibo.title = 'Ver comprobante';
            btnRecibo.innerHTML = '<i class="ti ti-receipt" style="font-size:16px;color:var(--gold-deep)"></i>';
            btnRecibo.onclick = () => PDF.generarRecibo(pg, p, cliente, pagosLista.length - i);
            row.appendChild(btnRecibo);
            hist.appendChild(row);
          });
        }
        secPrestamo.appendChild(hist);
        body.appendChild(secPrestamo);
      });
    }

    // Botón nuevo préstamo
    const btnNuevo = document.createElement('div');
    btnNuevo.style.padding = '8px 16px 16px';
    btnNuevo.innerHTML = `<button class="btn btn-mauve" id="btn-nuevo-prestamo"><i class="ti ti-plus"></i> Nuevo préstamo para este cliente</button>`;
    body.appendChild(btnNuevo);
    btnNuevo.querySelector('#btn-nuevo-prestamo').onclick = () => App.navigate('nuevoPrestamo', clienteId);

    el.appendChild(body);
    return el;
  }
};

              <div class="pz-label" style="color:var(--mauve-deep)">Fotografiar o adjuntar comprobante</div>

              <input type="file" id="file-dom" accept="image/*"/>

    el.querySelector('#back-btn').onclick = back;

    let ineUrl = editing?.fotoIneUrl || null;
    let domUrl = editing?.fotoDomicilioUrl || null;

    const setupPhoto = (fileId, zoneId, prevId, imgId, rmId, getUrl, setUrl) => {
      const file = el.querySelector(`#${fileId}`);
      const zone = el.querySelector(`#${zoneId}`);
      const prev = el.querySelector(`#${prevId}`);
      const img = el.querySelector(`#${imgId}`);
      const rm = el.querySelector(`#${rmId}`);

      if (getUrl()) { img.src = getUrl(); prev.style.display = 'block'; zone.style.display = 'none'; }

      file.addEventListener('change', (ev) => {
        const f = ev.target.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = (e) => { setUrl(e.target.result); img.src = e.target.result; prev.style.display = 'block'; zone.style.display = 'none'; };
        reader.readAsDataURL(f);
      });
      rm.addEventListener('click', () => { setUrl(null); prev.style.display = 'none'; zone.style.display = 'block'; });
    };

    setupPhoto('file-ine','zone-ine','prev-ine','img-ine','rm-ine', () => ineUrl, (v) => ineUrl = v);
    setupPhoto('file-dom','zone-dom','prev-dom','img-dom','rm-dom', () => domUrl, (v) => domUrl = v);

      if (!refNombre || !refParentesco || !refTelefono) { Toast.error('Completa la referencia personal'); return; }

      const data = {
        nombre, telefono,
        calle, numExt, numInt: el.querySelector('#numInt').value.trim(),
        colonia, cp: el.querySelector('#cp').value.trim(), ciudad,
        ine: el.querySelector('#ine').value.trim().toUpperCase(),
        refNombre, refParentesco, refTelefono,
        refDireccion: el.querySelector('#refDireccion').value.trim(),
        fotoIneUrl: ineUrl, fotoDomicilioUrl: domUrl,
      };

      if (editing) {
        await Store.updateCliente(clienteId, data);
        Toast.success('Cliente actualizado');
        App.navigate('clienteDetalle', clienteId);
      } else {
        const c = await Store.addCliente(data);
        Toast.success('Cliente registrado');
        App.navigate('clienteDetalle', c.id);

    });

    return el;
  }
};
</script><script>const NuevoPrestamo = {
  render(preClienteId) {
    const clientes = Store.getClientes();

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px"><h1>Nuevo préstamo</h1><p>Configura los términos del crédito</p></div>
      </div>
      <div class="scroll-area" style="padding-bottom:16px">
        <div class="form-body">
          <div class="field">
            <label>Cliente *</label>
            <select id="cliente-sel">
              <option value="">— Selecciona cliente —</option>
              ${clientes.map(c => `<option value="${c.id}" ${c.id === preClienteId ? 'selected' : ''}>${c.nombre}</option>`).join('')}
            </select>
            <span class="field-hint">¿No está? <a onclick="App.navigate('nuevoCliente')" style="color:var(--rose);cursor:pointer">Registrar nuevo cliente</a></span>
          </div>
          <div class="field">
            <label>Monto a prestar *</label>
            <input type="number" id="monto" placeholder="$0.00" min="100" step="100"/>
          </div>
          <div class="field">
            <label>Interés total (%)</label>
            <input type="number" id="interes" placeholder="30" min="0" max="300" value="${Store.INTERES_DEFAULT}"/>
            <span class="field-hint">Interés fijo sobre el capital. Por defecto: ${Store.INTERES_DEFAULT}%</span>
          </div>
          <div class="field">
            <label>Número de pagos *</label>
            <input type="number" id="plazo" placeholder="8" min="1" max="52" value="8"/>
          </div>
          <div class="field">
            <label>Frecuencia de pago</label>
            <select id="frecuencia">
              <option value="semanal">Semanal (cada 7 días)</option>
              <option value="quincenal" selected>Quincenal (cada 15 días)</option>
              <option value="mensual">Mensual (cada 30 días)</option>
            </select>
          </div>
          <div class="field">
            <label>Fecha de inicio</label>
            <input type="date" id="fechaInicio" value="${Fmt.today()}"/>
          </div>

          <div id="calc-preview" style="display:none;background:var(--mauve-light);border-radius:var(--r-lg);padding:16px">
            <div style="font-size:11px;font-weight:700;color:var(--mauve);margin-bottom:10px;letter-spacing:0.5px">RESUMEN DEL CRÉDITO</div>
            <div style="display:flex;flex-direction:column;gap:7px">
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Capital prestado</span>
                <span style="font-size:13px;font-weight:600;color:var(--mauve-deep)" id="prev-capital">—</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Interés (${Store.INTERES_DEFAULT}%)</span>
                <span style="font-size:13px;font-weight:600;color:var(--mauve-deep)" id="prev-interes">—</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Penalización por mora</span>
                <span style="font-size:12px;color:var(--warn)" id="prev-penal">${Store.PENALIZACION_DIARIA}% del capital por día de atraso</span>
              </div>
              <div style="height:0.5px;background:rgba(107,78,125,0.2)"></div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Total a pagar</span>
                <span style="font-size:17px;font-weight:700;color:var(--mauve-deep)" id="prev-total">—</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Pago por cuota</span>
                <span style="font-size:17px;font-weight:700;color:var(--rose-deep)" id="prev-cuota">—</span>
              </div>
            </div>
          </div>

          <div id="tabla-preview-wrap" style="display:none">
            <div style="font-size:12px;font-weight:600;color:var(--ink-mid);margin-bottom:8px">Tabla de pagos</div>
            <div class="amort-wrap">
              <table class="amort-table">
                <thead><tr><th>#</th><th>Fecha</th><th>Monto</th><th>Saldo</th></tr></thead>
                <tbody id="tabla-body"></tbody>
              </table>
            </div>
          </div>

          <button class="btn btn-primary" id="save-btn" disabled>
            <i class="ti ti-cash"></i> Registrar préstamo
          </button>
        </div>
      </div>
    `;

    el.querySelector('#back-btn').onclick = () => preClienteId ? App.navigate('clienteDetalle', preClienteId) : App.navigate('clientes');

    const updateCalc = () => {
      const monto = parseFloat(el.querySelector('#monto').value);
      const interes = parseFloat(el.querySelector('#interes').value) || 0;
      const plazo = parseInt(el.querySelector('#plazo').value);
      const frecuencia = el.querySelector('#frecuencia').value;
      const fechaInicio = el.querySelector('#fechaInicio').value;
      const clienteId = el.querySelector('#cliente-sel').value;
      const preview = el.querySelector('#calc-preview');
      const tablaWrap = el.querySelector('#tabla-preview-wrap');
      const saveBtn = el.querySelector('#save-btn');

      if (!monto || !plazo || monto < 100) { preview.style.display = 'none'; tablaWrap.style.display = 'none'; saveBtn.disabled = true; return; }

      const { total, cuota } = Store.calcPrestamo(monto, interes, plazo);
      el.querySelector('#prev-capital').textContent = Fmt.currency(monto);
      el.querySelector('#prev-interes').textContent = Fmt.currency(total - monto);
      el.querySelector('#prev-total').textContent = Fmt.currency(total);
      el.querySelector('#prev-cuota').textContent = Fmt.currency(cuota);
      preview.style.display = 'block';

      const freq = { semanal: 7, quincenal: 15, mensual: 30 }[frecuencia] || 15;
      const tbody = el.querySelector('#tabla-body');
      let saldo = total;
      tbody.innerHTML = '';
      for (let i = 1; i <= plazo; i++) {
        const fecha = new Date(fechaInicio + 'T00:00:00');
        fecha.setDate(fecha.getDate() + freq * i);
        saldo = Math.max(0, Math.round((saldo - cuota) * 100) / 100);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i}</td><td>${Fmt.date(fecha.toISOString().split('T')[0])}</td><td>${Fmt.currency(cuota)}</td><td>${Fmt.currency(saldo)}</td>`;
        tbody.appendChild(tr);
      }
      tablaWrap.style.display = 'block';
      saveBtn.disabled = !clienteId;
    };

    ['#monto','#interes','#plazo','#frecuencia','#fechaInicio','#cliente-sel'].forEach(sel => {
      el.querySelector(sel).addEventListener('input', updateCalc);
      el.querySelector(sel).addEventListener('change', updateCalc);
    });

    if (preClienteId) setTimeout(updateCalc, 50);

    el.querySelector('#save-btn').addEventListener('click', async () => {
      const clienteId = el.querySelector('#cliente-sel').value;
      const monto = parseFloat(el.querySelector('#monto').value);
      const interes = parseFloat(el.querySelector('#interes').value) || 0;
      const plazo = parseInt(el.querySelector('#plazo').value);
      const frecuencia = el.querySelector('#frecuencia').value;
      const fechaInicio = el.querySelector('#fechaInicio').value;
      if (!clienteId || !monto || !plazo) { Toast.error('Completa los campos obligatorios'); return; }
      const { total, cuota } = Store.calcPrestamo(monto, interes, plazo);
      await Store.addPrestamo({ clienteId, monto, interes, plazo, frecuencia, fechaInicio, totalConInteres: total, pagoCuota: cuota });
      Toast.success('Préstamo registrado');
      App.navigate('clienteDetalle', clienteId);
    });

    return el;
  }
};

      reader.onload = (ev) => {

      reader.readAsDataURL(file);
    });

    el.querySelector('#remove-comp').addEventListener('click', () => {
      comprobanteDataUrl = null;
      compPreview.style.display = 'none';
      photoZone.style.display = 'block';

        const saldoTexto = nuevoSaldo > 0
          ? `Tu saldo restante es de *${Fmt.currency(nuevoSaldo)}* (${Store.getPagosCount(prestamoId)} de ${prestamo.plazo} pagos completados).`
          : `✅ *¡Felicidades! Tu préstamo ha sido liquidado en su totalidad.* Muchas gracias por tu puntualidad.`;

        const msg = `Hola *${nombre}* 👋\n\nTe confirmamos tu pago recibido 🪙\n\n✅ *Monto:* ${Fmt.currency(prestamo.pagoCuota)}\n📅 *Fecha:* ${Fmt.date(fecha)}\n💳 *Método:* ${metodoLabel.charAt(0).toUpperCase() + metodoLabel.slice(1)}${folioTexto}\n\n${saldoTexto}\n\n${comprobanteDataUrl ? '🧾 Adjuntamos comprobante de pago.\n\n' : ''}Cualquier duda, con gusto te atendemos 😊\n\n*Varito* · Tu dinerito, siempre a la mano`;

};

</script><script>const Reportes = {
  render() {
    const clientes = Store.getClientes();
    const prestamos = Store.getPrestamos();
    const pagos = Store.getPagos();

    const activos = prestamos.filter(p => p.estado === 'activo');
    const liquidados = prestamos.filter(p => p.estado === 'liquidado');

    // Saldos
    const carteraTotal = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
    const cobrado = pagos.reduce((s, p) => s + p.monto, 0);

    // Ganancias: interés cobrado ya = pagos recibidos - capital proporcionalmente pagado
    // Forma simple: por cada préstamo, calcular cuánto del cobrado es interés
    const gananciaCobrada = prestamos.reduce((sum, p) => {
      const pagosP = pagos.filter(pg => pg.prestamoId === p.id);
      const totalPagado = pagosP.reduce((s, pg) => s + pg.monto, 0);
      if (p.totalConInteres === 0) return sum;
      const proporcionInteres = (p.totalConInteres - p.monto) / p.totalConInteres;
      return sum + (totalPagado * proporcionInteres);
    }, 0);

    const gananciaEsperada = prestamos.reduce((sum, p) => sum + (p.totalConInteres - p.monto), 0);
    const gananciaPendiente = gananciaEsperada - gananciaCobrada;

    const capitalEnCalle = activos.reduce((s, p) => s + p.monto, 0);

    const atrasados = activos.filter(p => {
      const tabla = Store.getTableraAmortizacion(p);
      return tabla.some(t => t.estado === 'vencido');
    });

    const hoy = Fmt.today();
    const pagosHoy = pagos.filter(p => p.fecha === hoy);
    const cobradoHoy = pagosHoy.reduce((s, p) => s + p.monto, 0);

    const ultimosPagos = [...pagos].sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 6);

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" onclick="App.navigate('dashboard')"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px">
          <h1>Reportes</h1>
          <p>Resumen de tu cartera</p>
        </div>
      </div>

      <div class="scroll-area" style="padding-bottom:16px">

        <div style="padding:14px 16px 0;font-size:11px;font-weight:700;color:var(--gold-deep);letter-spacing:1px">CARTERA</div>
        <div class="stats-row" style="flex-wrap:wrap">
          <div class="stat-card" style="min-width:120px">
            <div class="stat-val">${Fmt.currency(carteraTotal)}</div>
            <div class="stat-lbl">Por cobrar</div>
          </div>
          <div class="stat-card" style="min-width:120px">
            <div class="stat-val">${Fmt.currency(capitalEnCalle)}</div>
            <div class="stat-lbl">Capital en calle</div>
          </div>
        </div>
        <div class="stats-row" style="flex-wrap:wrap;padding-top:0">
          <div class="stat-card">
            <div class="stat-val">${activos.length}</div>
            <div class="stat-lbl">Activos</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${liquidados.length}</div>
            <div class="stat-lbl">Liquidados</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="${atrasados.length > 0 ? 'color:var(--danger)' : ''}">${atrasados.length}</div>
            <div class="stat-lbl">Con atraso</div>
          </div>
        </div>

        <div style="padding:14px 16px 0;font-size:11px;font-weight:700;color:var(--gold-deep);letter-spacing:1px">GANANCIAS</div>
        <div class="stats-row" style="flex-wrap:wrap">
          <div class="stat-card" style="min-width:120px;border-left:3px solid var(--gold)">
            <div class="stat-val" style="color:var(--success)">${Fmt.currency(gananciaCobrada)}</div>
            <div class="stat-lbl">Interés cobrado</div>
          </div>
          <div class="stat-card" style="min-width:120px">
            <div class="stat-val" style="color:var(--ink-mid)">${Fmt.currency(gananciaPendiente)}</div>
            <div class="stat-lbl">Interés pendiente</div>
          </div>
        </div>
        <div class="stats-row" style="padding-top:0">
          <div class="stat-card" style="border-left:3px solid var(--gold)">
            <div class="stat-val" style="color:var(--gold-deep)">${Fmt.currency(gananciaEsperada)}</div>
            <div class="stat-lbl">Ganancia total esperada</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${Fmt.currency(cobrado)}</div>
            <div class="stat-lbl">Total cobrado</div>
          </div>
        </div>

        ${cobradoHoy > 0 ? `
        <div style="margin:0 16px 8px">
          <div class="alert-pill" style="background:var(--success-light);color:var(--success)">
            <i class="ti ti-check" style="font-size:16px"></i>
            <span>Cobrado hoy: <strong>${Fmt.currency(cobradoHoy)}</strong> en ${pagosHoy.length} pago${pagosHoy.length !== 1 ? 's' : ''}</span>
          </div>
        </div>` : ''}

        ${atrasados.length > 0 ? `
        <div style="margin:0 16px 8px">
          <div class="alert-pill">
            <i class="ti ti-alert-triangle" style="font-size:16px"></i>
            <span><strong>${atrasados.length}</strong> préstamo${atrasados.length !== 1 ? 's' : ''} con pagos vencidos</span>
          </div>
        </div>
        <div class="client-list" style="margin-bottom:8px">
          ${atrasados.map(p => {
            const c = Store.getCliente(p.clienteId);
            const tabla = Store.getTableraAmortizacion(p);
            const vencidas = tabla.filter(t => t.estado === 'vencido');
            return `
              <div class="client-row" onclick="App.navigate('clienteDetalle','${p.clienteId}')">
                <div class="c-avatar ${Fmt.avatarColor(c.nombre)}">${Fmt.initials(c.nombre)}</div>
                <div class="c-info">
                  <div class="c-name">${c.nombre}</div>
                  <div class="c-detail">${vencidas.length} cuota${vencidas.length !== 1 ? 's' : ''} vencida${vencidas.length !== 1 ? 's' : ''}</div>
                </div>
                <div class="c-right">
                  <div class="c-amount">${Fmt.currency(Store.getSaldoRestante(p.id))}</div>
                  <span class="badge badge-late">Atrasado</span>
                </div>
              </div>`;
          }).join('')}
        </div>` : ''}

        <div class="section-title">Últimos pagos recibidos</div>
        <div class="payment-list" style="padding:0 16px 16px">
          ${ultimosPagos.length === 0
            ? `<div style="font-size:13px;color:var(--ink-soft);padding:20px 0;text-align:center"><i class="ti ti-receipt-off" style="font-size:28px;display:block;margin-bottom:8px;color:var(--sand-dark)"></i>Sin pagos registrados aún</div>`
            : ultimosPagos.map(pg => {
              const p = Store.getPrestamo(pg.prestamoId);
              const c = p ? Store.getCliente(p.clienteId) : null;
              return `
                <div class="pmt-row">
                  <div class="pmt-dot paid"></div>
                  <div class="pmt-info">
                    <div class="pmt-date">${c?.nombre || '—'}</div>
                    <div class="pmt-note">${Fmt.date(pg.fecha)} · ${pg.metodo}</div>
                  </div>
                  <div class="pmt-amount">${Fmt.currency(pg.monto)}</div>
                  ${pg.comprobanteUrl ? `<i class="ti ti-photo" style="font-size:14px;color:var(--gold)"></i>` : ''}
                </div>`;
            }).join('')
          }
        </div>
      </div>
    `;
    return el;
  }
};

    const views = {
      dashboard:      () => Dashboard.render(),
      clientes:       () => Clientes.render(),
      clienteDetalle: () => ClienteDetalle.render(this.param),
      nuevoCliente:   () => NuevoCliente.render(null),
      editarCliente:  () => NuevoCliente.render(this.param),
      nuevoPrestamo:  () => NuevoPrestamo.render(this.param),
      registrarPago:  () => RegistrarPago.render(this.param),
      verTabla:       () => Documentos.render(this.param),
      reportes:       () => Reportes.render(),
    };

    const renderFn = views[this.route];
    if (renderFn) {
      const content = renderFn();
      if (content) viewEl.appendChild(content);
    }

    const tabMap = { dashboard: 0, clientes: 1, reportes: 3 };
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', i === (tabMap[this.route] ?? -1)));
  },

  init() {
    Toast.init();

    const shell = document.createElement('div');
    shell.className = 'app-shell';
    shell.id = 'shell';

    const view = document.createElement('div');
    view.id = 'view';
    view.style.cssText = 'flex:1;display:flex;flex-direction:column;';
    shell.appendChild(view);

    const tabBar = document.createElement('div');
    tabBar.className = 'tab-bar';
    tabBar.id = 'tab-bar';
    tabBar.innerHTML = `
      <button class="tab active" onclick="App.navigate('dashboard')">
        <i class="ti ti-home tab-icon"></i>
        <span class="tab-lbl">Inicio</span>
      </button>
      <button class="tab" onclick="App.navigate('clientes')">
        <i class="ti ti-users tab-icon"></i>
        <span class="tab-lbl">Clientes</span>
      </button>
      <button class="tab" onclick="App.navigate('nuevoPrestamo')">
        <i class="ti ti-cash tab-icon"></i>
        <span class="tab-lbl">Préstamo</span>
      </button>
      <button class="tab" onclick="App.navigate('reportes')">
        <i class="ti ti-chart-bar tab-icon"></i>
        <span class="tab-lbl">Reportes</span>
      </button>
    `;
    shell.appendChild(tabBar);
    document.getElementById('app').appendChild(shell);

    // Subscribe to Firebase data changes → re-render
    Store.subscribe(() => App.renderView());
    Store.init();

    this.renderView();
  }
};

document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  App.init();
});
