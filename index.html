</script><script>const Reportes = {
  render() {
    const clientes = Store.getClientes();
    const prestamos = Store.getPrestamos();
    const pagos = Store.getPagos();

    const activos = prestamos.filter(p => p.estado === 'activo');
    const liquidados = prestamos.filter(p => p.estado === 'liquidado');

    // Saldos
    const carteraTotal = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
    const cobrado = pagos.reduce((s, p) => s + p.monto, 0);

    // Ganancias: interés cobrado ya = pagos recibidos - capital proporcionalmente pagado
    // Forma simple: por cada préstamo, calcular cuánto del cobrado es interés
    const gananciaCobrada = prestamos.reduce((sum, p) => {
      const pagosP = pagos.filter(pg => pg.prestamoId === p.id);
      const totalPagado = pagosP.reduce((s, pg) => s + pg.monto, 0);
      if (p.totalConInteres === 0) return sum;
      const proporcionInteres = (p.totalConInteres - p.monto) / p.totalConInteres;
      return sum + (totalPagado * proporcionInteres);
    }, 0);

    const gananciaEsperada = prestamos.reduce((sum, p) => sum + (p.totalConInteres - p.monto), 0);
    const gananciaPendiente = gananciaEsperada - gananciaCobrada;

    const capitalEnCalle = activos.reduce((s, p) => s + p.monto, 0);

    const atrasados = activos.filter(p => {
      const tabla = Store.getTableraAmortizacion(p);
      return tabla.some(t => t.estado === 'vencido');
    });

    const hoy = Fmt.today();
    const pagosHoy = pagos.filter(p => p.fecha === hoy);
    const cobradoHoy = pagosHoy.reduce((s, p) => s + p.monto, 0);

    const ultimosPagos = [...pagos].sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 6);

            <div class="stat-lbl">Por cobrar</div>

          <div class="stat-card" style="min-width:120px">
            <div class="stat-val">${Fmt.currency(capitalEnCalle)}</div>
            <div class="stat-lbl">Capital en calle</div>
          </div>
        </div>
        <div class="stats-row" style="flex-wrap:wrap;padding-top:0">

            <div class="stat-val">${activos.length}</div>
            <div class="stat-lbl">Activos</div>

          <div class="stat-card">
            <div class="stat-val">${liquidados.length}</div>
            <div class="stat-lbl">Liquidados</div>

          <div class="stat-card">

            <div class="stat-lbl">Con atraso</div>

        <div style="padding:14px 16px 0;font-size:11px;font-weight:700;color:var(--gold-deep);letter-spacing:1px">GANANCIAS</div>

            <div class="stat-lbl">Interés cobrado</div>

          <div class="stat-card" style="min-width:120px">

            <div class="stat-lbl">Interés pendiente</div>
          </div>
        </div>
        <div class="stats-row" style="padding-top:0">
          <div class="stat-card" style="border-left:3px solid var(--gold)">
            <div class="stat-val" style="color:var(--gold-deep)">${Fmt.currency(gananciaEsperada)}</div>
            <div class="stat-lbl">Ganancia total esperada</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${Fmt.currency(cobrado)}</div>
            <div class="stat-lbl">Total cobrado</div>
          </div>
        </div>

        ${cobradoHoy > 0 ? `
        <div style="margin:0 16px 8px">
          <div class="alert-pill" style="background:var(--success-light);color:var(--success)">
            <i class="ti ti-check" style="font-size:16px"></i>
            <span>Cobrado hoy: <strong>${Fmt.currency(cobradoHoy)}</strong> en ${pagosHoy.length} pago${pagosHoy.length !== 1 ? 's' : ''}</span>
          </div>
        </div>` : ''}

        ${atrasados.length > 0 ? `

        <div class="payment-list" style="padding:0 16px 16px">
          ${ultimosPagos.length === 0
            ? `<div style="font-size:13px;color:var(--ink-soft);padding:20px 0;text-align:center"><i class="ti ti-receipt-off" style="font-size:28px;display:block;margin-bottom:8px;color:var(--sand-dark)"></i>Sin pagos registrados aún</div>`
            : ultimosPagos.map(pg => {
              const p = Store.getPrestamo(pg.prestamoId);
              const c = p ? Store.getCliente(p.clienteId) : null;
              return `
                <div class="pmt-row">
                  <div class="pmt-dot paid"></div>

                  ${pg.comprobanteUrl ? `<i class="ti ti-photo" style="font-size:14px;color:var(--gold)"></i>` : ''}
                </div>`;

        </div>

    `;
    return el;

              setTimeout(() => window.open('https://wa.me/52' + sol.telefono + '?text=' + encodeURIComponent(msg), '_blank'), 400);
            }
            Toast.success('Prestamo autorizado');
            // Mostrar pantalla de depósito si es transferencia
            if (sol.metodoEntrega === 'transferencia' && sol.clabe) {
              Solicitudes.mostrarDeposito(sol, clienteId);
            } else {
              App.navigate('clienteDetalle', clienteId);
            }
          } catch(e) {
            console.error(e);
            Toast.error('Error al autorizar. Intenta de nuevo.');
            btnAutorizar.disabled = false;
            btnAutorizar.innerHTML = '<i class="ti ti-check"></i> Autorizar';
          }
        });

        btnRow.appendChild(btnRechazar);
        btnRow.appendChild(btnAutorizar);
        card.appendChild(btnRow);
        body.appendChild(card);
      });
    }

    el.appendChild(body);
    return el;
  },

  mostrarDeposito(sol, clienteId) {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';

    const sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    sheet.style.padding = '0 20px 32px';

    const handle = document.createElement('div');
    handle.className = 'modal-handle';
    sheet.appendChild(handle);

    const title = document.createElement('div');
    title.style.cssText = 'font-size:17px;font-weight:600;color:var(--ink);text-align:center;margin-bottom:4px';
    title.textContent = 'Realizar depósito';
    sheet.appendChild(title);

    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:12px;color:var(--ink-soft);text-align:center;margin-bottom:16px';
    sub.textContent = sol.nombre;
    sheet.appendChild(sub);

    // Monto
    const montoBox = document.createElement('div');
    montoBox.style.cssText = 'background:var(--green-light);border-radius:var(--r-lg);padding:16px;text-align:center;margin-bottom:12px';
    montoBox.innerHTML = '<div style="font-size:10px;font-weight:700;color:var(--green-deep);letter-spacing:1px">MONTO A DEPOSITAR</div>'
      + '<div style="font-size:30px;font-weight:700;color:var(--green-deep)">' + Fmt.currency(sol.monto) + '</div>';
    sheet.appendChild(montoBox);

    // Datos bancarios
    const bankBox = document.createElement('div');
    bankBox.style.cssText = 'background:var(--sand);border-radius:var(--r-lg);padding:14px;margin-bottom:12px';
    bankBox.innerHTML = '<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ink-soft)">Banco</span><span style="font-size:13px;font-weight:600;color:var(--ink)">' + (sol.banco||'—') + '</span></div>'
      + '<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ink-soft)">CLABE</span><span style="font-size:12px;font-family:monospace;font-weight:600;color:var(--ink)">' + sol.clabe + '</span></div>'
      + '<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ink-soft)">Titular</span><span style="font-size:13px;font-weight:600;color:var(--ink)">' + sol.nombre + '</span></div>';
    sheet.appendChild(bankBox);

    // Botones copiar
    const copyRow = document.createElement('div');
    copyRow.style.cssText = 'display:flex;gap:8px;margin-bottom:10px';

    const btnCopyClabe = document.createElement('button');
    btnCopyClabe.className = 'btn btn-secondary btn-sm';
    btnCopyClabe.style.flex = '1';
    btnCopyClabe.innerHTML = '<i class="ti ti-copy"></i> Copiar CLABE';
    btnCopyClabe.onclick = () => {
      navigator.clipboard.writeText(sol.clabe).then(() => {
        btnCopyClabe.innerHTML = '<i class="ti ti-check"></i> Copiada';
        setTimeout(() => btnCopyClabe.innerHTML = '<i class="ti ti-copy"></i> Copiar CLABE', 2000);
      });
    };

    const btnCopyMonto = document.createElement('button');
    btnCopyMonto.className = 'btn btn-secondary btn-sm';
    btnCopyMonto.style.flex = '1';
    btnCopyMonto.innerHTML = '<i class="ti ti-copy"></i> Copiar monto';
    btnCopyMonto.onclick = () => {
      navigator.clipboard.writeText(String(sol.monto)).then(() => {
        btnCopyMonto.innerHTML = '<i class="ti ti-check"></i> Copiado';
        setTimeout(() => btnCopyMonto.innerHTML = '<i class="ti ti-copy"></i> Copiar monto', 2000);
      });
    };

    copyRow.appendChild(btnCopyClabe);
    copyRow.appendChild(btnCopyMonto);
    sheet.appendChild(copyRow);

    // Botón abrir BBVA
    const btnBBVA = document.createElement('button');
    btnBBVA.className = 'btn btn-primary';
    btnBBVA.style.cssText = 'background:#004481;margin-bottom:8px';
    btnBBVA.innerHTML = '<i class="ti ti-building-bank"></i> Abrir BBVA México';
    btnBBVA.onclick = () => {
      // Try BBVA app deep link, fallback to web
      window.location.href = 'bbvamx://';
      setTimeout(() => window.open('https://www.bbva.mx', '_blank'), 1200);
    };
    sheet.appendChild(btnBBVA);

    // Botón listo
    const btnListo = document.createElement('button');
    btnListo.className = 'btn btn-success';
    btnListo.innerHTML = '<i class="ti ti-check"></i> Depósito realizado';
    btnListo.onclick = () => {
      backdrop.remove();
      App.navigate('clienteDetalle', clienteId);
    };
    sheet.appendChild(btnListo);

    backdrop.appendChild(sheet);
    backdrop.onclick = (e) => { if (e.target === backdrop) { backdrop.remove(); App.navigate('clienteDetalle', clienteId); } };
    document.body.appendChild(backdrop);
  }
};
</script><script>const Configuracion = {
  render() {
    const firmaExistente = Store.getFirmaYaretzi();
    const el = document.createElement('div');

    const header = document.createElement('div');
    header.className = 'page-header';
    header.style.padding = '14px 20px 16px';
    header.innerHTML = `
      <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
      <div style="padding-left:36px"><h1>Configuración</h1><p>Firma de Yaretzi</p></div>`;
    el.appendChild(header);
    el.querySelector('#back-btn').onclick = () => App.navigate('dashboard');

    const body = document.createElement('div');
    body.style.padding = '16px';
    body.style.paddingBottom = '80px';

    // Info
    const info = document.createElement('div');
    info.className = 'info-box';
    info.style.marginBottom = '16px';
    info.innerHTML = `<i class="ti ti-info-circle"></i><span>Dibuja tu firma con el dedo o con el mouse. Se usará automáticamente en todos los pagarés como firma de la acreedora.</span>`;
    body.appendChild(info);

    // Firma existente
    if (firmaExistente) {
      const existente = document.createElement('div');
      existente.style.cssText = 'margin-bottom:16px;background:var(--sand);border-radius:var(--r-lg);padding:14px';
      existente.innerHTML = `
        <div style="font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:8px">FIRMA ACTUAL</div>
        <img src="${firmaExistente}" style="max-width:100%;height:80px;object-fit:contain;display:block"/>`;
      body.appendChild(existente);
    }

    // Canvas para firma
    const canvasWrap = document.createElement('div');
    canvasWrap.style.cssText = 'border:2px dashed var(--green);border-radius:var(--r-lg);background:#fff;margin-bottom:12px;position:relative;overflow:hidden';

    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;font-weight:600;color:var(--ink-soft);padding:10px 14px 4px;letter-spacing:0.5px';
    label.textContent = firmaExistente ? 'NUEVA FIRMA' : 'DIBUJA TU FIRMA AQUÍ';
    canvasWrap.appendChild(label);

    const canvas = document.createElement('canvas');
    canvas.id = 'firma-canvas';
    canvas.style.cssText = 'display:block;width:100%;touch-action:none;cursor:crosshair';
    canvas.height = 160;
    canvasWrap.appendChild(canvas);

    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:10px;color:var(--ink-soft);padding:4px 14px 10px';
    hint.textContent = 'Usa el dedo o mouse para firmar';
    canvasWrap.appendChild(hint);
    body.appendChild(canvasWrap);

    // Botones canvas
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:8px;margin-bottom:16px';

    const btnBorrar = document.createElement('button');
    btnBorrar.className = 'btn btn-secondary';
    btnBorrar.style.flex = '1';
    btnBorrar.innerHTML = '<i class="ti ti-eraser"></i> Borrar';
    btnRow.appendChild(btnBorrar);

    const btnGuardar = document.createElement('button');
    btnGuardar.className = 'btn btn-primary';
    btnGuardar.style.flex = '2';
    btnGuardar.innerHTML = '<i class="ti ti-check"></i> Guardar firma';
    btnRow.appendChild(btnGuardar);
    body.appendChild(btnRow);

    el.appendChild(body);

    // ── Canvas drawing logic ──
    let isDrawing = false;
    let hasDrawn = false;
    let ctx = null;

    const initCanvas = () => {
      canvas.width = canvas.offsetWidth;
      ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#1A2340';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    };

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY,
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY,
      };
    };

    const startDraw = (e) => {
      e.preventDefault();
      if (!ctx) initCanvas();
      isDrawing = true;
      hasDrawn = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    };

    const draw = (e) => {
      e.preventDefault();
      if (!isDrawing || !ctx) return;
      const pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    };

    const endDraw = (e) => {
      e.preventDefault();
      isDrawing = false;
    };

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw, { passive: false });

    setTimeout(initCanvas, 100);

    btnBorrar.onclick = () => {
      if (!ctx) initCanvas();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      hasDrawn = false;
    };

    btnGuardar.addEventListener('click', async () => {
      if (!hasDrawn) { Toast.error('Dibuja tu firma primero'); return; }
      btnGuardar.disabled = true;
      btnGuardar.innerHTML = '<i class="ti ti-loader"></i> Guardando...';
      try {
        const firmaUrl = canvas.toDataURL('image/png');
        await Store.guardarFirmaYaretzi(firmaUrl);
        Toast.success('Firma guardada correctamente');
        App.navigate('dashboard');
      } catch(e) {
        Toast.error('Error al guardar la firma');
        btnGuardar.disabled = false;
        btnGuardar.innerHTML = '<i class="ti ti-check"></i> Guardar firma';
      }
    });

    return el;
  }
};
</script><script>const App = {
  route: 'dashboard',
  param: null,

  navigate(route, param) {
    this.route = route;
    this.param = param || null;
    this.renderView();
    window.scrollTo(0, 0);
  },

  renderView() {
    const viewEl = document.getElementById('view');
    const tabBar = document.getElementById('tab-bar');
    viewEl.innerHTML = '';

    if (!Store.isLoaded() && ['dashboard','clientes','reportes','solicitudes'].includes(this.route)) {
      viewEl.innerHTML = `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;min-height:60vh">
          <img src="https://enriquerocham.github.io/varito/%C3%8DCONO.png" alt="Varito" style="width:72px;height:72px;object-fit:contain"/>
          <div style="font-size:15px;font-weight:500;color:var(--ink-mid)">Conectando con Varito...</div>
          <div style="font-size:12px;color:var(--ink-soft)">Cargando tus datos</div>
        </div>`;
      tabBar.style.display = 'none';
      return;
    }

    const noTabRoutes = ['nuevoCliente','editarCliente','nuevoPrestamo','registrarPago','verTabla','configuracion','solicitudes'];
    tabBar.style.display = noTabRoutes.includes(this.route) ? 'none' : 'flex';

    const views = {
      dashboard:      () => Dashboard.render(),
      clientes:       () => Clientes.render(),
      clienteDetalle: () => ClienteDetalle.render(this.param),
      nuevoCliente:   () => NuevoCliente.render(null),
      editarCliente:  () => NuevoCliente.render(this.param),
      nuevoPrestamo:  () => NuevoPrestamo.render(this.param),
      registrarPago:  () => RegistrarPago.render(this.param),
      verTabla:       () => Documentos.render(this.param),
      reportes:       () => Reportes.render(),
      solicitudes:    () => Solicitudes.render(),
      configuracion:  () => Configuracion.render(),
      configuracion:  () => Configuracion.render(),
      solicitudes:    () => Solicitudes.render(),
    };

    const renderFn = views[this.route];
    if (renderFn) {
      const content = renderFn();
      if (content) viewEl.appendChild(content);
    }

    const tabMap = { dashboard: 0, clientes: 1, reportes: 3 };
    document.querySelectorAll('.tab').forEach((t,i) =>
      t.classList.toggle('active', i === (tabMap[this.route] ?? -1)));
  },

  init() {
    Toast.init();
    const shell = document.createElement('div');
    shell.className = 'app-shell';
    shell.id = 'shell';

    const view = document.createElement('div');
    view.id = 'view';
    view.style.cssText = 'flex:1;display:flex;flex-direction:column;';
    shell.appendChild(view);

    const tabBar = document.createElement('div');
    tabBar.className = 'tab-bar';
    tabBar.id = 'tab-bar';
    tabBar.innerHTML = `
      <button class="tab active" onclick="App.navigate('dashboard')">
        <i class="ti ti-home tab-icon"></i><span class="tab-lbl">Inicio</span>
      </button>
      <button class="tab" onclick="App.navigate('clientes')">
        <i class="ti ti-users tab-icon"></i><span class="tab-lbl">Clientes</span>
      </button>
      <button class="tab" onclick="App.navigate('nuevoPrestamo')">
        <i class="ti ti-cash tab-icon"></i><span class="tab-lbl">Préstamo</span>
      </button>
      <button class="tab" onclick="App.navigate('reportes')">
        <i class="ti ti-chart-bar tab-icon"></i><span class="tab-lbl">Reportes</span>
      </button>`;
    shell.appendChild(tabBar);
    document.getElementById('app').appendChild(shell);

    Store.subscribe(() => App.renderView());
    Store.init();
    this.renderView();
  }
};

document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  App.init();
});
</script>
