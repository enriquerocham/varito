<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1A2340"/>
<title>Solicitud de préstamo — Varito</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4CAF50;--green-light:#E8F5E9;--green-deep:#1B5E20;
  --navy:#1A2340;--navy-light:#E8EAF0;
  --sand:#F7F9F7;--sand-mid:#E8EDE8;
  --ink:#1A2340;--ink-mid:#4A5568;--ink-soft:#90A4A0;
  --white:#fff;--danger:#C62828;--danger-light:#FFEBEE;
  --warn:#F57F17;--warn-light:#FFF8E1;
  --r-md:12px;--r-lg:18px;--r-xl:28px;--r-pill:999px;
}
body{font-family:'Inter',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
.shell{max-width:430px;margin:0 auto;background:var(--white);min-height:100vh;display:flex;flex-direction:column}
.top{background:var(--navy);padding:20px;display:flex;align-items:center;gap:12px}
.top img{height:36px;width:auto}
.top-text h1{font-size:16px;font-weight:600;color:#fff}
.top-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}
.steps{display:flex;justify-content:center;gap:6px;padding:14px 16px;border-bottom:0.5px solid var(--sand-mid)}
.step{width:28px;height:4px;border-radius:2px;background:var(--sand-mid);transition:background 0.3s}
.step.active{background:var(--green)}
.step.done{background:var(--navy)}
.section{padding:16px;display:flex;flex-direction:column;gap:12px}
.section-lbl{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:1px;padding:4px 0 2px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--ink-soft);letter-spacing:0.5px;text-transform:uppercase}
.field input,.field select{padding:11px 14px;border-radius:var(--r-md);border:1px solid var(--sand-mid);background:var(--sand);font-size:14px;color:var(--ink);font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;transition:border 0.15s}
.field input:focus,.field select:focus{border-color:var(--green);background:var(--white)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.semana-btn{padding:12px 4px;border-radius:var(--r-md);border:1.5px solid var(--sand-mid);background:var(--sand);font-size:14px;font-weight:600;color:var(--ink-mid);cursor:pointer;transition:all 0.15s;text-align:center}
.semana-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.semanas-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.interes-badge{display:none;padding:8px 12px;background:var(--green-light);border-radius:var(--r-md);font-size:12px;color:var(--green-deep);font-weight:500}
.calc-box{background:var(--navy-light);border-radius:var(--r-lg);padding:14px;display:none}
.calc-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid rgba(26,35,64,0.1)}
.calc-row:last-child{border-bottom:none}
.calc-key{font-size:12px;color:var(--ink-mid)}
.calc-val{font-size:13px;font-weight:600;color:var(--navy)}
.amort-wrap{overflow-x:auto;border-radius:var(--r-md);border:0.5px solid var(--sand-mid)}
.amort-table{width:100%;border-collapse:collapse;font-size:11px}
.amort-table th{background:var(--navy-light);color:var(--navy);font-weight:600;padding:7px 8px;text-align:left}
.amort-table td{padding:7px 8px;border-bottom:0.5px solid var(--sand-mid);color:var(--ink-mid)}
.canvas-wrap{border:2px dashed var(--green);border-radius:var(--r-lg);background:#fff;position:relative;overflow:hidden}
.canvas-lbl{font-size:11px;font-weight:600;color:var(--ink-soft);padding:10px 14px 4px;letter-spacing:0.5px}
#firma-canvas{display:block;width:100%;touch-action:none;cursor:crosshair}
.canvas-hint{font-size:10px;color:var(--ink-soft);padding:4px 14px 10px}
.btn{padding:13px;border-radius:var(--r-lg);font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;transition:opacity 0.15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{background:var(--sand);border:1px solid var(--sand-mid);color:var(--ink-mid)}
.btn-success{background:var(--green);color:#fff}
.btn-row{display:flex;gap:8px}
.info-box{background:var(--sand);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--ink-mid);line-height:1.6;display:flex;gap:8px}
.info-box i{color:var(--green);font-size:15px;flex-shrink:0;margin-top:1px}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:16px;flex:1;text-align:center}
.success-screen h2{font-size:20px;font-weight:600;color:var(--ink)}
.success-screen p{font-size:14px;color:var(--ink-mid);line-height:1.7}
.error-msg{color:var(--danger);font-size:12px;display:none}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <img src="https://enriquerocham.github.io/varito/ÍCONO.png" alt="Varito" onerror="this.style.display='none'"/>
    <div class="top-text">
      <h1>Solicitud de préstamo</h1>
      <p>Varito · Tu dinerito, siempre a la mano</p>
    </div>
  </div>

  <div class="steps">
    <div class="step active" id="step-1"></div>
    <div class="step" id="step-2"></div>
    <div class="step" id="step-3"></div>
    <div class="step" id="step-4"></div>
  </div>

  <div id="main-content"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCDYns_aIfO87mtln-ORna-9sL_7Xm1IBk",
  authDomain: "varito-46d22.firebaseapp.com",
  projectId: "varito-46d22",
  storageBucket: "varito-46d22.firebasestorage.app",
  messagingSenderId: "228917831433",
  appId: "1:228917831433:web:8487695ba7d8c44d5e95d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const getInteresPorQuincenas = (q) => q <= 2 ? 30 : q <= 4 ? 40 : 50;
const getNumPagos = (q, frec) => frec === 'semanal' ? q * 2 : q;
const getDias = (frec) => frec === 'semanal' ? 7 : 15;
const fmtCurrency = (n) => '$' + Number(n).toLocaleString('es-MX', {minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = (str) => {
  const [y,m,d] = str.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return parseInt(d)+' '+months[parseInt(m)-1]+' '+y;
};
const today = () => new Date().toISOString().split('T')[0];

let formData = {};
let quincenas = 0;
let frecuencia = 'semanal';
let firmaUrl = null;
let step = 1;
let hasDrawn = false;

function setStep(n) {
  step = n;
  [1,2,3,4].forEach(i => {
    const el = document.getElementById('step-'+i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  });
}

function render() {
  const c = document.getElementById('main-content');
  c.innerHTML = '';
  if (step === 1) renderStep1(c);
  else if (step === 2) renderStep2(c);
  else if (step === 3) renderStep3(c);
  else if (step === 4) renderStep4(c);
  else renderSuccess(c);
}

function renderStep1(c) {
  const s = document.createElement('div');
  s.className = 'section';
  s.innerHTML = `
    <div class="info-box"><i class="ti ti-info-circle"></i><span>Llena todos tus datos personales. La información es confidencial y solo la verá la titular del negocio.</span></div>
    <div class="section-lbl">Datos personales</div>
    <div class="field"><label>Nombre completo *</label><input id="nombre" type="text" placeholder="Nombre y apellidos" value="${formData.nombre||''}"/></div>
    <div class="field"><label>Teléfono / WhatsApp *</label><input id="telefono" type="tel" placeholder="10 dígitos" maxlength="10" value="${formData.telefono||''}"/></div>
    <div class="field"><label>Fecha de nacimiento *</label><input id="fechaNacimiento" type="date" value="${formData.fechaNacimiento||''}"/></div>
    <div class="field"><label>Clave de elector (INE) *</label><input id="ine" type="text" placeholder="Ej: GOPL850412..." style="text-transform:uppercase" value="${formData.ine||''}"/></div>
    <div class="section-lbl" style="margin-top:8px">Domicilio</div>
    <div class="grid2">
      <div class="field"><label>Calle *</label><input id="calle" type="text" placeholder="Nombre de calle" value="${formData.calle||''}"/></div>
      <div class="field"><label>Núm. exterior *</label><input id="numExt" type="text" placeholder="Ej: 12" value="${formData.numExt||''}"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Núm. interior</label><input id="numInt" type="text" placeholder="Opcional" value="${formData.numInt||''}"/></div>
      <div class="field"><label>Código postal *</label><input id="cp" type="text" placeholder="Ej: 66050" maxlength="5" value="${formData.cp||''}"/></div>
    </div>
    <div class="field"><label>Colonia *</label><input id="colonia" type="text" placeholder="Nombre de colonia" value="${formData.colonia||''}"/></div>
    <div class="field"><label>Ciudad / Municipio *</label><input id="ciudad" type="text" placeholder="Ej: García, N.L." value="${formData.ciudad||''}"/></div>
    <p id="err1" class="error-msg"></p>
    <button class="btn btn-primary" id="btn1">Siguiente <i class="ti ti-arrow-right"></i></button>`;
  c.appendChild(s);

  document.getElementById('btn1').onclick = () => {
    const nombre = document.getElementById('nombre').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const fechaNacimiento = document.getElementById('fechaNacimiento').value;
    const ine = document.getElementById('ine').value.trim().toUpperCase();
    const calle = document.getElementById('calle').value.trim();
    const numExt = document.getElementById('numExt').value.trim();
    const cp = document.getElementById('cp').value.trim();
    const colonia = document.getElementById('colonia').value.trim();
    const ciudad = document.getElementById('ciudad').value.trim();
    const err = document.getElementById('err1');
    if (!nombre||!telefono||!fechaNacimiento||!ine||!calle||!numExt||!cp||!colonia||!ciudad) {
      err.textContent = 'Por favor completa todos los campos obligatorios.';
      err.style.display = 'block'; return;
    }
    if (telefono.length !== 10) { err.textContent = 'El teléfono debe tener 10 dígitos.'; err.style.display = 'block'; return; }
    Object.assign(formData, { nombre, telefono, fechaNacimiento, ine, calle, numExt, numInt: document.getElementById('numInt').value.trim(), cp, colonia, ciudad });
    setStep(2); render();
  };
}

function renderStep2(c) {
  const s = document.createElement('div');
  s.className = 'section';
  s.innerHTML = `
    <div class="section-lbl">Referencia personal</div>
    <div class="info-box"><i class="ti ti-user"></i><span>Proporciona una referencia de confianza. Debe ser alguien que te conozca bien.</span></div>
    <div class="field"><label>Nombre completo *</label><input id="refNombre" type="text" placeholder="Nombre completo" value="${formData.refNombre||''}"/></div>
    <div class="field"><label>Parentesco *</label><input id="refParentesco" type="text" placeholder="Ej: Madre, Hermano, Amigo..." value="${formData.refParentesco||''}"/></div>
    <div class="field"><label>Teléfono *</label><input id="refTelefono" type="tel" placeholder="10 dígitos" maxlength="10" value="${formData.refTelefono||''}"/></div>
    <div class="field"><label>Dirección (opcional)</label><input id="refDireccion" type="text" placeholder="Calle, número, colonia" value="${formData.refDireccion||''}"/></div>
    <p id="err2" class="error-msg"></p>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn2back" style="flex:1"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" id="btn2" style="flex:2">Siguiente <i class="ti ti-arrow-right"></i></button>
    </div>`;
  c.appendChild(s);
  document.getElementById('btn2back').onclick = () => { setStep(1); render(); };
  document.getElementById('btn2').onclick = () => {
    const refNombre = document.getElementById('refNombre').value.trim();
    const refParentesco = document.getElementById('refParentesco').value.trim();
    const refTelefono = document.getElementById('refTelefono').value.trim();
    const err = document.getElementById('err2');
    if (!refNombre||!refParentesco||!refTelefono) { err.textContent = 'Completa los campos obligatorios.'; err.style.display='block'; return; }
    Object.assign(formData, { refNombre, refParentesco, refTelefono, refDireccion: document.getElementById('refDireccion').value.trim() });
    setStep(3); render();
  };
}

function renderStep3(c) {
  const s = document.createElement('div');
  s.className = 'section';
  c.appendChild(s);

  // Title
  const lbl = document.createElement('div');
  lbl.className = 'section-lbl';
  lbl.textContent = 'Tu solicitud de crédito';
  s.appendChild(lbl);

  // Info
  const info = document.createElement('div');
  info.className = 'info-box';
  info.innerHTML = '<i class="ti ti-cash"></i><span>Clientes nuevos: máximo <strong>$2,000</strong>. El interés depende de las quincenas elegidas.</span>';
  s.appendChild(info);

  // Monto
  const fMonto = document.createElement('div');
  fMonto.className = 'field';
  fMonto.innerHTML = '<label>Monto a solicitar *</label>';
  const inputMonto = document.createElement('input');
  inputMonto.id = 'monto'; inputMonto.type = 'number';
  inputMonto.placeholder = '$0.00'; inputMonto.min = '100'; inputMonto.max = '2000'; inputMonto.step = '100';
  inputMonto.value = formData.monto || '';
  fMonto.appendChild(inputMonto);
  s.appendChild(fMonto);

  // Frecuencia
  const fFrec = document.createElement('div');
  fFrec.className = 'field';
  fFrec.innerHTML = '<label>Frecuencia de pago</label>';
  const frecGrid = document.createElement('div');
  frecGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px';
  ['semanal','quincenal'].forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'semana-btn' + (frecuencia === f ? ' active' : '');
    btn.dataset.frec = f;
    btn.textContent = f.charAt(0).toUpperCase() + f.slice(1);
    btn.onclick = () => {
      frecuencia = f;
      frecGrid.querySelectorAll('[data-frec]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateCalc3();
    };
    frecGrid.appendChild(btn);
  });
  fFrec.appendChild(frecGrid);
  s.appendChild(fFrec);

  // Quincenas
  const fQuinc = document.createElement('div');
  fQuinc.className = 'field';
  fQuinc.innerHTML = '<label>Número de quincenas *</label>';
  const quincGrid = document.createElement('div');
  quincGrid.className = 'semanas-grid';
  [1,2,3,4,5,6].forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'semana-btn' + (quincenas === q ? ' active' : '');
    btn.dataset.q = q;
    btn.innerHTML = '<span style="display:block">' + q + '</span><span style="font-size:9px;font-weight:400">' + (q<=2?'30%':q<=4?'40%':'50%') + '</span>';
    btn.onclick = () => {
      quincenas = q;
      quincGrid.querySelectorAll('[data-q]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const interes = getInteresPorQuincenas(quincenas);
      badge.textContent = quincenas + ' quincena' + (quincenas>1?'s':'') + ' → ' + interes + '% de interés';
      badge.style.display = 'block';
      updateCalc3();
    };
    quincGrid.appendChild(btn);
  });
  fQuinc.appendChild(quincGrid);
  const badge = document.createElement('div');
  badge.className = 'interes-badge';
  badge.style.display = quincenas ? 'block' : 'none';
  if (quincenas) badge.textContent = quincenas + ' quincena' + (quincenas>1?'s':'') + ' → ' + getInteresPorQuincenas(quincenas) + '% de interés';
  fQuinc.appendChild(badge);
  s.appendChild(fQuinc);

  // Calc box
  const calcBox = document.createElement('div');
  calcBox.className = 'calc-box';
  calcBox.id = 'calc-box';
  calcBox.style.display = 'none';
  calcBox.innerHTML = `
    <div class="calc-row"><span class="calc-key">Capital</span><span class="calc-val" id="c-capital">—</span></div>
    <div class="calc-row"><span class="calc-key">Interés total</span><span class="calc-val" id="c-interes">—</span></div>
    <div class="calc-row"><span class="calc-key">Número de pagos</span><span class="calc-val" id="c-pagos">—</span></div>
    <div class="calc-row"><span class="calc-key">Total a pagar</span><span class="calc-val" id="c-total" style="font-size:16px;color:var(--navy)">—</span></div>
    <div class="calc-row"><span class="calc-key" id="c-cuota-lbl">Pago por cuota</span><span class="calc-val" id="c-cuota" style="font-size:16px;color:var(--green-deep)">—</span></div>`;
  s.appendChild(calcBox);

  // Tabla
  const tablaWrap = document.createElement('div');
  tablaWrap.id = 'tabla-wrap';
  tablaWrap.style.display = 'none';
  tablaWrap.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:6px">Tabla de pagos</div>
    <div class="amort-wrap">
      <table class="amort-table">
        <thead><tr><th>#</th><th>Fecha</th><th>Monto</th><th>Capital</th><th>Interés</th></tr></thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>`;
  s.appendChild(tablaWrap);

  // Error
  const err = document.createElement('p');
  err.id = 'err3'; err.className = 'error-msg';
  s.appendChild(err);

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  const btnBack = document.createElement('button');
  btnBack.className = 'btn btn-secondary'; btnBack.style.flex = '1';
  btnBack.innerHTML = '<i class="ti ti-arrow-left"></i> Atrás';
  btnBack.onclick = () => { setStep(2); render(); };
  const btnNext = document.createElement('button');
  btnNext.className = 'btn btn-primary'; btnNext.style.flex = '2';
  btnNext.innerHTML = 'Siguiente <i class="ti ti-arrow-right"></i>';
  btnNext.id = 'btn3';
  btnRow.appendChild(btnBack);
  btnRow.appendChild(btnNext);
  s.appendChild(btnRow);

  // Attach monto listener
  inputMonto.addEventListener('input', updateCalc3);
  if (quincenas) setTimeout(updateCalc3, 50);

  function updateCalc3() {
    const monto = parseFloat(inputMonto.value);
    if (!monto || !quincenas || monto < 100) {
      calcBox.style.display = 'none'; tablaWrap.style.display = 'none'; return;
    }
    const interes = getInteresPorQuincenas(quincenas);
    const numPagos = getNumPagos(quincenas, frecuencia);
    const dias = getDias(frecuencia);
    const total = Math.round(monto * (1 + interes/100) * 100) / 100;
    const cuota = Math.round((total / numPagos) * 100) / 100;
    const intTotal = total - monto;
    const intPorCuota = Math.round((intTotal / numPagos) * 100) / 100;
    const capPorCuota = Math.round((monto / numPagos) * 100) / 100;
    const frecLabel = frecuencia === 'semanal' ? 'semanal' : 'quincenal';
    document.getElementById('c-capital').textContent = fmtCurrency(monto);
    document.getElementById('c-interes').textContent = fmtCurrency(intTotal) + ' (' + interes + '%)';
    document.getElementById('c-pagos').textContent = numPagos + ' pagos ' + frecLabel + 'es';
    document.getElementById('c-total').textContent = fmtCurrency(total);
    document.getElementById('c-cuota-lbl').textContent = 'Pago ' + frecLabel;
    document.getElementById('c-cuota').textContent = fmtCurrency(cuota);
    calcBox.style.display = 'block';
    const tbody = document.getElementById('tabla-body');
    tbody.innerHTML = '';
    let saldo = total;
    const hoy = today();
    for (let i = 1; i <= numPagos; i++) {
      const f = new Date(hoy + 'T00:00:00');
      f.setDate(f.getDate() + dias * i);
      saldo = Math.max(0, Math.round((saldo - cuota) * 100) / 100);
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>'+i+'</td><td>'+fmtDate(f.toISOString().split("T")[0])+'</td><td>'+fmtCurrency(cuota)+'</td><td>'+fmtCurrency(capPorCuota)+'</td><td>'+fmtCurrency(intPorCuota)+'</td>';
      tbody.appendChild(tr);
    }
    tablaWrap.style.display = 'block';
  }

  document.getElementById('btn3').onclick = () => {
    const monto = parseFloat(inputMonto.value);
    if (!monto || monto < 100) { err.textContent='Ingresa un monto válido (mínimo $100).'; err.style.display='block'; return; }
    if (monto > 2000) { err.textContent='El monto máximo para nuevos clientes es $2,000.'; err.style.display='block'; return; }
    if (!quincenas) { err.textContent='Selecciona el número de quincenas.'; err.style.display='block'; return; }
    formData.monto = monto;
    formData.quincenas = quincenas;
    formData.semanas = quincenas;
    formData.frecuencia = frecuencia;
    formData.interes = getInteresPorQuincenas(quincenas);
    formData.plazo = getNumPagos(quincenas, frecuencia);
    setStep(4); render();
  };
}

function renderStep4(c) {
  const s = document.createElement('div');
  s.className = 'section';
  s.innerHTML = `
    <div class="section-lbl">Firma digital</div>
    <div class="info-box"><i class="ti ti-writing"></i><span>Al firmar confirmas que la información proporcionada es verdadera y que aceptas los términos del préstamo solicitado.</span></div>
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="canvas-lbl">DIBUJA TU FIRMA CON EL DEDO</div>
      <canvas id="firma-canvas" height="160"></canvas>
      <div class="canvas-hint">Usa el dedo o el stylus para firmar</div>
    </div>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-secondary" id="btn-borrar" style="flex:1"><i class="ti ti-eraser"></i> Borrar</button>
    </div>
    <p id="err4" class="error-msg"></p>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn4back" style="flex:1"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-success" id="btn4" style="flex:2"><i class="ti ti-send"></i> Enviar solicitud</button>
    </div>`;
  c.appendChild(s);

  let isDrawing = false;
  let ctx = null;
  hasDrawn = false;

  const canvas = document.getElementById('firma-canvas');
  const initCtx = () => {
    canvas.width = canvas.offsetWidth;
    ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#1A2340';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  };
  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    if (e.touches) return { x:(e.touches[0].clientX-rect.left)*sx, y:(e.touches[0].clientY-rect.top)*sy };
    return { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy };
  };
  canvas.addEventListener('mousedown', e => { e.preventDefault(); if(!ctx)initCtx(); isDrawing=true; hasDrawn=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
  canvas.addEventListener('mousemove', e => { e.preventDefault(); if(!isDrawing||!ctx)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', e => { e.preventDefault(); isDrawing=false; });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); if(!ctx)initCtx(); isDrawing=true; hasDrawn=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!isDrawing||!ctx)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }, {passive:false});
  canvas.addEventListener('touchend', e => { e.preventDefault(); isDrawing=false; }, {passive:false});
  setTimeout(initCtx, 100);

  document.getElementById('btn-borrar').onclick = () => { if(!ctx)initCtx(); ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn=false; };
  document.getElementById('btn4back').onclick = () => { setStep(3); render(); };
  document.getElementById('btn4').addEventListener('click', async () => {
    const err = document.getElementById('err4');
    if (!hasDrawn) { err.textContent='Por favor firma antes de enviar.'; err.style.display='block'; return; }
    const btn = document.getElementById('btn4');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader"></i> Enviando...';
    try {
      firmaUrl = canvas.toDataURL('image/png');
      await db.collection('solicitudes').add({
        ...formData,
        firmaClienteUrl: firmaUrl,
        estado: 'pendiente',
        createdAt: new Date().toISOString(),
      });
      setStep(5); render();
    } catch(e) {
      console.error(e);
      err.textContent = 'Error al enviar. Intenta de nuevo.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-send"></i> Enviar solicitud';
    }
  });
}

function renderSuccess(c) {
  document.querySelector('.steps').style.display = 'none';
  c.innerHTML = `
    <div class="success-screen">
      <img src="https://enriquerocham.github.io/varito/LOGO_CUADRADO.png" style="width:100px;height:auto" onerror="this.style.display='none'"/>
      <h2>¡Solicitud enviada! 🎉</h2>
      <p>Tu solicitud fue recibida correctamente.<br/><br/>
      En breve recibirás un mensaje de WhatsApp confirmando si tu préstamo fue autorizado.<br/><br/>
      Gracias por confiar en <strong>Varito</strong>.</p>
    </div>`;
}

render();
</script>
</body>
</html>
