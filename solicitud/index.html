<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1A2340"/>
<title>Solicitud de préstamo — Varito</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4CAF50;--green-light:#E8F5E9;--green-deep:#1B5E20;
  --navy:#1A2340;--navy-light:#E8EAF0;
  --sand:#F7F9F7;--sand-mid:#E8EDE8;
  --ink:#1A2340;--ink-mid:#4A5568;--ink-soft:#90A4A0;
  --white:#fff;--danger:#C62828;--danger-light:#FFEBEE;
  --warn:#F57F17;--warn-light:#FFF8E1;
  --r-md:12px;--r-lg:18px;--r-xl:24px;
}
body{font-family:'Inter',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
.shell{max-width:430px;margin:0 auto;background:var(--white);min-height:100vh;display:flex;flex-direction:column}
.top{background:var(--navy);padding:16px 20px;display:flex;align-items:center;gap:14px}
.top img{height:44px;width:44px;object-fit:contain;border-radius:50%}
.top-text h1{font-size:17px;font-weight:600;color:#fff}
.top-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}
.steps{display:flex;justify-content:center;gap:6px;padding:12px 16px;border-bottom:0.5px solid var(--sand-mid)}
.step{height:4px;border-radius:2px;background:var(--sand-mid);transition:background 0.3s;flex:1;max-width:60px}
.step.active{background:var(--green)}
.step.done{background:var(--navy)}
.section{padding:16px;display:flex;flex-direction:column;gap:12px;padding-bottom:32px}
.section-lbl{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:1px;padding:4px 0 2px;text-transform:uppercase}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--ink-soft);letter-spacing:0.5px;text-transform:uppercase}
.field input,.field select{padding:11px 14px;border-radius:var(--r-md);border:1px solid var(--sand-mid);background:var(--sand);font-size:14px;color:var(--ink);font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;transition:border 0.15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--green);background:var(--white)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quinc-btn{padding:10px 4px;border-radius:var(--r-md);border:1.5px solid var(--sand-mid);background:var(--sand);font-size:13px;font-weight:600;color:var(--ink-mid);cursor:pointer;transition:all 0.15s;text-align:center;width:100%}
.quinc-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.frec-btn{padding:10px;border-radius:var(--r-md);border:1.5px solid var(--sand-mid);background:var(--sand);font-size:13px;font-weight:500;color:var(--ink-mid);cursor:pointer;transition:all 0.15s;text-align:center;width:100%}
.frec-btn.active{background:var(--green-light);border-color:var(--green);color:var(--green-deep);font-weight:600}
.quinc-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.interes-badge{display:none;padding:8px 12px;background:var(--green-light);border-radius:var(--r-md);font-size:12px;color:var(--green-deep);font-weight:500}
.calc-box{background:var(--navy-light);border-radius:var(--r-lg);padding:14px;display:none}
.calc-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid rgba(26,35,64,0.1)}
.calc-row:last-child{border-bottom:none}
.calc-key{font-size:12px;color:var(--ink-mid)}
.calc-val{font-size:13px;font-weight:600;color:var(--navy)}
.amort-wrap{overflow-x:auto;border-radius:var(--r-md);border:0.5px solid var(--sand-mid)}
.amort-table{width:100%;border-collapse:collapse;font-size:11px}
.amort-table th{background:var(--navy-light);color:var(--navy);font-weight:600;padding:7px 8px;text-align:left}
.amort-table td{padding:7px 8px;border-bottom:0.5px solid var(--sand-mid);color:var(--ink-mid)}
.photo-zone{border:1.5px dashed var(--green);border-radius:var(--r-lg);padding:16px;text-align:center;background:var(--green-light);cursor:pointer}
.photo-zone i{font-size:24px;color:var(--green);margin-bottom:6px;display:block}
.photo-zone .pz-lbl{font-size:12px;color:var(--green-deep);font-weight:500}
.photo-zone .pz-sub{font-size:10px;color:var(--green);margin-top:2px}
.photo-preview{border-radius:var(--r-md);overflow:hidden;background:var(--sand-mid);position:relative;display:none}
.photo-preview img{width:100%;max-height:140px;object-fit:cover;display:block}
.photo-rm{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(26,35,64,0.7);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.canvas-wrap{border:2px dashed var(--green);border-radius:var(--r-lg);background:#fff;overflow:hidden}
.canvas-lbl{font-size:11px;font-weight:600;color:var(--ink-soft);padding:8px 14px 2px;letter-spacing:0.5px}
#firma-canvas{display:block;width:100%;touch-action:none;cursor:crosshair}
.canvas-hint{font-size:10px;color:var(--ink-soft);padding:3px 14px 8px}
.btn{padding:13px;border-radius:var(--r-lg);font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;transition:opacity 0.15s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--navy);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-secondary{background:var(--sand);border:1px solid var(--sand-mid);color:var(--ink-mid)}
.btn-row{display:flex;gap:8px}
.info-box{background:var(--sand);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--ink-mid);line-height:1.6;display:flex;gap:8px}
.info-box i{color:var(--green);font-size:15px;flex-shrink:0;margin-top:1px}
.error-msg{color:var(--danger);font-size:12px;display:none;padding:4px 0}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:16px;flex:1;text-align:center}
.success-screen h2{font-size:20px;font-weight:600;color:var(--ink)}
.success-screen p{font-size:14px;color:var(--ink-mid);line-height:1.7}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <img src="https://enriquerocham.github.io/varito/%C3%8DCONO.png" alt="Varito" onerror="this.style.display='none'"/>
    <div class="top-text">
      <h1>Solicitud de préstamo</h1>
      <p>Varito · Tu dinerito, siempre a la mano</p>
    </div>
  </div>
  <div class="steps" id="steps-bar">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
    <div class="step" id="s4"></div>
    <div class="step" id="s5"></div>
  </div>
  <div id="main"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCDYns_aIfO87mtln-ORna-9sL_7Xm1IBk",
  authDomain:"varito-46d22.firebaseapp.com",
  projectId:"varito-46d22",
  storageBucket:"varito-46d22.firebasestorage.app",
  messagingSenderId:"228917831433",
  appId:"1:228917831433:web:8487695ba7d8c44d5e95d8"
});
const db = firebase.firestore();

// ── Helpers ──
const getInteres = q => q<=2?30:q<=4?40:50;
const getNumPagos = (q,f) => f==='semanal'?q*2:q;
const getDias = f => f==='semanal'?7:15;
const fmtC = n => '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = str => { if(!str)return'—'; const[y,m,d]=str.split('-'); const ms=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; return parseInt(d)+' '+ms[parseInt(m)-1]+' '+y; };
const today = () => new Date().toISOString().split('T')[0];

let step = 1;
let fd = {}; // form data
let quincenas = 0;
let frecuencia = 'semanal';
let firmaUrl = null;
let metodoPago = 'transferencia';
let fotoIneUrl = null;
let fotoIneBackUrl = null;
let fotoDomUrl = null;
let hasDrawn = false;

function setStep(n) {
  step = n;
  [1,2,3,4,5].forEach(i => {
    const el = document.getElementById('s'+i);
    if(!el) return;
    el.className = 'step' + (i<n?' done':i===n?' active':'');
  });
}

function render() {
  const c = document.getElementById('main');
  c.innerHTML = '';
  if(step===1) s1(c);
  else if(step===2) s2(c);
  else if(step===3) s3(c);
  else if(step===4) s4(c);
  else if(step===5) s5(c);
  else renderSuccess(c);
}

// ── Step 1: Datos personales ──
function s1(c) {
  const sec = document.createElement('div');
  sec.className = 'section';

  appendInfo(sec, 'Todos los campos son obligatorios. Tu información es confidencial.');

  appendLbl(sec, 'Datos personales');
  appendField(sec, 'nombre', 'Nombre completo *', 'text', 'Nombre y apellidos completos', fd.nombre||'');
  appendField(sec, 'telefono', 'Teléfono / WhatsApp *', 'tel', '10 dígitos', fd.telefono||'', {maxlength:'10'});
  appendField(sec, 'fechaNacimiento', 'Fecha de nacimiento *', 'date', '', fd.fechaNacimiento||'');
  appendField(sec, 'ine', 'Clave de elector (INE) *', 'text', 'Ej: GOPL850412MNLNRR04', fd.ine||'', {style:'text-transform:uppercase'});

  appendLbl(sec, 'Domicilio');
  const g1 = appendGrid(sec);
  appendField(g1, 'calle', 'Calle *', 'text', 'Nombre de la calle', fd.calle||'');
  appendField(g1, 'numExt', 'Núm. exterior *', 'text', 'Ej: 12', fd.numExt||'');
  const g2 = appendGrid(sec);
  appendField(g2, 'numInt', 'Núm. interior', 'text', 'Opcional', fd.numInt||'');
  appendField(g2, 'cp', 'Código postal *', 'text', 'Ej: 66050', fd.cp||'', {maxlength:'5'});
  appendField(sec, 'colonia', 'Colonia *', 'text', 'Nombre de la colonia', fd.colonia||'');
  appendField(sec, 'ciudad', 'Ciudad / Municipio *', 'text', 'Ej: García, N.L.', fd.ciudad||'');

  const err = appendErr(sec, 'err1');
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  const btnNext = appendBtn(btnRow, 'Siguiente →', 'btn-primary', null);
  sec.appendChild(btnRow);
  c.appendChild(sec);

  btnNext.onclick = () => {
    const nombre = val('nombre');
    const telefono = val('telefono');
    const fechaNacimiento = val('fechaNacimiento');
    const ine = val('ine').toUpperCase();
    const calle = val('calle');
    const numExt = val('numExt');
    const cp = val('cp');
    const colonia = val('colonia');
    const ciudad = val('ciudad');
    if(!nombre||!telefono||!fechaNacimiento||!ine||!calle||!numExt||!cp||!colonia||!ciudad){
      showErr('err1','Completa todos los campos obligatorios.'); return;
    }
    if(telefono.length!==10){showErr('err1','El teléfono debe tener 10 dígitos.'); return;}
    Object.assign(fd,{nombre,telefono,fechaNacimiento,ine,calle,numExt,numInt:val('numInt'),cp,colonia,ciudad});
    setStep(2); render();
  };
}

// ── Step 2: Referencia ──
function s2(c) {
  const sec = document.createElement('div');
  sec.className = 'section';
  appendLbl(sec, 'Referencia personal');
  appendInfo(sec, 'Proporciona una persona de confianza que te conozca bien.');
  appendField(sec, 'refNombre', 'Nombre completo *', 'text', 'Nombre y apellidos', fd.refNombre||'');
  appendField(sec, 'refParentesco', 'Parentesco *', 'text', 'Ej: Madre, Hermano, Amigo', fd.refParentesco||'');
  appendField(sec, 'refTelefono', 'Teléfono *', 'tel', '10 dígitos', fd.refTelefono||'', {maxlength:'10'});

  appendLbl(sec, 'Domicilio de la referencia');
  const g1 = appendGrid(sec);
  appendField(g1, 'refCalle', 'Calle *', 'text', 'Nombre de calle', fd.refCalle||'');
  appendField(g1, 'refNumExt', 'Núm. exterior *', 'text', 'Ej: 5', fd.refNumExt||'');
  const g2 = appendGrid(sec);
  appendField(g2, 'refNumInt', 'Núm. interior', 'text', 'Opcional', fd.refNumInt||'');
  appendField(g2, 'refCp', 'Código postal *', 'text', 'Ej: 66050', fd.refCp||'', {maxlength:'5'});
  appendField(sec, 'refColonia', 'Colonia *', 'text', 'Nombre de colonia', fd.refColonia||'');
  appendField(sec, 'refCiudad', 'Ciudad / Municipio *', 'text', 'Ej: García, N.L.', fd.refCiudad||'');

  const err = appendErr(sec, 'err2');
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  appendBtn(btnRow, '← Atrás', 'btn-secondary', () => {setStep(1);render();});
  const btnNext = appendBtn(btnRow, 'Siguiente →', 'btn-primary', null);
  sec.appendChild(btnRow);
  c.appendChild(sec);

  btnNext.onclick = () => {
    const refNombre = val('refNombre');
    const refParentesco = val('refParentesco');
    const refTelefono = val('refTelefono');
    const refCalle = val('refCalle');
    const refNumExt = val('refNumExt');
    const refCp = val('refCp');
    const refColonia = val('refColonia');
    const refCiudad = val('refCiudad');
    if(!refNombre||!refParentesco||!refTelefono||!refCalle||!refNumExt||!refCp||!refColonia||!refCiudad){
      showErr('err2','Completa todos los campos de la referencia.'); return;
    }
    Object.assign(fd,{refNombre,refParentesco,refTelefono,refCalle,refNumExt,refNumInt:val('refNumInt'),refCp,refColonia,refCiudad,
      refDireccion:[refCalle,'#'+refNumExt,val('refNumInt')?'Int.'+val('refNumInt'):'',refColonia,refCp,refCiudad].filter(Boolean).join(', ')});
    setStep(3); render();
  };
}

// ── Step 3: Documentos ──
function s3(c) {
  const sec = document.createElement('div');
  sec.className = 'section';
  appendLbl(sec, 'Documentos de identidad');
  appendInfo(sec, 'Adjunta una foto clara de tu INE y un comprobante de domicilio reciente (máx. 3 meses).');

  // INE - front and back
  const ineField = document.createElement('div');
  ineField.className = 'field';
  const ineLabel = document.createElement('label');
  ineLabel.textContent = 'Foto del INE *';
  ineField.appendChild(ineLabel);

  const ineGrid = document.createElement('div');
  ineGrid.className = 'grid2';

  // INE Front
  const ineFrontWrap = document.createElement('div');
  ineFrontWrap.style.cssText = 'display:flex;flex-direction:column;gap:4px';
  const ineFrontLbl = document.createElement('div');
  ineFrontLbl.style.cssText = 'font-size:10px;font-weight:600;color:var(--ink-soft);text-align:center';
  ineFrontLbl.textContent = 'PARTE DELANTERA';
  const ineZoneFront = createPhotoZone('ti-id', 'Frente', 'Foto del frente', 'ine-front-file');
  ineZoneFront.style.cssText += ';padding:12px 8px';
  const inePreviewFront = createPhotoPreview('ine-front-prev', 'ine-front-img', 'ine-front-rm');
  if(fotoIneUrl){ ineZoneFront.style.display='none'; inePreviewFront.style.display='block'; inePreviewFront.querySelector('img').src=fotoIneUrl; }
  ineFrontWrap.appendChild(ineFrontLbl);
  ineFrontWrap.appendChild(ineZoneFront);
  ineFrontWrap.appendChild(inePreviewFront);

  // INE Back
  const ineBackWrap = document.createElement('div');
  ineBackWrap.style.cssText = 'display:flex;flex-direction:column;gap:4px';
  const ineBackLbl = document.createElement('div');
  ineBackLbl.style.cssText = 'font-size:10px;font-weight:600;color:var(--ink-soft);text-align:center';
  ineBackLbl.textContent = 'PARTE TRASERA';
  const ineZoneBack = createPhotoZone('ti-id', 'Reverso', 'Foto del reverso', 'ine-back-file');
  ineZoneBack.style.cssText += ';padding:12px 8px';
  const inePreviewBack = createPhotoPreview('ine-back-prev', 'ine-back-img', 'ine-back-rm');
  if(fotoIneBackUrl){ ineZoneBack.style.display='none'; inePreviewBack.style.display='block'; inePreviewBack.querySelector('img').src=fotoIneBackUrl; }
  ineBackWrap.appendChild(ineBackLbl);
  ineBackWrap.appendChild(ineZoneBack);
  ineBackWrap.appendChild(inePreviewBack);

  ineGrid.appendChild(ineFrontWrap);
  ineGrid.appendChild(ineBackWrap);
  ineField.appendChild(ineGrid);
  sec.appendChild(ineField);

  // Domicilio
  const domField = document.createElement('div');
  domField.className = 'field';
  const domLabel = document.createElement('label');
  domLabel.textContent = 'Comprobante de domicilio *';
  domField.appendChild(domLabel);
  const domZone = createPhotoZone('ti-home', 'Adjuntar comprobante de domicilio', 'Luz, agua, gas, estado de cuenta', 'dom-file');
  domZone.style.background = '#EDE4F3';
  domZone.style.borderColor = '#6B4E7D';
  domZone.querySelector('i').style.color = '#6B4E7D';
  domZone.querySelector('.pz-lbl').style.color = '#3D2B4F';
  const domPreview = createPhotoPreview('dom-prev', 'dom-img', 'dom-rm');
  if(fotoDomUrl){ domZone.style.display='none'; domPreview.style.display='block'; domPreview.querySelector('img').src=fotoDomUrl; }
  domField.appendChild(domZone);
  domField.appendChild(domPreview);
  sec.appendChild(domField);

  const err = appendErr(sec, 'err3');
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  appendBtn(btnRow, '← Atrás', 'btn-secondary', () => {setStep(2);render();});
  const btnNext = appendBtn(btnRow, 'Siguiente →', 'btn-primary', null);
  sec.appendChild(btnRow);
  c.appendChild(sec);

  // Photo handlers
  setupPhoto('ine-front-file', ineZoneFront, inePreviewFront, 'ine-front-img', v => fotoIneUrl = v);
  setupPhoto('ine-back-file', ineZoneBack, inePreviewBack, 'ine-back-img', v => fotoIneBackUrl = v);
  setupPhoto('dom-file', domZone, domPreview, 'dom-img', v => fotoDomUrl = v);
  document.getElementById('ine-front-rm').onclick = () => { fotoIneUrl=null; inePreviewFront.style.display='none'; ineZoneFront.style.display='block'; };
  document.getElementById('ine-back-rm').onclick = () => { fotoIneBackUrl=null; inePreviewBack.style.display='none'; ineZoneBack.style.display='block'; };
  document.getElementById('dom-rm').onclick = () => { fotoDomUrl=null; domPreview.style.display='none'; domZone.style.display='block'; };

  btnNext.onclick = () => {
    if(!fotoIneUrl){showErr('err3','Adjunta la foto del frente de tu INE.'); return;}
    if(!fotoIneBackUrl){showErr('err3','Adjunta la foto del reverso de tu INE.'); return;}
    if(!fotoDomUrl){showErr('err3','Adjunta un comprobante de domicilio.'); return;}
    setStep(4); render();
  };
}

// ── Step 4: Solicitud crédito ──
function s4(c) {
  const sec = document.createElement('div');
  sec.className = 'section';
  appendLbl(sec, 'Tu solicitud de crédito');
  appendInfo(sec, 'Clientes nuevos: máximo $2,000. El interés depende del número de quincenas.');

  appendField(sec, 'monto', 'Monto a solicitar *', 'number', '$0.00', fd.monto||'', {min:'100',max:'2000',step:'100'});

  // Frecuencia
  const frecField = document.createElement('div');
  frecField.className = 'field';
  const frecLbl = document.createElement('label');
  frecLbl.textContent = 'Frecuencia de pago';
  frecField.appendChild(frecLbl);
  const frecGrid = document.createElement('div');
  frecGrid.className = 'grid2';
  ['semanal','quincenal'].forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'frec-btn' + (frecuencia===f?' active':'');
    btn.textContent = f.charAt(0).toUpperCase()+f.slice(1);
    btn.onclick = () => {
      frecuencia = f;
      frecGrid.querySelectorAll('.frec-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      updateCalc();
    };
    frecGrid.appendChild(btn);
  });
  frecField.appendChild(frecGrid);
  sec.appendChild(frecField);

  // Quincenas
  const quincField = document.createElement('div');
  quincField.className = 'field';
  const quincLbl = document.createElement('label');
  quincLbl.textContent = 'Número de quincenas *';
  quincField.appendChild(quincLbl);
  const quincGrid = document.createElement('div');
  quincGrid.className = 'quinc-grid';
  [1,2,3,4,5,6].forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'quinc-btn' + (quincenas===q?' active':'');
    btn.innerHTML = '<span style="display:block;font-size:14px">'+q+'</span><span style="font-size:9px;font-weight:400">'+(q<=2?'30%':q<=4?'40%':'50%')+'</span>';
    btn.onclick = () => {
      quincenas = q;
      quincGrid.querySelectorAll('.quinc-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      badge.textContent = q+' quincena'+(q>1?'s':'')+' → '+getInteres(q)+'% de interés';
      badge.style.display = 'block';
      updateCalc();
    };
    quincGrid.appendChild(btn);
  });
  quincField.appendChild(quincGrid);
  const badge = document.createElement('div');
  badge.className = 'interes-badge';
  if(quincenas){badge.textContent=quincenas+' quincena'+(quincenas>1?'s':'')+' → '+getInteres(quincenas)+'% de interés';badge.style.display='block';}
  quincField.appendChild(badge);
  sec.appendChild(quincField);

  // Calc box
  const calcBox = document.createElement('div');
  calcBox.className = 'calc-box';
  calcBox.id = 'calc-box';
  calcBox.innerHTML =
    '<div class="calc-row"><span class="calc-key">Capital</span><span class="calc-val" id="c-cap">—</span></div>'+
    '<div class="calc-row"><span class="calc-key">Interés</span><span class="calc-val" id="c-int">—</span></div>'+
    '<div class="calc-row"><span class="calc-key">Número de pagos</span><span class="calc-val" id="c-pag">—</span></div>'+
    '<div class="calc-row"><span class="calc-key">Total a pagar</span><span class="calc-val" id="c-tot" style="font-size:16px;color:var(--navy)">—</span></div>'+
    '<div class="calc-row"><span class="calc-key" id="c-cuota-lbl">Pago por cuota</span><span class="calc-val" id="c-cuo" style="font-size:16px;color:var(--green-deep)">—</span></div>';
  sec.appendChild(calcBox);

  // Tabla
  const tablaWrap = document.createElement('div');
  tablaWrap.id = 'tabla-wrap';
  tablaWrap.style.display = 'none';
  tablaWrap.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:6px">Tabla de pagos</div>'+
    '<div class="amort-wrap"><table class="amort-table">'+
    '<thead><tr><th>#</th><th>Fecha</th><th>Monto</th><th>Capital</th><th>Interés</th></tr></thead>'+
    '<tbody id="tabla-body"></tbody></table></div>';
  sec.appendChild(tablaWrap);

  const montoInput = document.getElementById('monto');
  if(montoInput) montoInput.addEventListener('input', updateCalc);
  if(quincenas) setTimeout(updateCalc, 50);

  function updateCalc() {
    const montoEl = document.getElementById('monto');
    const monto = montoEl ? parseFloat(montoEl.value) : 0;
    if(!monto||!quincenas||monto<100){calcBox.style.display='none';tablaWrap.style.display='none';return;}
    const interes = getInteres(quincenas);
    const numPagos = getNumPagos(quincenas,frecuencia);
    const dias = getDias(frecuencia);
    const total = Math.round(monto*(1+interes/100)*100)/100;
    const cuota = Math.round((total/numPagos)*100)/100;
    const intTotal = total-monto;
    const intC = Math.round((intTotal/numPagos)*100)/100;
    const capC = Math.round((monto/numPagos)*100)/100;
    const fl = frecuencia==='semanal'?'semanal':'quincenal';
    document.getElementById('c-cap').textContent = fmtC(monto);
    document.getElementById('c-int').textContent = fmtC(intTotal)+' ('+interes+'%)';
    document.getElementById('c-pag').textContent = numPagos+' pagos '+fl+'es';
    document.getElementById('c-tot').textContent = fmtC(total);
    document.getElementById('c-cuota-lbl').textContent = 'Pago '+fl;
    document.getElementById('c-cuo').textContent = fmtC(cuota);
    calcBox.style.display = 'block';
    const tbody = document.getElementById('tabla-body');
    tbody.innerHTML = '';
    let saldo = total;
    const hoy = today();
    for(let i=1;i<=numPagos;i++){
      const f=new Date(hoy+'T00:00:00');f.setDate(f.getDate()+dias*i);
      saldo=Math.max(0,Math.round((saldo-cuota)*100)/100);
      const tr=document.createElement('tr');
      tr.innerHTML='<td>'+i+'</td><td>'+fmtD(f.toISOString().split('T')[0])+'</td><td>'+fmtC(cuota)+'</td><td>'+fmtC(capC)+'</td><td>'+fmtC(intC)+'</td>';
      tbody.appendChild(tr);
    }
    tablaWrap.style.display = 'block';
  }

  // ── Cómo recibir el dinero ──
  appendLbl(sec, '¿Cómo quieres recibir tu dinero?');
  const metodoField = document.createElement('div');
  metodoField.className = 'field';
  const metodoGrid = document.createElement('div');
  metodoGrid.className = 'grid2';
  const btnTransfer = document.createElement('button');
  btnTransfer.className = 'frec-btn' + (metodoPago==='transferencia'?' active':'');
  btnTransfer.innerHTML = '<i class="ti ti-building-bank"></i> Transferencia';
  const btnEfectivo = document.createElement('button');
  btnEfectivo.className = 'frec-btn' + (metodoPago==='efectivo'?' active':'');
  btnEfectivo.innerHTML = '<i class="ti ti-cash"></i> Efectivo';
  metodoGrid.appendChild(btnTransfer);
  metodoGrid.appendChild(btnEfectivo);
  metodoField.appendChild(metodoGrid);
  sec.appendChild(metodoField);

  // Bank fields (shown only for transferencia)
  const bankWrap = document.createElement('div');
  bankWrap.style.cssText = 'display:' + (metodoPago==='transferencia'?'flex':'none') + ';flex-direction:column;gap:12px';
  const bancoField = document.createElement('div');
  bancoField.className = 'field';
  bancoField.innerHTML = '<label>Banco *</label>';
  const bancoSel = document.createElement('select');
  bancoSel.id = 'banco';
  ['','BBVA','Banorte','Santander','Citibanamex','HSBC','Scotiabank','Banco Azteca','BanCoppel','Spin by OXXO','Nu','Otro'].forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b || '— Selecciona tu banco —';
    if(fd.banco===b) opt.selected = true;
    bancoSel.appendChild(opt);
  });
  bancoField.appendChild(bancoSel);
  bankWrap.appendChild(bancoField);
  appendField(bankWrap, 'clabe', 'CLABE interbancaria (18 dígitos) *', 'text', '18 dígitos de tu CLABE', fd.clabe||'', {maxlength:'18', inputmode:'numeric'});
  const clabeHint = document.createElement('div');
  clabeHint.style.cssText = 'font-size:10px;color:var(--ink-soft);margin-top:-8px';
  clabeHint.textContent = 'La encuentras en tu app bancaria. Verifica que sea correcta.';
  bankWrap.appendChild(clabeHint);
  sec.appendChild(bankWrap);

  const efectivoNote = document.createElement('div');
  efectivoNote.className = 'info-box';
  efectivoNote.style.display = metodoPago==='efectivo'?'flex':'none';
  efectivoNote.innerHTML = '<i class="ti ti-info-circle"></i><span>Te contactaremos por WhatsApp para coordinar la entrega en efectivo.</span>';
  sec.appendChild(efectivoNote);

  btnTransfer.onclick = () => {
    metodoPago = 'transferencia';
    btnTransfer.classList.add('active'); btnEfectivo.classList.remove('active');
    bankWrap.style.display = 'flex'; efectivoNote.style.display = 'none';
  };
  btnEfectivo.onclick = () => {
    metodoPago = 'efectivo';
    btnEfectivo.classList.add('active'); btnTransfer.classList.remove('active');
    bankWrap.style.display = 'none'; efectivoNote.style.display = 'flex';
  };

  const err = appendErr(sec, 'err4');
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  appendBtn(btnRow,'← Atrás','btn-secondary',()=>{setStep(3);render();});
  const btnNext = appendBtn(btnRow,'Siguiente →','btn-primary',null);
  sec.appendChild(btnRow);
  c.appendChild(sec);

  btnNext.onclick = () => {
    const montoEl = document.getElementById('monto');
    const monto = montoEl ? parseFloat(montoEl.value) : 0;
    if(!monto||monto<100){showErr('err4','Ingresa un monto válido (mínimo $100).');return;}
    if(monto>2000){showErr('err4','El monto máximo para nuevos clientes es $2,000.');return;}
    if(!quincenas){showErr('err4','Selecciona el número de quincenas.');return;}
    if(metodoPago==='transferencia'){
      const banco = val('banco');
      const clabe = val('clabe');
      if(!banco){showErr('err4','Selecciona tu banco.');return;}
      if(!/^\d{18}$/.test(clabe)){showErr('err4','La CLABE debe tener exactamente 18 dígitos.');return;}
      fd.banco = banco; fd.clabe = clabe;
    } else {
      fd.banco = ''; fd.clabe = '';
    }
    fd.metodoEntrega = metodoPago;
    fd.monto=monto; fd.quincenas=quincenas; fd.semanas=quincenas;
    fd.frecuencia=frecuencia; fd.interes=getInteres(quincenas);
    fd.plazo=getNumPagos(quincenas,frecuencia);
    setStep(5); render();
  };
}

// ── Step 5: Firma ──
function s5(c) {
  const sec = document.createElement('div');
  sec.className = 'section';
  appendLbl(sec, 'Firma digital');
  appendInfo(sec, 'Al firmar confirmas que tus datos son verdaderos y aceptas los términos del préstamo.');

  const canvasWrap = document.createElement('div');
  canvasWrap.className = 'canvas-wrap';
  const canvasLbl = document.createElement('div');
  canvasLbl.className = 'canvas-lbl';
  canvasLbl.textContent = 'DIBUJA TU FIRMA CON EL DEDO';
  const canvas = document.createElement('canvas');
  canvas.id = 'firma-canvas';
  canvas.height = 160;
  const canvasHint = document.createElement('div');
  canvasHint.className = 'canvas-hint';
  canvasHint.textContent = 'Usa el dedo o stylus para firmar';
  canvasWrap.appendChild(canvasLbl);
  canvasWrap.appendChild(canvas);
  canvasWrap.appendChild(canvasHint);
  sec.appendChild(canvasWrap);

  const btnBorrar = document.createElement('button');
  btnBorrar.className = 'btn btn-secondary';
  btnBorrar.style.marginTop = '6px';
  btnBorrar.innerHTML = '<i class="ti ti-eraser"></i> Borrar firma';
  sec.appendChild(btnBorrar);

  const err = appendErr(sec, 'err5');
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  appendBtn(btnRow,'← Atrás','btn-secondary',()=>{setStep(4);render();});
  const btnEnviar = appendBtn(btnRow,'Enviar solicitud','btn-success',null);
  btnEnviar.innerHTML = '<i class="ti ti-send"></i> Enviar solicitud';
  sec.appendChild(btnRow);
  c.appendChild(sec);

  // Canvas setup
  let isDrawing=false, ctx=null;
  hasDrawn = false;
  const initCtx = () => {
    canvas.width = canvas.offsetWidth;
    ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle='#1A2340'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  };
  const getPos = e => {
    const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;
    if(e.touches) return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
  };
  canvas.addEventListener('mousedown',e=>{e.preventDefault();if(!ctx)initCtx();isDrawing=true;hasDrawn=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{e.preventDefault();if(!isDrawing||!ctx)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',e=>{e.preventDefault();isDrawing=false;});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(!ctx)initCtx();isDrawing=true;hasDrawn=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing||!ctx)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',e=>{e.preventDefault();isDrawing=false;},{passive:false});
  setTimeout(initCtx,100);

  btnBorrar.onclick = () => {if(!ctx)initCtx();ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);hasDrawn=false;};

  btnEnviar.addEventListener('click', async () => {
    if(!hasDrawn){showErr('err5','Por favor firma antes de enviar.');return;}
    btnEnviar.disabled=true;
    btnEnviar.innerHTML='<i class="ti ti-loader"></i> Enviando...';
    try {
      firmaUrl = await compressImage(canvas.toDataURL('image/png'), 600, 0.85);
      await db.collection('solicitudes').add({
        ...fd,
        firmaClienteUrl: firmaUrl,
        fotoIneUrl: fotoIneUrl,
        fotoIneBackUrl: fotoIneBackUrl,
        fotoDomicilioUrl: fotoDomUrl,
        estado: 'pendiente',
        createdAt: new Date().toISOString(),
      });
      document.getElementById('steps-bar').style.display='none';
      step=99; render();
    } catch(e) {
      console.error(e);
      showErr('err5','Error al enviar. Intenta de nuevo.');
      btnEnviar.disabled=false;
      btnEnviar.innerHTML='<i class="ti ti-send"></i> Enviar solicitud';
    }
  });
}

function renderSuccess(c) {
  const s = document.createElement('div');
  s.className = 'success-screen';
  s.innerHTML =
    '<img src="https://enriquerocham.github.io/varito/LOGO_CUADRADO.png" style="width:90px;height:90px;object-fit:contain;border-radius:16px" onerror="this.style.display=\'none\'"/>'+
    '<h2>¡Solicitud enviada! 🎉</h2>'+
    '<p>Tu solicitud fue recibida correctamente.<br/><br/>En breve recibirás un mensaje de <strong>WhatsApp</strong> confirmando si tu préstamo fue autorizado.<br/><br/>Gracias por confiar en <strong>Varito</strong>. 🪙</p>';
  c.appendChild(s);
}

// ── DOM helpers ──
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function appendLbl(parent,text){const d=document.createElement('div');d.className='section-lbl';d.textContent=text;parent.appendChild(d);return d;}
function appendInfo(parent,text){const d=document.createElement('div');d.className='info-box';d.innerHTML='<i class="ti ti-info-circle"></i><span>'+text+'</span>';parent.appendChild(d);return d;}
function appendGrid(parent){const g=document.createElement('div');g.className='grid2';parent.appendChild(g);return g;}
function appendErr(parent,id){const p=document.createElement('p');p.id=id;p.className='error-msg';parent.appendChild(p);return p;}
function showErr(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'center'});}}
function appendField(parent,id,label,type,placeholder,value,attrs){
  const f=document.createElement('div');f.className='field';
  const l=document.createElement('label');l.textContent=label;f.appendChild(l);
  const inp=document.createElement('input');inp.id=id;inp.type=type;inp.placeholder=placeholder;inp.value=value||'';
  if(attrs) Object.entries(attrs).forEach(([k,v])=>inp.setAttribute(k,v));
  f.appendChild(inp);parent.appendChild(f);return inp;
}
function appendBtn(parent,text,cls,onclick){
  const b=document.createElement('button');b.className='btn '+cls;b.style.flex='1';b.innerHTML=text;
  if(onclick) b.onclick=onclick;parent.appendChild(b);return b;
}
function createPhotoZone(icon,label,sub,fileId){
  const z=document.createElement('div');z.className='photo-zone';
  z.innerHTML='<i class="ti '+icon+'"></i><div class="pz-lbl">'+label+'</div><div class="pz-sub">'+sub+'</div><input type="file" id="'+fileId+'" accept="image/*" style="display:none"/>';
  z.onclick=()=>document.getElementById(fileId).click();
  return z;
}
function createPhotoPreview(prevId,imgId,rmId){
  const p=document.createElement('div');p.className='photo-preview';p.id=prevId;
  p.innerHTML='<img id="'+imgId+'" src="" alt=""/><button class="photo-rm" id="'+rmId+'"><i class="ti ti-x"></i></button>';
  return p;
}
function setupPhoto(fileId,zone,preview,imgId,setter){
  const fileInput=document.getElementById(fileId);
  if(!fileInput) return;
  fileInput.addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      // Compress to max 800px wide, 0.7 quality (~50-80KB)
      const compressed = await compressImage(ev.target.result, 800, 0.7);
      setter(compressed);
      document.getElementById(imgId).src=compressed;
      preview.style.display='block';
      zone.style.display='none';
    };
    reader.readAsDataURL(file);
  });
}

// ── Image compression ──
function compressImage(dataUrl, maxWidth, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

render();
