<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flowi — Tu cartera, clara y segura</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
:root {
  --rose: #C97B9A;
  --rose-light: #F2D9E6;
  --rose-deep: #8B4B6B;
  --mauve: #6B4E7D;
  --mauve-light: #EDE4F3;
  --mauve-deep: #3D2B4F;
  --gold: #E8A020;
  --gold-light: #FDF3DC;
  --gold-mid: #F5C040;
  --gold-deep: #7A4A00;
  --sand: #F7F3EF;
  --sand-mid: #EDE8E2;
  --sand-dark: #DDD6CE;
  --ink: #2A2028;
  --ink-mid: #6B6170;
  --ink-soft: #A89FAD;
  --white: #FFFFFF;
  --success: #4A9B7A;
  --success-light: #E3F4EC;
  --warn: #C47B2B;
  --warn-light: #FEF0DC;
  --danger: #B85050;
  --danger-light: #FBEAEA;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 28px;
  --r-pill: 999px;
  --shadow-sm: 0 1px 4px rgba(42,32,40,0.06);
  --shadow-md: 0 4px 16px rgba(42,32,40,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

#app { display: flex; flex-direction: column; min-height: 100vh; }
.app-shell { display: flex; flex-direction: column; min-height: 100vh; max-width: 430px; margin: 0 auto; background: var(--white); position: relative; }

/* ── Top bar ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; background: var(--white); border-bottom: 0.5px solid var(--sand-mid); position: sticky; top: 0; z-index: 10; }
.top-bar .logo { display: flex; align-items: center; gap: 8px; }
.top-bar .logo .wordmark { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--gold-deep); }
.top-bar .logo .wordmark span { color: var(--gold); }
.top-bar-actions { display: flex; align-items: center; gap: 10px; }

/* ── Coin SVG ── */
.coin-logo { flex-shrink: 0; }

/* ── Hero card ── */
.hero-card { background: var(--gold-deep); margin: 16px; border-radius: var(--r-xl); padding: 22px 22px 20px; position: relative; overflow: hidden; }
.hero-wave { position: absolute; bottom: -8px; right: -16px; opacity: 0.1; pointer-events: none; }
.hero-label { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.hero-amount { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -1.5px; line-height: 1; }
.hero-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; margin-bottom: 16px; }
.hero-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { padding: 5px 12px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.75); cursor: pointer; transition: all 0.15s; }
.chip.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.6); color: #fff; font-weight: 700; }

/* ── Section titles ── */
.section-title { font-size: 13px; font-weight: 600; color: var(--ink); padding: 16px 20px 8px; letter-spacing: 0.2px; display: flex; align-items: center; justify-content: space-between; }
.section-title a { font-size: 11px; color: var(--gold); font-weight: 500; text-decoration: none; cursor: pointer; }

/* ── Quick actions ── */
.quick-actions { display: flex; gap: 10px; padding: 0 16px; }
.qa-btn { flex: 1; background: var(--sand); border-radius: var(--r-lg); padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: background 0.15s; border: none; }
.qa-btn:hover { background: var(--gold-light); }
.qa-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.qa-icon.rose { background: var(--gold-light); color: var(--gold-deep); }
.qa-icon.mauve { background: #FFF0D0; color: #8B5E00; }
.qa-icon.green { background: var(--success-light); color: var(--success); }
.qa-label { font-size: 11px; color: var(--ink-mid); font-weight: 500; text-align: center; }

/* ── Client list ── */
.client-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.client-row { background: var(--white); border: 0.5px solid var(--sand-mid); border-radius: var(--r-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
.client-row:hover { background: var(--sand); }
.c-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.c-info { flex: 1; min-width: 0; }
.c-name { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.c-detail { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.c-right { text-align: right; flex-shrink: 0; }
.c-amount { font-size: 14px; font-weight: 600; color: var(--ink); }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: var(--r-pill); font-size: 10px; font-weight: 600; margin-top: 3px; }
.badge-ok { background: var(--success-light); color: #2D7A54; }
.badge-warn { background: var(--warn-light); color: #8B5E1A; }
.badge-late { background: var(--danger-light); color: #8B2B2B; }
.badge-new { background: var(--gold-light); color: var(--gold-deep); }

/* ── Avatar colors ── */
.av-rose { background: var(--gold-light); color: var(--gold-deep); }
.av-mauve { background: #FFF0D0; color: #8B5E00; }
.av-amber { background: #FFF0DC; color: #8B5E1A; }
.av-teal { background: #DFF3EE; color: #2D6B5A; }
.av-blue { background: #E3EEF9; color: #2D5A8B; }

/* ── Bottom nav ── */
.tab-bar { height: 64px; border-top: 0.5px solid var(--sand-mid); display: flex; align-items: center; justify-content: space-around; padding: 0 4px; background: var(--white); position: sticky; bottom: 0; z-index: 10; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 18px; border-radius: 12px; cursor: pointer; transition: background 0.15s; flex: 1; border: none; background: transparent; }
.tab:hover { background: var(--sand); }
.tab .tab-icon { font-size: 22px; color: var(--ink-soft); }
.tab .tab-lbl { font-size: 10px; color: var(--ink-soft); font-weight: 400; }
.tab.active .tab-icon { color: var(--gold-deep); }
.tab.active .tab-lbl { color: var(--gold-deep); font-weight: 600; }

/* ── Scroll area ── */
.scroll-area { flex: 1; overflow-y: auto; padding-bottom: 8px; }

/* ── Page header ── */
.page-header { background: var(--gold-deep); padding: 52px 20px 20px; position: relative; overflow: hidden; }
.page-header .back-btn { position: absolute; top: 14px; left: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; cursor: pointer; border: none; }
.page-header h1 { font-size: 20px; font-weight: 600; color: #fff; }
.page-header p { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 3px; }

/* ── Stat cards ── */
.stats-row { display: flex; gap: 10px; padding: 14px 16px; background: var(--sand); }
.stat-card { flex: 1; background: var(--white); border-radius: var(--r-md); padding: 12px; border: 0.5px solid var(--sand-mid); text-align: center; }
.stat-val { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.stat-lbl { font-size: 10px; color: var(--ink-soft); }

/* ── Forms ── */
.form-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.5px; text-transform: uppercase; }
.field input, .field select, .field textarea { padding: 11px 14px; border-radius: var(--r-md); border: 1px solid var(--sand-mid); background: var(--sand); font-size: 14px; color: var(--ink); font-family: 'Inter', sans-serif; outline: none; transition: border 0.15s, background 0.15s; -webkit-appearance: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); background: var(--white); }
.field textarea { resize: none; min-height: 72px; line-height: 1.5; }
.field-hint { font-size: 11px; color: var(--ink-soft); }

/* ── Method chips ── */
.method-row { display: flex; gap: 8px; }
.method-chip { flex: 1; padding: 9px 6px; border-radius: var(--r-md); border: 1px solid var(--sand-mid); text-align: center; font-size: 11px; font-weight: 500; color: var(--ink-mid); cursor: pointer; background: var(--sand); transition: all 0.15s; }
.method-chip.active { background: var(--gold-light); border-color: var(--gold); color: var(--gold-deep); }

/* ── Photo upload ── */
.photo-zone { border: 1.5px dashed var(--gold); border-radius: var(--r-lg); padding: 20px; text-align: center; background: var(--gold-light); cursor: pointer; transition: background 0.15s; }
.photo-zone:hover { background: #f5e5b8; }
.photo-zone i { font-size: 28px; color: var(--gold); margin-bottom: 6px; display: block; }
.photo-zone .pz-label { font-size: 12px; color: var(--gold-deep); font-weight: 500; }
.photo-zone .pz-sub { font-size: 10px; color: var(--gold); margin-top: 2px; }
.photo-zone input[type=file] { display: none; }
.photo-preview-box { border-radius: var(--r-lg); overflow: hidden; background: var(--sand-mid); position: relative; }
.photo-preview-box img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
.photo-remove { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(42,32,40,0.6); border: none; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; cursor: pointer; }

/* ── Buttons ── */
.btn { padding: 13px; border-radius: var(--r-lg); font-size: 14px; font-weight: 600; border: none; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; font-family: 'Inter', sans-serif; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--gold-deep); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-success { background: var(--success); color: #fff; }
.btn-mauve { background: var(--gold-deep); color: #fff; }
.btn-secondary { background: var(--sand); border: 1px solid var(--sand-mid); color: var(--ink-mid); }
.btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-light); }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: var(--r-md); width: auto; flex: 1; }
.btn-row { display: flex; gap: 8px; padding: 0 16px 16px; }

/* ── Payment history ── */
.payment-list { padding: 0 16px 16px; }
.pmt-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--sand-mid); }
.pmt-row:last-child { border-bottom: none; }
.pmt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pmt-dot.paid { background: var(--success); }
.pmt-dot.pending { background: var(--ink-soft); }
.pmt-dot.late { background: var(--danger); }
.pmt-info { flex: 1; }
.pmt-date { font-size: 12px; color: var(--ink-mid); }
.pmt-note { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
.pmt-amount { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; }

/* ── Document ── */
.doc-card { background: var(--white); border: 1px solid var(--sand-mid); border-radius: var(--r-lg); overflow: hidden; margin: 0 16px; }
.doc-card-header { padding: 14px 16px; border-bottom: 1px solid var(--sand-mid); display: flex; justify-content: space-between; align-items: flex-start; }
.doc-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--gold-deep); }
.doc-logo span { color: var(--gold); }
.doc-type-lbl { font-size: 9px; letter-spacing: 2px; color: var(--ink-soft); text-transform: uppercase; margin-top: 2px; }
.doc-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 7px; }
.doc-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.doc-key { font-size: 11px; color: var(--ink-soft); flex-shrink: 0; }
.doc-val { font-size: 12px; font-weight: 500; color: var(--ink); text-align: right; }
.doc-divider { height: 0.5px; background: var(--sand-mid); margin: 4px 0; }
.doc-amount-box { background: var(--gold-light); border-radius: var(--r-md); padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
.doc-amount-lbl { font-size: 10px; color: var(--gold-deep); font-weight: 600; }
.doc-amount-val { font-size: 18px; font-weight: 700; color: var(--gold-deep); }

/* ── Folio pill ── */
.folio-pill { background: var(--sand); border: 0.5px solid var(--sand-mid); border-radius: var(--r-md); padding: 9px 14px; margin: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.folio-key { font-size: 10px; color: var(--ink-soft); }
.folio-val { font-size: 11px; font-weight: 600; color: var(--ink); font-family: monospace; }

/* ── Amortization table ── */
.amort-wrap { overflow-x: auto; margin: 0 16px; border-radius: var(--r-md); border: 0.5px solid var(--sand-mid); }
.amort-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.amort-table th { background: var(--gold-light); color: var(--gold-deep); font-weight: 600; padding: 8px 10px; text-align: left; }
.amort-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--sand-mid); color: var(--ink-mid); }
.amort-table tr:last-child td { border-bottom: none; }
.amort-table tr.paid td { color: var(--ink-soft); }
.amort-table tr.paid td:first-child::before { content: "✓ "; color: var(--success); }
.amort-table tr.current td { color: var(--ink); font-weight: 600; background: #FFFBF0; }
.amort-table tr.late td { color: var(--danger); }

/* ── Empty state ── */
.empty-state { padding: 40px 20px; text-align: center; }
.empty-state i { font-size: 40px; color: var(--gold-light); margin-bottom: 12px; display: block; }
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--ink-mid); margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

/* ── Toast ── */
.toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--ink); color: #fff; padding: 12px 18px; border-radius: var(--r-pill); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: toastIn 0.25s ease; white-space: nowrap; pointer-events: all; box-shadow: var(--shadow-md); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(42,32,40,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
.modal-sheet { background: var(--white); border-radius: var(--r-xl) var(--r-xl) 0 0; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; padding-bottom: 32px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--sand-mid); border-radius: 2px; margin: 12px auto 16px; }
.modal-title { font-size: 17px; font-weight: 600; color: var(--ink); padding: 0 20px 16px; }

/* ── FAB ── */
.fab { position: fixed; bottom: 80px; right: calc(50% - 215px + 16px); width: 50px; height: 50px; border-radius: 50%; background: var(--gold); border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; cursor: pointer; box-shadow: 0 4px 16px rgba(232,160,32,0.4); transition: transform 0.15s; }
.fab:hover { transform: scale(1.08); }

/* ── Alert pill ── */
.alert-pill { display: flex; align-items: center; gap: 8px; background: var(--warn-light); border-radius: var(--r-md); padding: 10px 14px; font-size: 12px; color: #8B5E1A; }

/* ── Toggle ── */
.toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 0.5px solid var(--sand-mid); }
.toggle-label { font-size: 13px; color: var(--ink-mid); }
.toggle { width: 40px; height: 22px; border-radius: 11px; background: var(--sand-mid); position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0; }
.toggle.on { background: var(--gold); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left 0.2s; }
.toggle.on .toggle-thumb { left: 21px; }

/* ── Search ── */
.search-bar { display: flex; align-items: center; gap: 8px; background: var(--sand); border: 0.5px solid var(--sand-mid); border-radius: var(--r-pill); padding: 9px 14px; margin: 10px 16px; }
.search-bar i { font-size: 16px; color: var(--ink-soft); }
.search-bar input { border: none; background: transparent; font-size: 14px; color: var(--ink); outline: none; flex: 1; font-family: 'Inter', sans-serif; }

/* ── Confirm summary ── */
.confirm-card { background: var(--gold-light); border-radius: var(--r-lg); padding: 14px 16px; margin: 0 16px; }
.confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid rgba(122,74,0,0.12); }
.confirm-row:last-child { border-bottom: none; }
.confirm-key { font-size: 11px; color: var(--gold-deep); font-weight: 500; }
.confirm-val { font-size: 13px; color: var(--gold-deep); font-weight: 600; }

/* ── Info box ── */
.info-box { background: var(--sand); border-radius: var(--r-md); padding: 10px 12px; font-size: 12px; color: var(--ink-mid); line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
.info-box i { color: var(--gold); font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 2px; }

/* ── Utility ── */
.text-success { color: var(--success) !important; }
.text-danger { color: var(--danger) !important; }
.text-warn { color: var(--warn) !important; }
.text-muted { color: var(--ink-soft) !important; }
.fw-600 { font-weight: 600; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.p-16 { padding: 16px; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.align-center { align-items: center; }
.justify-between { justify-content: space-between; }

</style>

  const load = (key, fallback) => { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; } catch { return fallback; } };

    getCliente: (id) => state.clientes.find(c => c.id === id),
    getPrestamo: (id) => state.prestamos.find(p => p.id === id),
    getPagosByPrestamo: (pid) => state.pagos.filter(p => p.prestamoId === pid).sort((a, b) => new Date(a.fecha) - new Date(b.fecha)),
    getPrestamosByCliente: (cid) => state.prestamos.filter(p => p.clienteId === cid),

    getDomicilioCompleto: (c) => {
      const parts = [c.calle, c.numExt ? `#${c.numExt}` : '', c.numInt ? `Int. ${c.numInt}` : '', c.colonia, c.cp, c.ciudad].filter(Boolean);

      const dias = freq[prestamo.frecuencia] || 15;
      const pagosHechos = state.pagos.filter(pg => pg.prestamoId === prestamo.id);
      for (let i = 1; i <= prestamo.plazo; i++) {
        const fecha = new Date(prestamo.fechaInicio + 'T00:00:00');
        fecha.setDate(fecha.getDate() + dias * i);
        const fechaStr = fecha.toISOString().split('T')[0];
        const pagoHecho = pagosHechos.find(pg => pg.numCuota === i);
        saldo = Math.max(0, saldo - prestamo.pagoCuota);
        const hoy = new Date().toISOString().split('T')[0];
        let estado = 'pendiente';
        if (pagoHecho) estado = 'pagado';
        else if (fechaStr < hoy) estado = 'vencido';
        else if (fechaStr === hoy) estado = 'hoy';
        cuotas.push({ num: i, fecha: fechaStr, monto: prestamo.pagoCuota, saldoRestante: saldo, estado, pagoHecho });
      }
      return cuotas;
    },

    calcPrestamo: (monto, interesPct, plazo) => {
      const total = Math.round(monto * (1 + interesPct / 100) * 100) / 100;
      const cuota = Math.round((total / plazo) * 100) / 100;
      return { total, cuota };
    },
  };
})();
</script><script>const Fmt = {
  currency: (n) => '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
  date: (str) => {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  },
  dateShort: (str) => {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    return `${d}/${m}/${y.slice(2)}`;
  },
  initials: (nombre) => nombre.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(),
  avatarColor: (nombre) => {
    const colors = ['av-rose','av-mauve','av-amber','av-teal','av-blue'];
    let h = 0;
    for (let c of nombre) h = (h * 31 + c.charCodeAt(0)) % colors.length;
    return colors[Math.abs(h)];
  },
  folioPagare: (num) => `VR-PAG-${String(num).padStart(4,'0')}`,
  folioRecibo: (prestamoNum, cuotaNum) => `VR-REC-${String(prestamoNum).padStart(4,'0')}-${String(cuotaNum).padStart(2,'0')}`,
  today: () => new Date().toISOString().split('T')[0],
  daysLate: (fechaStr) => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fecha = new Date(fechaStr + 'T00:00:00');
    const diff = Math.floor((hoy - fecha) / 86400000);
    return Math.max(0, diff);
  },
  frecuenciaLabel: (f) => ({ semanal: 'Semanal', quincenal: 'Quincenal', mensual: 'Mensual' }[f] || f),
  statusLabel: (e) => ({ activo: 'Activo', liquidado: 'Liquidado', atrasado: 'Atrasado' }[e] || e),
  importe: (n) => {
    const unidades = ['','un ','dos ','tres ','cuatro ','cinco ','seis ','siete ','ocho ','nueve '];
    const decenas = ['','diez ','veinte ','treinta ','cuarenta ','cincuenta ','sesenta ','setenta ','ochenta ','noventa '];
    const especiales = ['diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
    const centenas = ['','ciento ','doscientos ','trescientos ','cuatrocientos ','quinientos ','seiscientos ','setecientos ','ochocientos ','novecientos '];
    const miles = ['','mil ','dos mil ','tres mil ','cuatro mil ','cinco mil ','seis mil ','siete mil ','ocho mil ','nueve mil ','diez mil ','once mil ','doce mil ','trece mil ','catorce mil ','quince mil ','dieciséis mil ','diecisiete mil ','dieciocho mil ','diecinueve mil '];
    let entero = Math.floor(n);
    let cents = Math.round((n - entero) * 100);
    let result = '';
    if (entero >= 20000) return entero.toLocaleString('es-MX') + ' pesos ' + String(cents).padStart(2,'0') + '/100 M.N.';
    if (entero >= 1000) { result += miles[Math.floor(entero/1000)]; entero %= 1000; }
    if (entero >= 100) { result += centenas[Math.floor(entero/100)]; entero %= 100; }
    if (entero >= 10 && entero < 20) { result += especiales[entero-10] + ' '; entero = 0; }
    else if (entero >= 20) { result += decenas[Math.floor(entero/10)]; entero %= 10; }
    if (entero > 0) result += unidades[entero];
    return result.trim().charAt(0).toUpperCase() + result.trim().slice(1) + ' pesos ' + String(cents).padStart(2,'0') + '/100 M.N.';
  },
};

  body{font-family:Arial,sans-serif;color:#1a1a1a;background:#fff;padding:32px;max-width:420px;margin:0 auto}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
  .logo{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:#3D2B4F}
  .logo span{color:#C97B9A}
  .logo-sub{font-size:9px;color:#aaa;margin-top:1px}
  .folio{font-size:10px;font-family:monospace;color:#888;text-align:right}
  .amount-box{background:#E3F4EC;border-radius:8px;padding:16px;text-align:center;margin:14px 0}
  .amount-lbl{font-size:9px;color:#2D7A54;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
  .amount-val{font-size:32px;font-weight:700;color:#2D7A54;margin:4px 0}
  .amount-letras{font-size:10px;color:#4A9B7A;font-style:italic}
  hr{border:none;border-top:0.5px solid #eee;margin:10px 0}
  table{width:100%;font-size:11px;border-collapse:collapse}
  table td{padding:7px 0;border-bottom:0.5px solid #f5f5f5}
  table td:first-child{color:#888;font-weight:600}
  table td:last-child{text-align:right;color:#1a1a1a}
  .saldo-row td{font-size:14px;color:#8B4B6B;font-weight:700;border-bottom:none;padding-top:12px}
  .acreedor{margin-top:18px;text-align:center;padding-top:12px;border-top:0.5px solid #eee}
  .acreedor-name{font-size:11px;font-weight:700;color:#3D2B4F}
  .acreedor-role{font-size:9px;color:#aaa;margin-top:1px}
  .footer{margin-top:14px;font-size:9px;color:#ccc;text-align:center}
  @media print{body{padding:16px} @page{margin:1cm}}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">varito</div>
    <div class="logo-sub">Comprobante de pago</div>
  </div>
  <div class="folio">
    <div style="font-weight:700">${folio}</div>
    <div>${Fmt.date(pago.fecha)}</div>
    <div>${new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</div>
  </div>
</div>
<div class="amount-box">
  <div class="amount-lbl">Pago recibido</div>
  <div class="amount-val">${Fmt.currency(pago.monto)}</div>
  <div class="amount-letras">${Fmt.importe(pago.monto)}</div>
</div>
<table>
  <tr><td>Cliente</td><td>${cliente.nombre}</td></tr>
  <tr><td>Préstamo</td><td>${Fmt.folioPagare(prestamo.folioNum)}</td></tr>
  <tr><td>Fecha de pago</td><td>${Fmt.date(pago.fecha)}</td></tr>
  <tr><td>Método</td><td>${pago.metodo.charAt(0).toUpperCase()+pago.metodo.slice(1)}</td></tr>
  ${pago.folio ? `<tr><td>Folio / referencia</td><td style="font-size:9px;font-family:monospace">${pago.folio}</td></tr>` : ''}
  ${pago.nota ? `<tr><td>Nota</td><td>${pago.nota}</td></tr>` : ''}
  <tr><td>Pago número</td><td>${pagosCount} de ${prestamo.plazo}</td></tr>
  <tr class="saldo-row"><td>Saldo restante</td><td>${Fmt.currency(saldo)}</td></tr>
</table>
${pago.comprobanteUrl ? `<div style="margin-top:12px;text-align:center"><div style="font-size:9px;color:#aaa;margin-bottom:4px">Comprobante adjunto</div><img src="${pago.comprobanteUrl}" style="max-width:100%;border-radius:6px;border:0.5px solid #eee"/></div>` : ''}
<div class="acreedor">
  <div class="acreedor-name">${Store.ACREEDORA}</div>
  <div class="acreedor-role">Acreedora · Varito</div>
</div>
<div class="footer">${folio} · Generado el ${new Date().toLocaleString('es-MX')}<br>Este recibo es comprobante válido de pago.</div>
</body>
</html>`;
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(() => w.print(), 700);
  },
};
</script><script>const Toast = {
  container: null,
  init() {
    this.container = document.createElement('div');
    this.container.className = 'toast-container';
    document.body.appendChild(this.container);
  },
  show(msg, type = '', duration = 2800) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: 'ti-check', error: 'ti-x', '': 'ti-info-circle' };
    t.innerHTML = `<i class="ti ${icons[type] || 'ti-info-circle'}"></i> ${msg}`;
    this.container.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
  },
  success: (m) => Toast.show(m, 'success'),
  error: (m) => Toast.show(m, 'error'),
};

const Modal = {
  active: null,
  open(contentFn, title = '') {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    const sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    sheet.innerHTML = `<div class="modal-handle"></div>${title ? `<div class="modal-title">${title}</div>` : ''}`;
    const body = document.createElement('div');
    body.appendChild(contentFn());
    sheet.appendChild(body);
    backdrop.appendChild(sheet);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) Modal.close(); });
    document.body.appendChild(backdrop);
    this.active = backdrop;
  },
  close() {
    if (this.active) { this.active.remove(); this.active = null; }
  },
};
</script><script>const Dashboard = {
  filtro: 'todos',
  render() {
    const stats = Store.getStats();
    const clientes = Store.getClientes();
    const prestamos = Store.getPrestamos();
    const pagos = Store.getPagos();

    const getEstadoCliente = (clienteId) => {
      const ps = Store.getPrestamosByCliente(clienteId).filter(p => p.estado === 'activo');
      if (!ps.length) return 'inactivo';
      const tabla = ps.flatMap(p => Store.getTableraAmortizacion(p));
      const vencidas = tabla.filter(c => c.estado === 'vencido').length;
      const hoy = tabla.filter(c => c.estado === 'hoy').length;
      if (vencidas > 0) return 'atrasado';
      if (hoy > 0) return 'hoy';
      return 'corriente';
    };

    let clientesFiltrados = clientes.filter(c => {
      const ps = Store.getPrestamosByCliente(c.id).filter(p => p.estado === 'activo');
      if (this.filtro === 'todos') return ps.length > 0;
      const estado = getEstadoCliente(c.id);
      if (this.filtro === 'corriente') return estado === 'corriente' || estado === 'hoy';
      if (this.filtro === 'atrasado') return estado === 'atrasado';
      return true;
    });

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="top-bar">
        <div>
          <div style="font-size:12px;color:var(--ink-soft)">Bienvenida,</div>
          <div class="logo">varito</div>
        </div>
        <div class="top-bar-actions">
          <button onclick="App.navigate('reportes')" style="background:none;border:none;cursor:pointer;padding:4px">
            <i class="ti ti-chart-bar" style="font-size:22px;color:var(--ink-mid)"></i>
          </button>
        </div>
      </div>

      <div class="scroll-area">
        <div class="hero-card">
          <svg class="hero-wave" width="180" height="100" viewBox="0 0 180 100" fill="none">
            <path d="M0 50 Q45 10 90 50 Q135 90 180 50" stroke="white" stroke-width="2.5" fill="none"/>
            <path d="M0 70 Q45 30 90 70 Q135 110 180 70" stroke="white" stroke-width="1.5" fill="none"/>
          </svg>
          <div class="hero-label">Cartera activa</div>
          <div class="hero-amount">${Fmt.currency(stats.cartera)}</div>
          <div class="hero-sub">${stats.activos} préstamo${stats.activos !== 1 ? 's' : ''} activo${stats.activos !== 1 ? 's' : ''} · ${stats.liquidados} liquidado${stats.liquidados !== 1 ? 's' : ''}</div>
          <div class="hero-chips">
            <div class="chip ${this.filtro === 'todos' ? 'active' : ''}" data-filtro="todos">Todos</div>
            <div class="chip ${this.filtro === 'corriente' ? 'active' : ''}" data-filtro="corriente">Al corriente</div>
            <div class="chip ${this.filtro === 'atrasado' ? 'active' : ''}" data-filtro="atrasado">Con atraso</div>
          </div>
        </div>

        <div class="section-title">Acciones rápidas</div>
        <div class="quick-actions">
          <button class="qa-btn" onclick="App.navigate('nuevoCliente')">
            <div class="qa-icon rose"><i class="ti ti-user-plus"></i></div>
            <span class="qa-label">Nuevo cliente</span>
          </button>
          <button class="qa-btn" onclick="App.navigate('nuevoPrestamo')">
            <div class="qa-icon mauve"><i class="ti ti-cash"></i></div>
            <span class="qa-label">Nuevo préstamo</span>
          </button>
          <button class="qa-btn" onclick="App.navigate('clientes')">
            <div class="qa-icon green"><i class="ti ti-list"></i></div>
            <span class="qa-label">Ver cartera</span>
          </button>
        </div>

        <div class="section-title">
          <span>Clientes activos</span>
          <a onclick="App.navigate('clientes')">Ver todos <i class="ti ti-arrow-right" style="font-size:11px"></i></a>
        </div>

        <div class="client-list">
          ${clientesFiltrados.length === 0 ? `
            <div class="empty-state">
              <i class="ti ti-users"></i>
              <h3>Sin clientes activos</h3>
              <p>Agrega tu primer cliente para comenzar</p>
            </div>
          ` : clientesFiltrados.slice(0, 5).map(c => {
            const ps = Store.getPrestamosByCliente(c.id).filter(p => p.estado === 'activo');
            const saldo = ps.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
            const estado = getEstadoCliente(c.id);
            const badge = estado === 'atrasado'
              ? `<span class="badge badge-late">Con atraso</span>`
              : estado === 'hoy'
              ? `<span class="badge badge-warn">Vence hoy</span>`
              : `<span class="badge badge-ok">Al corriente</span>`;
            const freq = ps[0] ? Fmt.frecuenciaLabel(ps[0].frecuencia) : '';
            return `
              <div class="client-row" onclick="App.navigate('clienteDetalle', '${c.id}')">
                <div class="c-avatar ${Fmt.avatarColor(c.nombre)}">${Fmt.initials(c.nombre)}</div>
                <div class="c-info">
                  <div class="c-name">${c.nombre}</div>
                  <div class="c-detail">${freq} · ${ps.length} préstamo${ps.length !== 1 ? 's' : ''}</div>
                </div>
                <div class="c-right">
                  <div class="c-amount">${Fmt.currency(saldo)}</div>
                  ${badge}
                </div>
              </div>`;
          }).join('')}
        </div>
        <div style="height:16px"></div>
      </div>
    `;

    el.querySelectorAll('.chip[data-filtro]').forEach(chip => {
      chip.addEventListener('click', () => {
        this.filtro = chip.dataset.filtro;
        App.renderView();
      });
    });

    return el;
  }
};
</script><script>const Clientes = {
  query: '',
  render() {
    const clientes = Store.getClientes();
    const filtered = clientes.filter(c =>
      c.nombre.toLowerCase().includes(this.query.toLowerCase()) ||
      c.telefono.includes(this.query)
    );

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" onclick="App.navigate('dashboard')"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px">
          <h1 style="font-size:20px">Clientes</h1>
          <p>${clientes.length} registrados</p>
        </div>
      </div>
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Buscar por nombre o teléfono..." id="search-input" value="${this.query}" />
      </div>
      <div class="scroll-area" style="padding-bottom:80px">
        <div style="padding:6px 16px 12px">
          ${filtered.length === 0 ? `
            <div class="empty-state">
              <i class="ti ti-user-search"></i>
              <h3>Sin resultados</h3>
              <p>Intenta con otro nombre o teléfono</p>
            </div>
          ` : filtered.map(c => {
            const ps = Store.getPrestamosByCliente(c.id);
            const activos = ps.filter(p => p.estado === 'activo');
            const saldo = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
            const hasAtraso = activos.some(p => {
              const tabla = Store.getTableraAmortizacion(p);
              return tabla.some(t => t.estado === 'vencido');
            });
            return `
              <div class="client-row" style="margin-bottom:8px" onclick="App.navigate('clienteDetalle', '${c.id}')">
                <div class="c-avatar ${Fmt.avatarColor(c.nombre)}">${Fmt.initials(c.nombre)}</div>
                <div class="c-info">
                  <div class="c-name">${c.nombre}</div>
                  <div class="c-detail"><i class="ti ti-phone" style="font-size:10px"></i> ${c.telefono}</div>
                </div>
                <div class="c-right">
                  ${activos.length > 0
                    ? `<div class="c-amount">${Fmt.currency(saldo)}</div>
                       <span class="badge ${hasAtraso ? 'badge-late' : 'badge-ok'}">${hasAtraso ? 'Con atraso' : 'Al corriente'}</span>`
                    : `<span class="badge badge-new">${ps.length > 0 ? 'Liquidado' : 'Nuevo'}</span>`
                  }
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
      <button class="fab" onclick="App.navigate('nuevoCliente')">
        <i class="ti ti-user-plus"></i>
      </button>
    `;

    el.querySelector('#search-input').addEventListener('input', (e) => {
      this.query = e.target.value;
      App.renderView();
    });

    return el;
  }
};
</script><script>const ClienteDetalle = {
  render(clienteId) {
    const cliente = Store.getCliente(clienteId);
    if (!cliente) return App.navigate('clientes');

    const prestamos = Store.getPrestamosByCliente(clienteId);
    const activos = prestamos.filter(p => p.estado === 'activo');
    const saldoTotal = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
    const pagosTotal = prestamos.reduce((s, p) => s + Store.getPagosCount(p.id), 0);

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header">
        <button class="back-btn" onclick="App.navigate('clientes')"><i class="ti ti-arrow-left"></i></button>
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
          <div class="c-avatar ${Fmt.avatarColor(cliente.nombre)}" style="width:50px;height:50px;font-size:16px">${Fmt.initials(cliente.nombre)}</div>
          <div>
            <h1>${cliente.nombre}</h1>
            <p><i class="ti ti-phone" style="font-size:11px"></i> ${cliente.telefono}</p>
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val">${Fmt.currency(saldoTotal)}</div>
          <div class="stat-lbl">Saldo total</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${activos.length}</div>
          <div class="stat-lbl">Activos</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${pagosTotal}</div>
          <div class="stat-lbl">Pagos hechos</div>
        </div>
      </div>

      <div class="scroll-area" style="padding-bottom:16px">
        <div class="section-title">
          Datos del cliente
          <a onclick="App.navigate('editarCliente','${clienteId}')"><i class="ti ti-edit" style="font-size:13px"></i> Editar</a>
        </div>
        <div style="padding:0 16px;display:flex;flex-direction:column;gap:6px">
          <div class="info-box"><i class="ti ti-map-pin"></i><span>${Store.getDomicilioCompleto(cliente)}</span></div>
          ${cliente.ine ? `<div class="info-box"><i class="ti ti-id"></i><span>INE: ${cliente.ine}</span></div>` : ''}
          ${(cliente.refNombre) ? `<div class="info-box"><i class="ti ti-user"></i><span>Ref: ${cliente.refNombre}${cliente.refParentesco ? ' ('+cliente.refParentesco+')' : ''} · ${cliente.refTelefono || ''}${cliente.refDireccion ? ' · '+cliente.refDireccion : ''}</span></div>` : ''}
          <div class="info-box"><i class="ti ti-calendar"></i><span>Cliente desde ${Fmt.date(cliente.createdAt)}</span></div>
          <div style="display:flex;gap:8px;margin-top:4px">
            <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:${cliente.fotoIneUrl ? 'var(--success)' : 'var(--ink-soft)'}"><i class="ti ti-id" style="font-size:14px"></i> INE ${cliente.fotoIneUrl ? '✓' : 'pendiente'}</div>
            <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:${cliente.fotoDomicilioUrl ? 'var(--success)' : 'var(--ink-soft)'}"><i class="ti ti-home" style="font-size:14px"></i> Domicilio ${cliente.fotoDomicilioUrl ? '✓' : 'pendiente'}</div>
          </div>
        </div>

        ${prestamos.length === 0 ? `
          <div class="empty-state" style="padding-top:24px">
            <i class="ti ti-cash"></i>
            <h3>Sin préstamos</h3>
            <p>Crea el primer préstamo para este cliente</p>
          </div>
        ` : prestamos.map(p => {
          const pagosHechos = Store.getPagosCount(p.id);
          const saldo = Store.getSaldoRestante(p.id);
          const tabla = Store.getTableraAmortizacion(p);
          const vencidas = tabla.filter(t => t.estado === 'vencido').length;
          const pagosLista = Store.getPagosByPrestamo(p.id);

          return `
            <div class="section-title" style="margin-top:8px">
              Préstamo ${Fmt.folioPagare(p.folioNum)}
              <span class="badge ${p.estado === 'liquidado' ? 'badge-ok' : vencidas > 0 ? 'badge-late' : 'badge-new'}" style="font-size:10px">
                ${p.estado === 'liquidado' ? 'Liquidado' : vencidas > 0 ? `${vencidas} vencido${vencidas>1?'s':''}` : 'Activo'}
              </span>
            </div>

            <div class="stats-row" style="padding-top:0">
              <div class="stat-card">
                <div class="stat-val">${Fmt.currency(p.monto)}</div>
                <div class="stat-lbl">Capital</div>
              </div>
              <div class="stat-card">
                <div class="stat-val">${pagosHechos}/${p.plazo}</div>
                <div class="stat-lbl">Pagos</div>
              </div>
              <div class="stat-card">
                <div class="stat-val" style="${saldo > 0 ? 'color:var(--rose-deep)' : 'color:var(--success)'}">${Fmt.currency(saldo)}</div>
                <div class="stat-lbl">Saldo</div>
              </div>
            </div>

            <div class="btn-row" style="padding-top:0">
              ${p.estado === 'activo' ? `<button class="btn btn-primary btn-sm" onclick="App.navigate('registrarPago','${p.id}')"><i class="ti ti-plus"></i> Registrar pago</button>` : ''}
              <button class="btn btn-secondary btn-sm" onclick="App.navigate('verTabla','${p.id}')"><i class="ti ti-table"></i> Tabla</button>
              <button class="btn btn-secondary btn-sm" onclick="PDF.generarPagare(Store.getPrestamo('${p.id}'), Store.getCliente('${clienteId}'))"><i class="ti ti-file-text"></i> Pagaré</button>
            </div>

            <div class="section-title" style="font-size:12px;padding-top:4px">Historial de pagos</div>
            <div class="payment-list">
              ${pagosLista.length === 0
                ? `<div style="padding:12px 0;font-size:13px;color:var(--ink-soft);text-align:center">Sin pagos registrados aún</div>`
                : pagosLista.slice().reverse().map((pg, i) => `
                <div class="pmt-row">
                  <div class="pmt-dot paid"></div>
                  <div class="pmt-info">
                    <div class="pmt-date">${Fmt.date(pg.fecha)}</div>
                    <div class="pmt-note">${pg.metodo.charAt(0).toUpperCase()+pg.metodo.slice(1)}${pg.folio ? ' · ' + pg.folio : ''}${pg.nota ? ' · ' + pg.nota : ''}${pg.comprobanteUrl ? ' · <span style="color:var(--rose)"><i class="ti ti-photo" style="font-size:11px"></i> Con comprobante</span>' : ''}</div>
                  </div>
                  <div>
                    <div class="pmt-amount">${Fmt.currency(pg.monto)}</div>
                  </div>
                  <button onclick="PDF.generarRecibo(Store.getPagos().find(x=>x.id==='${pg.id}'), Store.getPrestamo('${p.id}'), Store.getCliente('${clienteId}'), ${pagosLista.length - i})" style="background:none;border:none;cursor:pointer;padding:4px" title="Ver comprobante">
                    <i class="ti ti-receipt" style="font-size:16px;color:var(--rose-deep)"></i>
                  </button>
                </div>`).join('')
              }
            </div>
          `;
        }).join('')}

        <div style="padding:8px 16px 16px">
          <button class="btn btn-mauve" onclick="App.navigate('nuevoPrestamo', '${clienteId}')">
            <i class="ti ti-plus"></i> Nuevo préstamo para este cliente
          </button>
        </div>
      </div>
    `;
    return el;
  }
};
</script><script>const NuevoCliente = {
  render(clienteId) {
    const editing = clienteId ? Store.getCliente(clienteId) : null;
    const title = editing ? 'Editar cliente' : 'Nuevo cliente';
    const back = editing ? () => App.navigate('clienteDetalle', clienteId) : () => App.navigate('clientes');
    const e = (f) => editing?.[f] || '';

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px"><h1>${title}</h1><p>Expediente del cliente</p></div>
      </div>
      <div class="scroll-area" style="padding-bottom:16px">
        <div class="info-box" style="margin:12px 16px">
          <i class="ti ti-info-circle"></i>
          <span>Los campos con * son obligatorios. Adjunta INE y comprobante de domicilio como evidencia.</span>
        </div>
        <div class="form-body">

          <div style="font-size:11px;font-weight:700;color:var(--mauve);letter-spacing:1px;padding:4px 0 2px">DATOS PERSONALES</div>
          <div class="field"><label>Nombre completo *</label>
            <input type="text" id="nombre" placeholder="Nombre y apellidos completos" value="${e('nombre')}"/>
          </div>

            <div class="photo-zone" id="zone-ine" onclick="document.getElementById('file-ine').click()">
              <i class="ti ti-id"></i>

            <div id="prev-ine" style="display:none" class="photo-preview-box">

            </div>
          </div>

          <div class="field">
            <label>Comprobante de domicilio <span style="font-size:10px;color:var(--ink-soft);font-weight:400;text-transform:none">— reciente (máx 3 meses)</span></label>
            <div class="photo-zone" id="zone-dom" onclick="document.getElementById('file-dom').click()" style="background:var(--mauve-light);border-color:var(--mauve)">
              <i class="ti ti-home" style="color:var(--mauve)"></i>
              <div class="pz-label" style="color:var(--mauve-deep)">Fotografiar o adjuntar comprobante</div>
              <div class="pz-sub" style="color:var(--mauve)">Luz, agua, gas, estado de cuenta</div>
              <input type="file" id="file-dom" accept="image/*"/>
            </div>
            <div id="prev-dom" style="display:none" class="photo-preview-box">
              <img id="img-dom" src="" alt="Comprobante domicilio"/>
              <button class="photo-remove" id="rm-dom"><i class="ti ti-x"></i></button>
            </div>
          </div>

          <button class="btn btn-primary" id="save-btn">
            <i class="ti ti-check"></i> ${editing ? 'Guardar cambios' : 'Registrar cliente'}
          </button>
          <button class="btn btn-secondary" id="cancel-btn">Cancelar</button>
        </div>
      </div>
    `;

    el.querySelector('#back-btn').onclick = back;
    el.querySelector('#cancel-btn').onclick = back;

    let ineUrl = editing?.fotoIneUrl || null;
    let domUrl = editing?.fotoDomicilioUrl || null;

    const setupPhoto = (fileId, zoneId, prevId, imgId, rmId, getUrl, setUrl) => {
      const file = el.querySelector(`#${fileId}`);
      const zone = el.querySelector(`#${zoneId}`);
      const prev = el.querySelector(`#${prevId}`);
      const img = el.querySelector(`#${imgId}`);
      const rm = el.querySelector(`#${rmId}`);

      if (getUrl()) { img.src = getUrl(); prev.style.display = 'block'; zone.style.display = 'none'; }

      file.addEventListener('change', (ev) => {
        const f = ev.target.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = (e) => { setUrl(e.target.result); img.src = e.target.result; prev.style.display = 'block'; zone.style.display = 'none'; };
        reader.readAsDataURL(f);
      });
      rm.addEventListener('click', () => { setUrl(null); prev.style.display = 'none'; zone.style.display = 'block'; });
    };

    setupPhoto('file-ine','zone-ine','prev-ine','img-ine','rm-ine', () => ineUrl, (v) => ineUrl = v);
    setupPhoto('file-dom','zone-dom','prev-dom','img-dom','rm-dom', () => domUrl, (v) => domUrl = v);

    el.querySelector('#save-btn').addEventListener('click', () => {
      const nombre = el.querySelector('#nombre').value.trim();
      const telefono = el.querySelector('#telefono').value.trim();
      const calle = el.querySelector('#calle').value.trim();
      const numExt = el.querySelector('#numExt').value.trim();
      const colonia = el.querySelector('#colonia').value.trim();
      const ciudad = el.querySelector('#ciudad').value.trim();
      const refNombre = el.querySelector('#refNombre').value.trim();
      const refParentesco = el.querySelector('#refParentesco').value.trim();
      const refTelefono = el.querySelector('#refTelefono').value.trim();

      if (!nombre || !telefono) { Toast.error('Nombre y teléfono son obligatorios'); return; }
      if (!calle || !numExt || !colonia || !ciudad) { Toast.error('Completa el domicilio'); return; }
      if (!refNombre || !refParentesco || !refTelefono) { Toast.error('Completa la referencia personal'); return; }

      const data = {
        nombre, telefono,
        calle, numExt, numInt: el.querySelector('#numInt').value.trim(),
        colonia, cp: el.querySelector('#cp').value.trim(), ciudad,
        ine: el.querySelector('#ine').value.trim().toUpperCase(),
        refNombre, refParentesco, refTelefono,
        refDireccion: el.querySelector('#refDireccion').value.trim(),
        fotoIneUrl: ineUrl, fotoDomicilioUrl: domUrl,
      };

      if (editing) {
        Store.updateCliente(clienteId, data);
        Toast.success('Cliente actualizado');
        App.navigate('clienteDetalle', clienteId);
      } else {
        const c = Store.addCliente(data);
        Toast.success('Cliente registrado');
        App.navigate('clienteDetalle', c.id);
      }
    });

    return el;
  }
};
</script><script>const NuevoPrestamo = {
  render(preClienteId) {
    const clientes = Store.getClientes();

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px"><h1>Nuevo préstamo</h1><p>Configura los términos del crédito</p></div>
      </div>
      <div class="scroll-area" style="padding-bottom:16px">
        <div class="form-body">
          <div class="field">
            <label>Cliente *</label>
            <select id="cliente-sel">
              <option value="">— Selecciona cliente —</option>
              ${clientes.map(c => `<option value="${c.id}" ${c.id === preClienteId ? 'selected' : ''}>${c.nombre}</option>`).join('')}
            </select>
            <span class="field-hint">¿No está? <a onclick="App.navigate('nuevoCliente')" style="color:var(--rose);cursor:pointer">Registrar nuevo cliente</a></span>
          </div>
          <div class="field">
            <label>Monto a prestar *</label>
            <input type="number" id="monto" placeholder="$0.00" min="100" step="100"/>
          </div>
          <div class="field">
            <label>Interés total (%)</label>
            <input type="number" id="interes" placeholder="30" min="0" max="300" value="${Store.INTERES_DEFAULT}"/>
            <span class="field-hint">Interés fijo sobre el capital. Por defecto: ${Store.INTERES_DEFAULT}%</span>
          </div>
          <div class="field">
            <label>Número de pagos *</label>
            <input type="number" id="plazo" placeholder="8" min="1" max="52" value="8"/>
          </div>
          <div class="field">
            <label>Frecuencia de pago</label>
            <select id="frecuencia">
              <option value="semanal">Semanal (cada 7 días)</option>
              <option value="quincenal" selected>Quincenal (cada 15 días)</option>
              <option value="mensual">Mensual (cada 30 días)</option>
            </select>
          </div>
          <div class="field">
            <label>Fecha de inicio</label>
            <input type="date" id="fechaInicio" value="${Fmt.today()}"/>
          </div>

          <div id="calc-preview" style="display:none;background:var(--mauve-light);border-radius:var(--r-lg);padding:16px">
            <div style="font-size:11px;font-weight:700;color:var(--mauve);margin-bottom:10px;letter-spacing:0.5px">RESUMEN DEL CRÉDITO</div>
            <div style="display:flex;flex-direction:column;gap:7px">
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Capital prestado</span>
                <span style="font-size:13px;font-weight:600;color:var(--mauve-deep)" id="prev-capital">—</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Interés (${Store.INTERES_DEFAULT}%)</span>
                <span style="font-size:13px;font-weight:600;color:var(--mauve-deep)" id="prev-interes">—</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Penalización por mora</span>
                <span style="font-size:12px;color:var(--warn)" id="prev-penal">${Store.PENALIZACION_DIARIA}% del capital por día de atraso</span>
              </div>
              <div style="height:0.5px;background:rgba(107,78,125,0.2)"></div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Total a pagar</span>
                <span style="font-size:17px;font-weight:700;color:var(--mauve-deep)" id="prev-total">—</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:12px;color:var(--mauve)">Pago por cuota</span>
                <span style="font-size:17px;font-weight:700;color:var(--rose-deep)" id="prev-cuota">—</span>
              </div>
            </div>
          </div>

          <div id="tabla-preview-wrap" style="display:none">
            <div style="font-size:12px;font-weight:600;color:var(--ink-mid);margin-bottom:8px">Tabla de pagos</div>
            <div class="amort-wrap">
              <table class="amort-table">
                <thead><tr><th>#</th><th>Fecha</th><th>Monto</th><th>Saldo</th></tr></thead>
                <tbody id="tabla-body"></tbody>
              </table>
            </div>
          </div>

          <button class="btn btn-primary" id="save-btn" disabled>
            <i class="ti ti-cash"></i> Registrar préstamo
          </button>
        </div>
      </div>
    `;

    el.querySelector('#back-btn').onclick = () => preClienteId ? App.navigate('clienteDetalle', preClienteId) : App.navigate('clientes');

    const updateCalc = () => {
      const monto = parseFloat(el.querySelector('#monto').value);
      const interes = parseFloat(el.querySelector('#interes').value) || 0;
      const plazo = parseInt(el.querySelector('#plazo').value);
      const frecuencia = el.querySelector('#frecuencia').value;
      const fechaInicio = el.querySelector('#fechaInicio').value;
      const clienteId = el.querySelector('#cliente-sel').value;
      const preview = el.querySelector('#calc-preview');
      const tablaWrap = el.querySelector('#tabla-preview-wrap');
      const saveBtn = el.querySelector('#save-btn');

      if (!monto || !plazo || monto < 100) { preview.style.display = 'none'; tablaWrap.style.display = 'none'; saveBtn.disabled = true; return; }

      const { total, cuota } = Store.calcPrestamo(monto, interes, plazo);
      el.querySelector('#prev-capital').textContent = Fmt.currency(monto);
      el.querySelector('#prev-interes').textContent = Fmt.currency(total - monto);
      el.querySelector('#prev-total').textContent = Fmt.currency(total);
      el.querySelector('#prev-cuota').textContent = Fmt.currency(cuota);
      preview.style.display = 'block';

      const freq = { semanal: 7, quincenal: 15, mensual: 30 }[frecuencia] || 15;
      const tbody = el.querySelector('#tabla-body');
      let saldo = total;
      tbody.innerHTML = '';
      for (let i = 1; i <= plazo; i++) {
        const fecha = new Date(fechaInicio + 'T00:00:00');
        fecha.setDate(fecha.getDate() + freq * i);
        saldo = Math.max(0, Math.round((saldo - cuota) * 100) / 100);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i}</td><td>${Fmt.date(fecha.toISOString().split('T')[0])}</td><td>${Fmt.currency(cuota)}</td><td>${Fmt.currency(saldo)}</td>`;
        tbody.appendChild(tr);
      }
      tablaWrap.style.display = 'block';
      saveBtn.disabled = !clienteId;
    };

    ['#monto','#interes','#plazo','#frecuencia','#fechaInicio','#cliente-sel'].forEach(sel => {
      el.querySelector(sel).addEventListener('input', updateCalc);
      el.querySelector(sel).addEventListener('change', updateCalc);
    });

    if (preClienteId) setTimeout(updateCalc, 50);

    el.querySelector('#save-btn').addEventListener('click', () => {
      const clienteId = el.querySelector('#cliente-sel').value;
      const monto = parseFloat(el.querySelector('#monto').value);
      const interes = parseFloat(el.querySelector('#interes').value) || 0;
      const plazo = parseInt(el.querySelector('#plazo').value);
      const frecuencia = el.querySelector('#frecuencia').value;
      const fechaInicio = el.querySelector('#fechaInicio').value;
      if (!clienteId || !monto || !plazo) { Toast.error('Completa los campos obligatorios'); return; }
      const { total, cuota } = Store.calcPrestamo(monto, interes, plazo);
      Store.addPrestamo({ clienteId, monto, interes, plazo, frecuencia, fechaInicio, totalConInteres: total, pagoCuota: cuota });
      Toast.success('Préstamo registrado');
      App.navigate('clienteDetalle', clienteId);
    });

    return el;
  }
};
</script><script>const RegistrarPago = {
  render(prestamoId) {
    const prestamo = Store.getPrestamo(prestamoId);
    if (!prestamo) return App.navigate('clientes');
    const cliente = Store.getCliente(prestamo.clienteId);
    const saldo = Store.getSaldoRestante(prestamoId);
    const pagosHechos = Store.getPagosCount(prestamoId);
    const numCuota = pagosHechos + 1;

    const tabla = Store.getTableraAmortizacion(prestamo);
    const vencidas = tabla.filter(t => t.estado === 'vencido');
    const penalizacionTotal = vencidas.reduce((s, c) => s + Store.getPenalizacion(prestamo, c), 0);

    let metodo = 'transferencia';
    let comprobanteDataUrl = null;
    let notifWhatsApp = true;

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">

          <h1>Registrar pago</h1>
          <p>${cliente.nombre} · Cuota ${numCuota} de ${prestamo.plazo}</p>
        </div>
      </div>
      <div class="scroll-area" style="padding-bottom:16px">

          <div style="text-align:right">
            <div style="font-size:11px;color:#2D7A54">Saldo restante</div>
            <div style="font-size:15px;font-weight:700;color:var(--success)">${Fmt.currency(saldo)}</div>
          </div>
        </div>

        ${penalizacionTotal > 0 ? `
        <div style="margin:0 16px 4px">
          <div class="alert-pill">
            <i class="ti ti-alert-triangle" style="font-size:16px"></i>
            <span>Penalización acumulada por mora: <strong>${Fmt.currency(penalizacionTotal)}</strong> (${vencidas.length} cuota${vencidas.length>1?'s':''} vencida${vencidas.length>1?'s':''})</span>
          </div>
        </div>` : ''}

        <div class="form-body">
          <div class="field">
            <label>Fecha de pago</label>
            <input type="date" id="fecha" value="${Fmt.today()}"/>
          </div>
          <div class="field">
            <label>Método de pago</label>
            <div class="method-row" id="method-row">
              <div class="method-chip active" data-met="transferencia"><i class="ti ti-building-bank" style="font-size:13px"></i> Transferencia</div>
              <div class="method-chip" data-met="efectivo"><i class="ti ti-cash" style="font-size:13px"></i> Efectivo</div>
              <div class="method-chip" data-met="codi"><i class="ti ti-device-mobile" style="font-size:13px"></i> CoDi</div>

          <div class="field" id="folio-field">
            <label>Folio / referencia de transferencia</label>
            <input type="text" id="folio" placeholder="Número de operación"/>

            <div class="photo-zone" id="photo-zone" onclick="document.getElementById('comp-file').click()">

        <div style="padding:16px;display:flex;flex-direction:column;gap:8px">

        const saldoTexto = nuevoSaldo > 0
          ? `Tu saldo restante es de *${Fmt.currency(nuevoSaldo)}* (${Store.getPagosCount(prestamoId)} de ${prestamo.plazo} pagos completados).`
          : `✅ *¡Felicidades! Tu préstamo ha sido liquidado en su totalidad.* Muchas gracias por tu puntualidad.`;

        const msg = `Estimada/o *${nombre}*,

Por medio del presente mensaje le confirmamos la recepción de su pago:

💰 *Monto recibido:* ${Fmt.currency(prestamo.pagoCuota)}
📅 *Fecha:* ${Fmt.date(fecha)}
💳 *Método:* ${metodoLabel.charAt(0).toUpperCase() + metodoLabel.slice(1)}${folioTexto}

${saldoTexto}

${comprobanteDataUrl ? '📎 Se adjunta imagen del comprobante de pago.\n\n' : ''}Ante cualquier duda, no dude en contactarnos.

_Varito — Servicios de crédito personal · Varito_`;

        const encoded = encodeURIComponent(msg);
        setTimeout(() => window.open(`https://wa.me/52${cliente.telefono}?text=${encoded}`, '_blank'), 600);
      }

      App.navigate('clienteDetalle', prestamo.clienteId);
    });

    return el;
  }
};
</script><script>const Documentos = {
  render(prestamoId) {
    const prestamo = Store.getPrestamo(prestamoId);
    if (!prestamo) return App.navigate('clientes');
    const cliente = Store.getCliente(prestamo.clienteId);
    const tabla = Store.getTableraAmortizacion(prestamo);

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px">
          <h1>Tabla de pagos</h1>
          <p>${cliente.nombre} · ${Fmt.folioPagare(prestamo.folioNum)}</p>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val">${Fmt.currency(prestamo.totalConInteres)}</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${Fmt.currency(prestamo.pagoCuota)}</div>
          <div class="stat-lbl">Por cuota</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:var(--rose-deep)">${Fmt.currency(Store.getSaldoRestante(prestamoId))}</div>
          <div class="stat-lbl">Saldo</div>
        </div>
      </div>

      <div class="scroll-area" style="padding-bottom:16px">
        <div style="margin:12px 16px 8px">
          <div class="amort-wrap">
            <table class="amort-table">
              <thead>
                <tr><th>#</th><th>Fecha</th><th>Monto</th><th>Estado</th></tr>
              </thead>
              <tbody>
                ${tabla.map(c => {
                  const cls = c.estado === 'pagado' ? 'paid' : c.estado === 'vencido' ? 'late' : c.estado === 'hoy' ? 'current' : '';
                  const badge = c.estado === 'pagado'
                    ? `<span class="badge badge-ok">Pagado</span>`
                    : c.estado === 'vencido'
                    ? `<span class="badge badge-late">Vencido</span>`
                    : c.estado === 'hoy'
                    ? `<span class="badge badge-warn">Hoy</span>`
                    : `<span class="badge" style="background:var(--sand-mid);color:var(--ink-soft)">Pendiente</span>`;
                  return `<tr class="${cls}">
                    <td>${c.num}</td>
                    <td>${Fmt.dateShort(c.fecha)}</td>
                    <td>${Fmt.currency(c.monto)}</td>
                    <td>${badge}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="PDF.generarPagare(Store.getPrestamo('${prestamoId}'), Store.getCliente('${prestamo.clienteId}'))">
            <i class="ti ti-file-text"></i> Generar pagaré
          </button>
          ${prestamo.estado === 'activo' ? `
          <button class="btn btn-mauve btn-sm" onclick="App.navigate('registrarPago','${prestamoId}')">
            <i class="ti ti-plus"></i> Registrar pago
          </button>` : ''}
        </div>
      </div>
    `;

    el.querySelector('#back-btn').onclick = () => App.navigate('clienteDetalle', prestamo.clienteId);
    return el;
  }
};
</script><script>const Reportes = {
  render() {
    const clientes = Store.getClientes();
    const prestamos = Store.getPrestamos();
    const pagos = Store.getPagos();

    const activos = prestamos.filter(p => p.estado === 'activo');
    const liquidados = prestamos.filter(p => p.estado === 'liquidado');
    const carteraTotal = activos.reduce((s, p) => s + Store.getSaldoRestante(p.id), 0);
    const capitalPrestado = activos.reduce((s, p) => s + p.monto, 0);
    const interesTotal = activos.reduce((s, p) => s + (p.totalConInteres - p.monto), 0);
    const cobrado = pagos.reduce((s, p) => s + p.monto, 0);

    const atrasados = activos.filter(p => {
      const tabla = Store.getTableraAmortizacion(p);
      return tabla.some(t => t.estado === 'vencido');
    });

    const hoy = Fmt.today();
    const pagosHoy = pagos.filter(p => p.fecha === hoy);
    const cobradoHoy = pagosHoy.reduce((s, p) => s + p.monto, 0);

    const ultimosPagos = [...pagos].sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 6);

    const el = document.createElement('div');
    el.innerHTML = `
      <div class="page-header" style="padding:14px 20px 16px">
        <button class="back-btn" onclick="App.navigate('dashboard')"><i class="ti ti-arrow-left"></i></button>
        <div style="padding-left:36px">
          <h1>Reportes</h1>
          <p>Resumen de tu cartera</p>
        </div>
      </div>

      <div class="scroll-area" style="padding-bottom:16px">
        <div class="stats-row" style="flex-wrap:wrap">
          <div class="stat-card" style="min-width:120px">
            <div class="stat-val">${Fmt.currency(carteraTotal)}</div>
            <div class="stat-lbl">Cartera activa</div>
          </div>
          <div class="stat-card" style="min-width:120px">
            <div class="stat-val">${Fmt.currency(cobrado)}</div>
            <div class="stat-lbl">Total cobrado</div>
          </div>
        </div>
        <div class="stats-row" style="flex-wrap:wrap;padding-top:0">
          <div class="stat-card">
            <div class="stat-val">${activos.length}</div>
            <div class="stat-lbl">Préstamos activos</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${liquidados.length}</div>
            <div class="stat-lbl">Liquidados</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="${atrasados.length > 0 ? 'color:var(--danger)' : ''}">${atrasados.length}</div>
            <div class="stat-lbl">Con atraso</div>
          </div>
        </div>

        ${cobradoHoy > 0 ? `
          <div style="margin:0 16px 8px">
            <div class="alert-pill" style="background:var(--success-light);color:var(--success)">
              <i class="ti ti-check" style="font-size:16px"></i>
              <span>Cobrado hoy: <strong>${Fmt.currency(cobradoHoy)}</strong> en ${pagosHoy.length} pago${pagosHoy.length !== 1 ? 's' : ''}</span>
            </div>
          </div>
        ` : ''}

        ${atrasados.length > 0 ? `
          <div style="margin:0 16px 8px">
            <div class="alert-pill">
              <i class="ti ti-alert-triangle" style="font-size:16px"></i>
              <span><strong>${atrasados.length}</strong> préstamo${atrasados.length !== 1 ? 's' : ''} con pagos vencidos</span>
            </div>
          </div>
          <div class="client-list" style="margin-bottom:8px">
            ${atrasados.map(p => {
              const c = Store.getCliente(p.clienteId);
              const tabla = Store.getTableraAmortizacion(p);
              const vencidas = tabla.filter(t => t.estado === 'vencido');
              return `
                <div class="client-row" onclick="App.navigate('clienteDetalle','${p.clienteId}')">
                  <div class="c-avatar ${Fmt.avatarColor(c.nombre)}">${Fmt.initials(c.nombre)}</div>
                  <div class="c-info">
                    <div class="c-name">${c.nombre}</div>
                    <div class="c-detail">${vencidas.length} cuota${vencidas.length !== 1 ? 's' : ''} vencida${vencidas.length !== 1 ? 's' : ''}</div>
                  </div>
                  <div class="c-right">
                    <div class="c-amount">${Fmt.currency(Store.getSaldoRestante(p.id))}</div>
                    <span class="badge badge-late">Atrasado</span>
                  </div>
                </div>`;
            }).join('')}
          </div>
        ` : ''}

        <div class="section-title">Últimos pagos recibidos</div>
        <div class="payment-list" style="padding:0 16px 16px">
          ${ultimosPagos.length === 0
            ? `<div style="font-size:13px;color:var(--ink-soft);padding:12px 0;text-align:center">Sin pagos registrados aún</div>`
            : ultimosPagos.map(pg => {
              const p = Store.getPrestamo(pg.prestamoId);
              const c = p ? Store.getCliente(p.clienteId) : null;
              return `
                <div class="pmt-row">
                  <div class="pmt-dot paid"></div>
                  <div class="pmt-info">
                    <div class="pmt-date">${c?.nombre || '—'}</div>
                    <div class="pmt-note">${Fmt.date(pg.fecha)} · ${pg.metodo}</div>
                  </div>
                  <div class="pmt-amount">${Fmt.currency(pg.monto)}</div>
                  ${pg.comprobanteUrl ? `<i class="ti ti-photo" style="font-size:14px;color:var(--rose)"></i>` : ''}
                </div>`;
            }).join('')
          }
        </div>

        <div style="padding:0 16px 24px">
          <div style="height:0.5px;background:var(--sand-mid);margin-bottom:16px"></div>
          <div style="font-size:11px;color:var(--ink-soft);margin-bottom:8px;text-align:center">Zona de administración</div>
          <button class="btn btn-secondary" id="reset-btn" style="border-color:var(--danger-light);color:var(--danger)">
            <i class="ti ti-trash"></i> Eliminar todos los datos de prueba
          </button>
        </div>
      </div>
    `;

    el.querySelector('#reset-btn').addEventListener('click', () => {
      const confirmar = window.confirm('¿Segura? Esto borrará TODOS los clientes, préstamos y pagos. Esta acción no se puede deshacer.');
      if (!confirmar) return;
      const confirmar2 = window.confirm('Última confirmación: se borrarán todos los datos y la app quedará en blanco.');
      if (!confirmar2) return;
      localStorage.removeItem('vr_clientes');
      localStorage.removeItem('vr_prestamos');
      localStorage.removeItem('vr_pagos');
      Toast.success('Datos eliminados. La app está lista.');
      setTimeout(() => App.navigate('dashboard'), 800);
    });

    return el;
  }
};
</script><script>const App = {
  route: 'dashboard',
  param: null,

  navigate(route, param) {
    this.route = route;
    this.param = param || null;
    this.renderView();
    window.scrollTo(0, 0);
  },

  renderView() {
    const shell = document.getElementById('shell');
    const viewEl = document.getElementById('view');
    const tabBar = document.getElementById('tab-bar');
    viewEl.innerHTML = '';

    const noTabRoutes = ['nuevoCliente','editarCliente','nuevoPrestamo','registrarPago','verTabla'];
    tabBar.style.display = noTabRoutes.includes(this.route) ? 'none' : 'flex';

    const views = {
      dashboard: () => Dashboard.render(),
      clientes: () => Clientes.render(),
      clienteDetalle: () => ClienteDetalle.render(this.param),
      nuevoCliente: () => NuevoCliente.render(null),
      editarCliente: () => NuevoCliente.render(this.param),
      nuevoPrestamo: () => NuevoPrestamo.render(this.param),
      registrarPago: () => RegistrarPago.render(this.param),
      verTabla: () => Documentos.render(this.param),
      reportes: () => Reportes.render(),
    };

    const renderFn = views[this.route];
    if (renderFn) {
      const content = renderFn();
      if (content) viewEl.appendChild(content);
    }

    const tabMap = { dashboard: 0, clientes: 1, reportes: 3 };
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tabMap[this.route] ?? -1)));
  },

  init() {
    Toast.init();

    const shell = document.createElement('div');
    shell.className = 'app-shell';
    shell.id = 'shell';

    const view = document.createElement('div');
    view.id = 'view';
    view.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:hidden';
    shell.appendChild(view);

    const tabBar = document.createElement('div');
    tabBar.className = 'tab-bar';
    tabBar.id = 'tab-bar';
    tabBar.innerHTML = `
      <button class="tab active" onclick="App.navigate('dashboard')">
        <i class="ti ti-home tab-icon"></i>
        <span class="tab-lbl">Inicio</span>
      </button>
      <button class="tab" onclick="App.navigate('clientes')">
        <i class="ti ti-users tab-icon"></i>
        <span class="tab-lbl">Clientes</span>
      </button>
      <button class="tab" onclick="App.navigate('nuevoPrestamo')">
        <i class="ti ti-cash tab-icon"></i>
        <span class="tab-lbl">Préstamo</span>
      </button>
      <button class="tab" onclick="App.navigate('reportes')">
        <i class="ti ti-chart-bar tab-icon"></i>
        <span class="tab-lbl">Reportes</span>
      </button>
    `;
    shell.appendChild(tabBar);
    document.getElementById('app').appendChild(shell);

    this.renderView();
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
