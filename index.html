<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>

<title>Varito — Tu dinerito, siempre a la mano</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  /* Varito brand — green/navy */
  --green: #4CAF50;
  --green-light: #E8F5E9;
  --green-mid: #81C784;
  --green-deep: #1B5E20;
  --navy: #1A2340;
  --navy-light: #E8EAF0;
  --navy-mid: #3D4F7C;
  --accent: #2E7D32;
  --sand: #F7F9F7;
  --sand-mid: #E8EDE8;
  --sand-dark: #CDD6CD;
  --ink: #1A2340;
  --ink-mid: #4A5568;
  --ink-soft: #90A4A0;
  --white: #FFFFFF;
  --success: #2E7D32;
  --success-light: #E8F5E9;
  --warn: #F57F17;
  --warn-light: #FFF8E1;
  --danger: #C62828;
  --danger-light: #FFEBEE;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 28px;
  --r-pill: 999px;
  --shadow-sm: 0 1px 4px rgba(26,35,64,0.07);
  --shadow-md: 0 4px 16px rgba(26,35,64,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

#app { display: block; min-height: 100vh; }
.app-shell { display: flex; flex-direction: column; min-height: 100vh; width: 100%; max-width: 430px; margin: 0 auto; background: var(--white); position: relative; }

/* ── Top bar ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 10px; background: var(--white); border-bottom: 0.5px solid var(--sand-mid); position: sticky; top: 0; z-index: 50; }
.top-bar .logo { display: flex; align-items: center; }
.top-bar-actions { display: flex; align-items: center; gap: 10px; }

/* ── Hero card ── */
.hero-card { background: var(--navy); margin: 16px; border-radius: var(--r-xl); padding: 22px 22px 20px; position: relative; overflow: hidden; }
.hero-wave { position: absolute; bottom: -8px; right: -16px; opacity: 0.08; pointer-events: none; }
.hero-label { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.hero-amount { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -1.5px; line-height: 1; }
.hero-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; margin-bottom: 16px; }
.hero-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { padding: 5px 12px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); cursor: pointer; transition: all 0.15s; }
.chip.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 700; }

/* ── Section titles ── */
.section-title { font-size: 13px; font-weight: 600; color: var(--ink); padding: 16px 20px 8px; letter-spacing: 0.2px; display: flex; align-items: center; justify-content: space-between; }
.section-title a { font-size: 11px; color: var(--green); font-weight: 500; text-decoration: none; cursor: pointer; }

/* ── Quick actions ── */
.quick-actions { display: flex; gap: 10px; padding: 0 16px; }
.qa-btn { flex: 1; background: var(--sand); border-radius: var(--r-lg); padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: background 0.15s; border: none; }
.qa-btn:hover { background: var(--green-light); }
.qa-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.qa-icon.rose { background: var(--green-light); color: var(--green-deep); }
.qa-icon.mauve { background: var(--navy-light); color: var(--navy-mid); }
.qa-icon.green { background: var(--success-light); color: var(--success); }
.qa-label { font-size: 11px; color: var(--ink-mid); font-weight: 500; text-align: center; }

/* ── Client list ── */
.client-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.client-row { background: var(--white); border: 0.5px solid var(--sand-mid); border-radius: var(--r-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
.client-row:hover { background: var(--sand); }
.c-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.c-info { flex: 1; min-width: 0; }
.c-name { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.c-detail { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.c-right { text-align: right; flex-shrink: 0; }
.c-amount { font-size: 14px; font-weight: 600; color: var(--ink); }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: var(--r-pill); font-size: 10px; font-weight: 600; margin-top: 3px; }
.badge-ok { background: var(--success-light); color: var(--success); }
.badge-warn { background: var(--warn-light); color: #8B5E1A; }
.badge-late { background: var(--danger-light); color: var(--danger); }
.badge-new { background: var(--green-light); color: var(--green-deep); }

/* ── Avatar colors ── */
.av-rose { background: var(--green-light); color: var(--green-deep); }
.av-mauve { background: var(--navy-light); color: var(--navy-mid); }
.av-amber { background: #FFF8E1; color: #8B5E1A; }
.av-teal { background: #E0F2F1; color: #00695C; }
.av-blue { background: #E3F2FD; color: #1565C0; }

/* ── Bottom nav ── */
.tab-bar { height: 64px; border-top: 0.5px solid var(--sand-mid); display: flex; align-items: center; justify-content: space-around; padding: 0 4px; background: var(--white); position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; z-index: 100; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 18px; border-radius: 12px; cursor: pointer; transition: background 0.15s; flex: 1; border: none; background: transparent; }
.tab:hover { background: var(--sand); }
.tab .tab-icon { font-size: 22px; color: var(--ink-soft); }
.tab .tab-lbl { font-size: 10px; color: var(--ink-soft); font-weight: 400; }
.tab.active .tab-icon { color: var(--green-deep); }
.tab.active .tab-lbl { color: var(--green-deep); font-weight: 600; }

/* ── Scroll area ── */
.scroll-area { flex: 1; overflow-y: visible; overflow-x: hidden; padding-bottom: 80px; }

/* ── Page header ── */
.page-header { background: var(--navy); padding: 52px 20px 20px; position: relative; overflow: hidden; }
.page-header .back-btn { position: absolute; top: 14px; left: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; cursor: pointer; border: none; }
.page-header h1 { font-size: 20px; font-weight: 600; color: #fff; }
.page-header p { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 3px; }

/* ── Stat cards ── */
.stats-row { display: flex; gap: 10px; padding: 14px 16px; background: var(--sand); }
.stat-card { flex: 1; background: var(--white); border-radius: var(--r-md); padding: 12px; border: 0.5px solid var(--sand-mid); text-align: center; }
.stat-val { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.stat-lbl { font-size: 10px; color: var(--ink-soft); }

/* ── Forms ── */
.form-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.5px; text-transform: uppercase; }
.field input, .field select, .field textarea { padding: 11px 14px; border-radius: var(--r-md); border: 1px solid var(--sand-mid); background: var(--sand); font-size: 14px; color: var(--ink); font-family: 'Inter', sans-serif; outline: none; transition: border 0.15s, background 0.15s; -webkit-appearance: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green); background: var(--white); }
.field textarea { resize: none; min-height: 72px; line-height: 1.5; }
.field-hint { font-size: 11px; color: var(--ink-soft); }

/* ── Method chips ── */
.method-row { display: flex; gap: 8px; }
.method-chip { flex: 1; padding: 9px 6px; border-radius: var(--r-md); border: 1px solid var(--sand-mid); text-align: center; font-size: 11px; font-weight: 500; color: var(--ink-mid); cursor: pointer; background: var(--sand); transition: all 0.15s; }
.method-chip.active { background: var(--green-light); border-color: var(--green); color: var(--green-deep); }

/* ── Photo upload ── */
.photo-zone { border: 1.5px dashed var(--green); border-radius: var(--r-lg); padding: 20px; text-align: center; background: var(--green-light); cursor: pointer; transition: background 0.15s; }
.photo-zone:hover { background: #C8E6C9; }
.photo-zone i { font-size: 28px; color: var(--green); margin-bottom: 6px; display: block; }
.photo-zone .pz-label { font-size: 12px; color: var(--green-deep); font-weight: 500; }
.photo-zone .pz-sub { font-size: 10px; color: var(--accent); margin-top: 2px; }
.photo-zone input[type=file] { display: none; }
.photo-preview-box { border-radius: var(--r-lg); overflow: hidden; background: var(--sand-mid); position: relative; }
.photo-preview-box img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
.photo-remove { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(26,35,64,0.6); border: none; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; cursor: pointer; }

/* ── Buttons ── */
.btn { padding: 13px; border-radius: var(--r-lg); font-size: 14px; font-weight: 600; border: none; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; font-family: 'Inter', sans-serif; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--navy); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-success { background: var(--success); color: #fff; }
.btn-mauve { background: var(--navy); color: #fff; }
.btn-secondary { background: var(--sand); border: 1px solid var(--sand-mid); color: var(--ink-mid); }
.btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-light); }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: var(--r-md); width: auto; flex: 1; }
.btn-row { display: flex; gap: 8px; padding: 0 16px 16px; }

/* ── Payment history ── */
.payment-list { padding: 0 16px 16px; }
.pmt-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 0.5px solid var(--sand-mid); }
.pmt-row:last-child { border-bottom: none; }
.pmt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pmt-dot.paid { background: var(--success); }
.pmt-dot.pending { background: var(--ink-soft); }
.pmt-dot.late { background: var(--danger); }
.pmt-info { flex: 1; }
.pmt-date { font-size: 12px; color: var(--ink-mid); }
.pmt-note { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
.pmt-amount { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; }

/* ── Amortization table ── */
.amort-wrap { overflow-x: auto; margin: 0 16px; border-radius: var(--r-md); border: 0.5px solid var(--sand-mid); }
.amort-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.amort-table th { background: var(--navy-light); color: var(--navy); font-weight: 600; padding: 8px 10px; text-align: left; }
.amort-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--sand-mid); color: var(--ink-mid); }
.amort-table tr:last-child td { border-bottom: none; }
.amort-table tr.paid td { color: var(--ink-soft); }
.amort-table tr.paid td:first-child::before { content: "✓ "; color: var(--success); }
.amort-table tr.current td { color: var(--ink); font-weight: 600; background: #F1F8F1; }
.amort-table tr.late td { color: var(--danger); }

/* ── Empty state ── */
.empty-state { padding: 40px 20px; text-align: center; }
.empty-state i { font-size: 40px; color: var(--green-mid); margin-bottom: 12px; display: block; }
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--ink-mid); margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

/* ── Toast ── */
.toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--ink); color: #fff; padding: 12px 18px; border-radius: var(--r-pill); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: toastIn 0.25s ease; white-space: nowrap; pointer-events: all; box-shadow: var(--shadow-md); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(26,35,64,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
.modal-sheet { background: var(--white); border-radius: var(--r-xl) var(--r-xl) 0 0; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; padding-bottom: 32px; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--sand-mid); border-radius: 2px; margin: 12px auto 16px; }
.modal-title { font-size: 17px; font-weight: 600; color: var(--ink); padding: 0 20px 16px; }

/* ── FAB ── */
.fab { position: fixed; bottom: 80px; right: 16px; width: 50px; height: 50px; border-radius: 50%; background: var(--green); border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; cursor: pointer; box-shadow: 0 4px 16px rgba(46,125,50,0.4); transition: transform 0.15s; z-index: 99; }
.fab:hover { transform: scale(1.08); }

/* ── Alert pill ── */
.alert-pill { display: flex; align-items: center; gap: 8px; background: var(--warn-light); border-radius: var(--r-md); padding: 10px 14px; font-size: 12px; color: #8B5E1A; }

/* ── Toggle ── */
.toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 0.5px solid var(--sand-mid); }
.toggle-label { font-size: 13px; color: var(--ink-mid); }
.toggle { width: 40px; height: 22px; border-radius: 11px; background: var(--sand-mid); position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0; }
.toggle.on { background: var(--green); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left 0.2s; }
.toggle.on .toggle-thumb { left: 21px; }

/* ── Search ── */
.search-bar { display: flex; align-items: center; gap: 8px; background: var(--sand); border: 0.5px solid var(--sand-mid); border-radius: var(--r-pill); padding: 9px 14px; margin: 10px 16px; }
.search-bar i { font-size: 16px; color: var(--ink-soft); }
.search-bar input { border: none; background: transparent; font-size: 14px; color: var(--ink); outline: none; flex: 1; font-family: 'Inter', sans-serif; }

/* ── Confirm summary ── */
.confirm-card { background: var(--green-light); border-radius: var(--r-lg); padding: 14px 16px; margin: 0 16px; }
.confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid rgba(46,125,50,0.15); }
.confirm-row:last-child { border-bottom: none; }
.confirm-key { font-size: 11px; color: var(--accent); font-weight: 500; }
.confirm-val { font-size: 13px; color: var(--green-deep); font-weight: 600; }

/* ── Info box ── */
.info-box { background: var(--sand); border-radius: var(--r-md); padding: 10px 12px; font-size: 12px; color: var(--ink-mid); line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
.info-box i { color: var(--green); font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* ── Folio pill ── */
.folio-pill { background: var(--sand); border: 0.5px solid var(--sand-mid); border-radius: var(--r-md); padding: 9px 14px; margin: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.folio-key { font-size: 10px; color: var(--ink-soft); }
.folio-val { font-size: 11px; font-weight: 600; color: var(--ink); font-family: monospace; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 2px; }

/* ── Mobile ── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {{
  .tab-bar {{ padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }}
  .fab {{ bottom: calc(80px + env(safe-area-inset-bottom)); }}
}}
@media (min-width: 431px) {{
  .tab-bar {{ left: 50%; transform: translateX(-50%); width: 430px; }}
}}
html {{ scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }}
body {{ -webkit-tap-highlight-color: transparent; }}

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .tab-bar { padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }
    .fab { bottom: calc(80px + env(safe-area-inset-bottom)); }
  }
  @media (min-width: 431px) {
    .tab-bar { left: 50%; transform: translateX(-50%); width: 430px; }
  }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body { -webkit-tap-highlight-color: transparent; }
</style>

<body>
<div id="app"></div>
<script>const ACREEDORA = 'Yaretzi Dalet Gutiérrez Castañeda';
const APP_NAME = 'Varito';
const PENALIZACION_DIARIA = 10;

// Interés por quincenas (1-2=30%, 3-4=40%, 5-6=50%)
const getInteresPorQuincenas = (quincenas) => {
  if (quincenas <= 2) return 30;
  if (quincenas <= 4) return 40;
  return 50;
};

// Número de pagos según frecuencia y quincenas
const getNumPagos = (quincenas, frecuencia) => {
  return frecuencia === 'semanal' ? quincenas * 2 : quincenas;
};

// Días entre pagos
const getDiasFrecuencia = (frecuencia) => frecuencia === 'semanal' ? 7 : 15;

// Línea de crédito por historial
const getLimiteCredito = (cliente, prestamos) => {
  if (cliente.limiteManual) return cliente.limiteManual;
  const liquidadosPuntuales = prestamos.filter(p =>
    p.clienteId === cliente.id &&
    p.estado === 'liquidado' &&
    !p.tuvoAtraso
  ).length;
  if (liquidadosPuntuales >= 3) return 5000;
  if (liquidadosPuntuales === 2) return 4000;
  if (liquidadosPuntuales === 1) return 3000;
  return 2000;
};

const firebaseConfig = {
  apiKey: "AIzaSyCDYns_aIfO87mtln-ORna-9sL_7Xm1IBk",
  authDomain: "varito-46d22.firebaseapp.com",
  projectId: "varito-46d22",
  storageBucket: "varito-46d22.firebasestorage.app",
  messagingSenderId: "228917831433",
  appId: "1:228917831433:web:8487695ba7d8c44d5e95d8"
};

let db = null;
let fbReady = false;
const fbCallbacks = [];

function onFbReady(fn) {
  if (fbReady) fn();
  else fbCallbacks.push(fn);
}

function initFirebase() {
  try {
    const app = firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    fbReady = true;
    fbCallbacks.forEach(fn => fn());
    console.log('Firebase conectado');
  } catch (e) {
    console.error('Firebase error:', e);
  }
}

const Store = (() => {
  let state = { clientes: [], prestamos: [], pagos: [], solicitudes: [], config: {} };
  let loaded = false;
  const listeners = [];
  const notify = () => listeners.forEach(fn => fn());

  const subscribeAll = () => {
    if (!db) return;
    db.collection('clientes').orderBy('createdAt','desc').onSnapshot(snap => {
      state.clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
    db.collection('prestamos').onSnapshot(snap => {
      state.prestamos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
    db.collection('pagos').onSnapshot(snap => {
      state.pagos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
    db.collection('solicitudes').orderBy('createdAt','desc').onSnapshot(snap => {
      state.solicitudes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notify();
    });
    db.collection('configuracion').doc('varito').onSnapshot(doc => {
      state.config = doc.exists ? doc.data() : {};
      notify();
    });
  };

  const loadAll = async () => {
    if (!db) return;
    try {
      const [cSnap, pSnap, pgSnap, sSnap, cfgSnap] = await Promise.all([
        db.collection('clientes').orderBy('createdAt','desc').get(),
        db.collection('prestamos').get(),
        db.collection('pagos').get(),
        db.collection('solicitudes').orderBy('createdAt','desc').get(),
        db.collection('configuracion').doc('varito').get(),
      ]);
      state.clientes   = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.prestamos  = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.pagos      = pgSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.solicitudes= sSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.config     = cfgSnap.exists ? cfgSnap.data() : {};
      loaded = true;
      notify();
    } catch(e) { console.error('Error cargando:', e); }
  };

  return {
    ACREEDORA, APP_NAME, PENALIZACION_DIARIA,
    getInteresPorQuincenas,

    subscribe: (fn) => { listeners.push(fn); },
    isLoaded: () => loaded,

    init: () => {
      onFbReady(() => { subscribeAll(); loadAll(); });
    },

    getClientes:    () => [...state.clientes],
    getPrestamos:   () => [...state.prestamos],
    getPagos:       () => [...state.pagos],
    getSolicitudes: () => [...state.solicitudes],
    getConfig:      () => ({ ...state.config }),

    getCliente:  (id) => state.clientes.find(c => c.id === id),
    getPrestamo: (id) => state.prestamos.find(p => p.id === id),

    getPagosByPrestamo: (pid) =>
      state.pagos.filter(p => p.prestamoId === pid)
        .sort((a,b) => new Date(a.fecha) - new Date(b.fecha)),

    getPrestamosByCliente: (cid) =>
      state.prestamos.filter(p => p.clienteId === cid),

    getLimiteCliente: (cliente) =>
      getLimiteCredito(cliente, state.prestamos),

    getDomicilioCompleto: (c) =>
      [c.calle, c.numExt ? '#'+c.numExt : '', c.numInt ? 'Int. '+c.numInt : '',
       c.colonia, c.cp, c.ciudad].filter(Boolean).join(', '),

    getSolicitudesPendientes: () =>
      state.solicitudes.filter(s => s.estado === 'pendiente'),

    // ── Config / Firma Yaretzi ──
    guardarFirmaYaretzi: async (firmaUrl) => {
      await db.collection('configuracion').doc('varito').set(
        { firmaYaretzi: firmaUrl }, { merge: true }
      );
    },
    getFirmaYaretzi: () => state.config.firmaYaretzi || null,

    // ── CRUD clientes ──
    addCliente: async (data) => {
      const doc = { ...data, createdAt: new Date().toISOString().split('T')[0] };
      const ref = await db.collection('clientes').add(doc);
      return { id: ref.id, ...doc };
    },
    updateCliente: async (id, data) => {
      await db.collection('clientes').doc(id).update(data);
    },
    deleteCliente: async (id) => {
      const batch = db.batch();
      const ps = state.prestamos.filter(p => p.clienteId === id);
      for (const p of ps) {
        state.pagos.filter(pg => pg.prestamoId === p.id)
          .forEach(pg => batch.delete(db.collection('pagos').doc(pg.id)));
        batch.delete(db.collection('prestamos').doc(p.id));
      }
      batch.delete(db.collection('clientes').doc(id));
      await batch.commit();
    },

    // ── CRUD préstamos ──
    addPrestamo: async (data) => {
      const folioNum = state.prestamos.length > 0
        ? Math.max(...state.prestamos.map(p => p.folioNum || 0)) + 1 : 1;
      const doc = { ...data, estado: 'activo', folioNum, tuvoAtraso: false };
      const ref = await db.collection('prestamos').add(doc);
      return { id: ref.id, ...doc };
    },

    // ── CRUD pagos ──
    addPago: async (data) => {
      const ref = await db.collection('pagos').add(data);
      const prestamo = state.prestamos.find(p => p.id === data.prestamoId);
      if (prestamo) {
        const count = state.pagos.filter(p => p.prestamoId === data.prestamoId).length + 1;
        // Check if late
        const tabla = Store.getTableraAmortizacion(prestamo);
        const cuotaActual = tabla.find(c => c.num === data.numCuota);
        const updates = {};
        if (count >= prestamo.plazo) updates.estado = 'liquidado';
        if (cuotaActual && Fmt.daysLate(cuotaActual.fecha) > 0) updates.tuvoAtraso = true;
        if (Object.keys(updates).length > 0)
          await db.collection('prestamos').doc(data.prestamoId).update(updates);
      }
      return { id: ref.id, ...data };
    },

    // ── Solicitudes ──
    addSolicitud: async (data) => {
      const doc = { ...data, estado: 'pendiente', createdAt: new Date().toISOString() };
      const ref = await db.collection('solicitudes').add(doc);
      return { id: ref.id, ...doc };
    },

    autorizarSolicitud: async (solicitudId) => {
      const sol = state.solicitudes.find(s => s.id === solicitudId);
      if (!sol) throw new Error('Solicitud no encontrada');

      // 1. Crear o actualizar cliente
      let clienteId = sol.clienteId;
      if (!clienteId) {
        const clienteData = {
          nombre: sol.nombre, telefono: sol.telefono,
          fechaNacimiento: sol.fechaNacimiento, ine: sol.ine || '',
          calle: sol.calle, numExt: sol.numExt, numInt: sol.numInt || '',
          colonia: sol.colonia, cp: sol.cp, ciudad: sol.ciudad,
          refNombre: sol.refNombre, refParentesco: sol.refParentesco,
          refTelefono: sol.refTelefono, refDireccion: sol.refDireccion || '',
          firmaClienteUrl: sol.firmaClienteUrl,
          fotoIneUrl: null, fotoDomicilioUrl: null,
        };
        const c = await Store.addCliente(clienteData);
        clienteId = c.id;
      }

      // 2. Crear préstamo respetando la frecuencia y el plazo solicitados
      const frecuencia = sol.frecuencia || 'semanal';
      const plazo = Number(
        sol.plazo || sol.numeroPagos ||
        (frecuencia === 'semanal' ? sol.semanas : sol.quincenas) || 1
      );
      const interes = Number(sol.interes || 0);
      const { total, cuota } = Store.calcPrestamo(sol.monto, interes, plazo);
      const datosPlazo = frecuencia === 'semanal'
        ? { semanas: plazo }
        : { quincenas: plazo };
      const prestamo = await Store.addPrestamo({
        clienteId,
        monto: sol.monto,
        interes,
        ...datosPlazo,
        unidadPlazo: frecuencia === 'semanal' ? 'semanas' : 'quincenas',
        plazo,
        frecuencia,
        fechaInicio: new Date().toISOString().split('T')[0],
        totalConInteres: total,
        pagoCuota: cuota,
        excepcionLimite: Boolean(sol.requiereRevisionLimite || Number(sol.monto) > 2000),
        limiteCreditoAlRegistrar: Number(sol.limiteReferencia || 2000),
        solicitudOrigen: solicitudId,
      });

      // 3. Marcar solicitud como autorizada
      await db.collection('solicitudes').doc(solicitudId).update({
        estado: 'autorizada', clienteId, prestamoId: prestamo.id,
        fechaAutorizacion: new Date().toISOString(),
      });

      return { clienteId, prestamo };
    },

    rechazarSolicitud: async (solicitudId) => {
      await db.collection('solicitudes').doc(solicitudId).update({ estado: 'rechazada' });
    },

    // ── Helpers ──
    getSaldoRestante: (prestamoId) => {
      const p = state.prestamos.find(pr => pr.id === prestamoId);
      if (!p) return 0;
      const pagado = state.pagos
        .filter(pg => pg.prestamoId === prestamoId)
        .reduce((s, pg) => s + pg.monto, 0);
      return Math.max(0, p.totalConInteres - pagado);
    },

    getPagosCount: (prestamoId) =>
      state.pagos.filter(pg => pg.prestamoId === prestamoId).length,

    getPenalizacion: (prestamo, cuota) => {
      if (cuota.estado !== 'vencido') return 0;
      const dias = Fmt.daysLate(cuota.fecha);
      return Math.round(prestamo.monto * (PENALIZACION_DIARIA / 100) * dias * 100) / 100;
    },

    getStats: () => {
      const activos = state.prestamos.filter(p => p.estado === 'activo');
      const cartera = activos.reduce((s, p) => {
        const pagado = state.pagos.filter(pg => pg.prestamoId === p.id)
          .reduce((a, pg) => a + pg.monto, 0);
        return s + Math.max(0, p.totalConInteres - pagado);
      }, 0);
      const hoy = new Date().toISOString().split('T')[0];
      const pagosHoy = state.pagos.filter(pg => pg.fecha === hoy)
        .reduce((s, pg) => s + pg.monto, 0);
      const pendientes = state.solicitudes.filter(s => s.estado === 'pendiente').length;
      return {
        cartera, pagosHoy,
        activos: activos.length,
        liquidados: state.prestamos.filter(p => p.estado === 'liquidado').length,
        solicitudesPendientes: pendientes,
      };
    },

    getTableraAmortizacion: (prestamo) => {
      const cuotas = [];
      let saldo = prestamo.totalConInteres;
      const freq = { semanal: 7, quincenal: 15, mensual: 30 }[prestamo.frecuencia] || 7;
      const pagosHechos = state.pagos.filter(pg => pg.prestamoId === prestamo.id);
      const hoy = new Date().toISOString().split('T')[0];
      const interesTotal = prestamo.totalConInteres - prestamo.monto;
      const interesPorCuota = Math.round((interesTotal / prestamo.plazo) * 100) / 100;
      const capitalPorCuota = Math.round((prestamo.monto / prestamo.plazo) * 100) / 100;

      for (let i = 1; i <= prestamo.plazo; i++) {
        const fecha = new Date(prestamo.fechaInicio + 'T00:00:00');
        fecha.setDate(fecha.getDate() + freq * i);
        const fechaStr = fecha.toISOString().split('T')[0];
        const pagoHecho = pagosHechos.find(pg => pg.numCuota === i);
        saldo = Math.max(0, Math.round((saldo - prestamo.pagoCuota) * 100) / 100);
        let estado = 'pendiente';
        if (pagoHecho) estado = 'pagado';
        else if (fechaStr < hoy) estado = 'vencido';
        else if (fechaStr === hoy) estado = 'hoy';
        cuotas.push({
          num: i, fecha: fechaStr, monto: prestamo.pagoCuota,
          capital: capitalPorCuota, interes: interesPorCuota,
          saldoRestante: saldo, estado, pagoHecho
        });
      }
      return cuotas;
    },

    calcPrestamo: (monto, interesPct, semanas) => {
      const total = Math.round(monto * (1 + interesPct / 100) * 100) / 100;
      const cuota = Math.round((total / semanas) * 100) / 100;
      return { total, cuota };
    },
  };
})();
</script><script>const Fmt = {
  currency: (n) => '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
  date: (str) => {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  },
  dateShort: (str) => {
    if (!str) return '—';
    const [y, m, d] = str.split('-');
    return `${d}/${m}/${y.slice(2)}`;
  },
  initials: (nombre) => nombre.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(),
  avatarColor: (nombre) => {
    const colors = ['av-rose','av-mauve','av-amber','av-teal','av-blue'];
    let h = 0;
    for (let c of nombre) h = (h * 31 + c.charCodeAt(0)) % colors.length;
    return colors[Math.abs(h)];
  },
  folioPagare: (num) => `VR-PAG-${String(num).padStart(4,'0')}`,
  folioRecibo: (prestamoNum, cuotaNum) => `VR-REC-${String(prestamoNum).padStart(4,'0')}-${String(cuotaNum).padStart(2,'0')}`,
  today: () => new Date().toISOString().split('T')[0],
  daysLate: (fechaStr) => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fecha = new Date(fechaStr + 'T00:00:00');
    const diff = Math.floor((hoy - fecha) / 86400000);
    return Math.max(0, diff);
  },
  frecuenciaLabel: (f) => ({ semanal: 'Semanal', quincenal: 'Quincenal', mensual: 'Mensual' }[f] || f),
  statusLabel: (e) => ({ activo: 'Activo', liquidado: 'Liquidado', atrasado: 'Atrasado' }[e] || e),
  importe: (n) => {
    const unidades = ['','un ','dos ','tres ','cuatro ','cinco ','seis ','siete ','ocho ','nueve '];
    const decenas = ['','diez ','veinte ','treinta ','cuarenta ','cincuenta ','sesenta ','setenta ','ochenta ','noventa '];
    const especiales = ['diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
    const centenas = ['','ciento ','doscientos ','trescientos ','cuatrocientos ','quinientos ','seiscientos ','setecientos ','ochocientos ','novecientos '];
    const miles = ['','mil ','dos mil ','tres mil ','cuatro mil ','cinco mil ','seis mil ','siete mil ','ocho mil ','nueve mil ','diez mil ','once mil ','doce mil ','trece mil ','catorce mil ','quince mil ','dieciséis mil ','diecisiete mil ','dieciocho mil ','diecinueve mil '];
    let entero = Math.floor(n);
    let cents = Math.round((n - entero) * 100);
    let result = '';
    if (entero >= 20000) return entero.toLocaleString('es-MX') + ' pesos ' + String(cents).padStart(2,'0') + '/100 M.N.';
    if (entero >= 1000) { result += miles[Math.floor(entero/1000)]; entero %= 1000; }
    if (entero >= 100) { result += centenas[Math.floor(entero/100)]; entero %= 100; }
    if (entero >= 10 && entero < 20) { result += especiales[entero-10] + ' '; entero = 0; }
    else if (entero >= 20) { result += decenas[Math.floor(entero/10)]; entero %= 10; }
    if (entero > 0) result += unidades[entero];
    return result.trim().charAt(0).toUpperCase() + result.trim().slice(1) + ' pesos ' + String(cents).padStart(2,'0') + '/100 M.N.';
  },
};

</script><script>const Toast = {
  container: null,
  init() {
    this.container = document.createElement('div');
    this.container.className = 'toast-container';
    document.body.appendChild(this.container);
  },
  show(msg, type = '', duration = 2800) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: 'ti-check', error: 'ti-x', '': 'ti-info-circle' };
    t.innerHTML = `<i class="ti ${icons[type] || 'ti-info-circle'}"></i> ${msg}`;
    this.container.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
  },
  success: (m) => Toast.show(m, 'success'),
  error: (m) => Toast.show(m, 'error'),
};

const Modal = {
  active: null,
  open(contentFn, title = '') {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    const sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    sheet.innerHTML = `<div class="modal-handle"></div>${title ? `<div class="modal-title">${title}</div>` : ''}`;
    const body = document.createElement('div');
    body.appendChild(contentFn());
    sheet.appendChild(body);
    backdrop.appendChild(sheet);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) Modal.close(); });
    document.body.appendChild(backdrop);
    this.active = backdrop;
  },
  close() {
    if (this.active) { this.active.remove(); this.active = null; }
  },
};

            <div style="font-size:11px;color:var(--ink-soft)">${Fmt.currency(p.monto)} · ${p.plazo} pagos</div>
          </div>`;

        const hdrRight = document.createElement('div');
        hdrRight.style.cssText = 'display:flex;align-items:center;gap:8px';

        const badge = document.createElement('span');
        badge.className = 'badge ' + badgeCls;
        badge.style.fontSize = '10px';
        badge.textContent = badgeTxt;

        const chevron = document.createElement('i');
        chevron.className = 'ti ti-chevron-' + (expandedId === p.id ? 'up' : 'down');
        chevron.style.cssText = 'font-size:16px;color:var(--ink-soft)';

        hdrRight.appendChild(badge);
        hdrRight.appendChild(chevron);
        hdr.appendChild(hdrLeft);
        hdr.appendChild(hdrRight);
        secPrestamo.appendChild(hdr);

        // ── Contenido colapsable ──
        const content = document.createElement('div');
        content.style.display = expandedId === p.id ? 'block' : 'none';

        // Mini stats
        const ms = document.createElement('div');
        ms.className = 'stats-row';
        ms.style.paddingTop = '0';
        ms.innerHTML = `
          <div class="stat-card"><div class="stat-val">${Fmt.currency(p.monto)}</div><div class="stat-lbl">Capital</div></div>
          <div class="stat-card"><div class="stat-val">${pagosHechos}/${p.plazo}</div><div class="stat-lbl">Pagos</div></div>
          <div class="stat-card"><div class="stat-val" style="${saldo > 0 ? 'color:var(--navy)' : 'color:var(--success)'}">${Fmt.currency(saldo)}</div><div class="stat-lbl">Saldo</div></div>`;
        content.appendChild(ms);

        // Botones acción
        const btns = document.createElement('div');
        btns.className = 'btn-row';
        btns.style.paddingTop = '0';

        if (p.estado === 'activo') {
          const btnPago = document.createElement('button');
          btnPago.className = 'btn btn-primary btn-sm';
          btnPago.innerHTML = '<i class="ti ti-plus"></i> Registrar pago';
          btnPago.onclick = () => App.navigate('registrarPago', p.id);
          btns.appendChild(btnPago);
        }

        const btnTabla = document.createElement('button');
        btnTabla.className = 'btn btn-secondary btn-sm';
        btnTabla.innerHTML = '<i class="ti ti-table"></i> Tabla';
        btnTabla.onclick = () => App.navigate('verTabla', p.id);
        btns.appendChild(btnTabla);

        const btnPagare = document.createElement('button');
        btnPagare.className = 'btn btn-secondary btn-sm';
        btnPagare.innerHTML = '<i class="ti ti-file-text"></i> Pagaré';
        btnPagare.onclick = () => PDF.generarPagare(p, cliente);
        btns.appendChild(btnPagare);
        content.appendChild(btns);

        // Historial pagos
        const histTitle = document.createElement('div');
        histTitle.className = 'section-title';
        histTitle.style.cssText = 'font-size:12px;padding-top:4px';
        histTitle.textContent = 'Historial de pagos';
        content.appendChild(histTitle);

        const hist = document.createElement('div');
        hist.className = 'payment-list';

        if (pagosLista.length === 0) {
          hist.innerHTML = `<div style="padding:12px 0;font-size:13px;color:var(--ink-soft);text-align:center">Sin pagos registrados aún</div>`;
        } else {
          [...pagosLista].reverse().forEach((pg, i) => {
            const row = document.createElement('div');
            row.className = 'pmt-row';

            const dot = document.createElement('div');
            dot.className = 'pmt-dot paid';

            const info = document.createElement('div');
            info.className = 'pmt-info';
            const dateEl = document.createElement('div');
            dateEl.className = 'pmt-date';
            dateEl.textContent = Fmt.date(pg.fecha);
            const noteEl = document.createElement('div');
            noteEl.className = 'pmt-note';
            noteEl.textContent = pg.metodo.charAt(0).toUpperCase()+pg.metodo.slice(1) + (pg.folio ? ' · '+pg.folio : '') + (pg.nota ? ' · '+pg.nota : '');
            if (pg.comprobanteUrl) {
              const compSpan = document.createElement('span');
              compSpan.style.color = 'var(--green)';
              compSpan.innerHTML = ' · <i class="ti ti-photo" style="font-size:11px"></i> Comprobante';
              noteEl.appendChild(compSpan);
            }
            info.appendChild(dateEl);
            info.appendChild(noteEl);

            const amt = document.createElement('div');
            amt.className = 'pmt-amount';
            amt.textContent = Fmt.currency(pg.monto);

            const btnRecibo = document.createElement('button');
            btnRecibo.style.cssText = 'background:none;border:none;cursor:pointer;padding:4px';
            btnRecibo.title = 'Ver comprobante';
            btnRecibo.innerHTML = '<i class="ti ti-receipt" style="font-size:16px;color:var(--navy)"></i>';
            btnRecibo.onclick = () => PDF.generarRecibo(pg, p, cliente, pagosLista.length - i);

            row.appendChild(dot);
            row.appendChild(info);
            row.appendChild(amt);
            row.appendChild(btnRecibo);
            hist.appendChild(row);
          });
        }
        content.appendChild(hist);
        secPrestamo.appendChild(content);

        // Toggle collapse
        hdr.addEventListener('click', () => {
          const isOpen = content.style.display !== 'none';
          body.querySelectorAll('[data-content]').forEach(c => { c.style.display = 'none'; });
          body.querySelectorAll('[data-chevron]').forEach(c => { c.className = 'ti ti-chevron-down'; c.style.cssText = 'font-size:16px;color:var(--ink-soft)'; });
          if (!isOpen) {
            content.style.display = 'block';
            expandedId = p.id;
            chevron.className = 'ti ti-chevron-up';
          } else {
            expandedId = null;
            chevron.className = 'ti ti-chevron-down';
          }
        });

        content.dataset.content = p.id;
        chevron.dataset.chevron = p.id;

        body.appendChild(secPrestamo);
      });
    }

    // Botón nuevo préstamo
    const btnNuevoPrestamo = document.createElement('div');
    btnNuevoPrestamo.style.padding = '12px 16px 16px';
    const btnNP = document.createElement('button');
    btnNP.className = 'btn btn-primary';
    btnNP.innerHTML = '<i class="ti ti-plus"></i> Nuevo préstamo para este cliente';
    btnNP.onclick = () => App.navigate('nuevoPrestamo', clienteId);
    btnNuevoPrestamo.appendChild(btnNP);
    body.appendChild(btnNuevoPrestamo);

    el.appendChild(body);
    return el;
  }
};
</script><script>const NuevoCliente = {
  render(clienteId) {
    const editing = clienteId ? Store.getCliente(clienteId) : null;
    const title = editing ? 'Editar cliente' : 'Nuevo cliente';
    const back = editing ? () => App.navigate('clienteDetalle', clienteId) : () => App.navigate('clientes');
    const e = (f) => editing?.[f] || '';

    let firmaDataUrl = editing?.firmaUrl || null;
    let ineUrl = editing?.fotoIneUrl || null;
    let domUrl = editing?.fotoDomicilioUrl || null;
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    const el = document.createElement('div');

    // Header
    const header = document.createElement('div');
    header.className = 'page-header';
    header.style.padding = '14px 20px 16px';
    header.innerHTML = `
      <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
      <div style="padding-left:36px"><h1>${title}</h1><p>Expediente del cliente</p></div>`;
    el.appendChild(header);
    el.querySelector('#back-btn').onclick = back;

    const body = document.createElement('div');
    body.style.paddingBottom = '80px';

    const form = document.createElement('div');
    form.className = 'form-body';
    form.innerHTML = `
      <div class="info-box"><i class="ti ti-info-circle"></i><span>Los campos con * son obligatorios.</span></div>

      <div style="font-size:11px;font-weight:700;color:var(--navy);letter-spacing:1px;padding:4px 0 2px">DATOS PERSONALES</div>
      <div class="field"><label>Nombre completo *</label>
        <input type="text" id="nombre" placeholder="Nombre y apellidos completos" value="${e('nombre')}"/>
      </div>
      <div class="field"><label>Teléfono / WhatsApp *</label>
        <input type="tel" id="telefono" placeholder="10 dígitos" value="${e('telefono')}" maxlength="10"/>
      </div>
      <div class="field"><label>Fecha de nacimiento *</label>
        <input type="date" id="fechaNacimiento" value="${e('fechaNacimiento')}"/>
      </div>
      <div class="field"><label>Número de INE (clave de elector)</label>
        <input type="text" id="ine" placeholder="Ej: GOPL850412MNLNRR04" value="${e('ine')}" style="text-transform:uppercase"/>
      </div>

      <div style="font-size:11px;font-weight:700;color:var(--navy);letter-spacing:1px;padding:8px 0 2px">DOMICILIO</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>Calle *</label><input type="text" id="calle" placeholder="Nombre de la calle" value="${e('calle')}"/></div>
        <div class="field"><label>Núm. exterior *</label><input type="text" id="numExt" placeholder="Ej: 12" value="${e('numExt')}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>Núm. interior</label><input type="text" id="numInt" placeholder="Opcional" value="${e('numInt')}"/></div>
        <div class="field"><label>Código postal</label><input type="text" id="cp" placeholder="Ej: 66050" value="${e('cp')}" maxlength="5"/></div>
      </div>
      <div class="field"><label>Colonia *</label><input type="text" id="colonia" placeholder="Nombre de la colonia" value="${e('colonia')}"/></div>
      <div class="field"><label>Ciudad / Municipio *</label><input type="text" id="ciudad" placeholder="Ej: García, N.L." value="${e('ciudad')}"/></div>

      <div style="font-size:11px;font-weight:700;color:var(--navy);letter-spacing:1px;padding:8px 0 2px">REFERENCIA PERSONAL</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>Nombre *</label><input type="text" id="refNombre" placeholder="Nombre completo" value="${e('refNombre')}"/></div>
        <div class="field"><label>Parentesco *</label><input type="text" id="refParentesco" placeholder="Ej: Madre" value="${e('refParentesco')}"/></div>
      </div>
      <div class="field"><label>Teléfono de referencia *</label>
        <input type="tel" id="refTelefono" placeholder="10 dígitos" value="${e('refTelefono')}" maxlength="10"/>
      </div>
      <div class="field"><label>Dirección de referencia (opcional)</label>
        <input type="text" id="refDireccion" value="${e('refDireccion')}"/>
      </div>

      <div style="font-size:11px;font-weight:700;color:var(--navy);letter-spacing:1px;padding:8px 0 2px">DOCUMENTOS</div>`;

    // Photo INE
    const zoneIne = document.createElement('div');
    zoneIne.className = 'field';
    zoneIne.innerHTML = `
      <label>Foto del INE</label>
      <div class="photo-zone" id="zone-ine"><i class="ti ti-id"></i>
        <div class="pz-label">Fotografiar o adjuntar INE</div>
        <input type="file" id="file-ine" accept="image/*"/>
      </div>
      <div id="prev-ine" style="display:none" class="photo-preview-box">
        <img id="img-ine" src="" alt="INE"/>
        <button class="photo-remove" id="rm-ine"><i class="ti ti-x"></i></button>
      </div>`;
    form.appendChild(zoneIne);

    // Photo domicilio
    const zoneDom = document.createElement('div');
    zoneDom.className = 'field';
    zoneDom.innerHTML = `
      <label>Comprobante de domicilio</label>
      <div class="photo-zone" id="zone-dom" style="background:var(--navy-light);border-color:var(--navy)">
        <i class="ti ti-home" style="color:var(--navy)"></i>
        <div class="pz-label" style="color:var(--navy)">Fotografiar comprobante</div>
        <input type="file" id="file-dom" accept="image/*"/>
      </div>
      <div id="prev-dom" style="display:none" class="photo-preview-box">
        <img id="img-dom" src="" alt="Domicilio"/>
        <button class="photo-remove" id="rm-dom"><i class="ti ti-x"></i></button>
      </div>`;
    form.appendChild(zoneDom);

    // Firma digital
    const firmaSection = document.createElement('div');
    firmaSection.className = 'field';
    firmaSection.innerHTML = `
      <label>Firma digital del cliente <span style="font-size:10px;color:var(--ink-soft);font-weight:400;text-transform:none">— firmar con el dedo</span></label>
      <div style="border:1.5px solid var(--sand-mid);border-radius:var(--r-lg);overflow:hidden;background:#fff;position:relative">
        <canvas id="firma-canvas" width="358" height="140" style="display:block;width:100%;touch-action:none;cursor:crosshair"></canvas>
        <div id="firma-placeholder" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
          <span style="font-size:12px;color:var(--ink-soft)">Firmar aquí con el dedo</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button class="btn btn-secondary btn-sm" id="clear-firma" style="font-size:11px">
          <i class="ti ti-eraser"></i> Borrar firma
        </button>
        <div id="firma-status" style="flex:1;display:flex;align-items:center;font-size:11px;color:var(--ink-soft)">Sin firma aún</div>
      </div>`;
    form.appendChild(firmaSection);

    // Save button
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.id = 'save-btn';
    saveBtn.innerHTML = `<i class="ti ti-check"></i> ${editing ? 'Guardar cambios' : 'Registrar cliente'}`;
    form.appendChild(saveBtn);

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn btn-secondary';
    cancelBtn.textContent = 'Cancelar';
    cancelBtn.onclick = back;
    form.appendChild(cancelBtn);

    body.appendChild(form);
    el.appendChild(body);

    // ── Setup photo handlers ──
    const setupPhoto = (fileId, zoneId, prevId, imgId, rmId, getUrl, setUrl) => {
      const zone = el.querySelector('#' + zoneId);
      const prev = el.querySelector('#' + prevId);
      const img  = el.querySelector('#' + imgId);
      const rm   = el.querySelector('#' + rmId);
      const file = el.querySelector('#' + fileId);
      zone.onclick = () => file.click();
      if (getUrl()) { img.src = getUrl(); prev.style.display = 'block'; zone.style.display = 'none'; }
      file.addEventListener('change', ev => {
        const f = ev.target.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = e => { setUrl(e.target.result); img.src = e.target.result; prev.style.display='block'; zone.style.display='none'; };
        reader.readAsDataURL(f);
      });
      rm.onclick = () => { setUrl(null); prev.style.display='none'; zone.style.display='block'; };
    };

    setupPhoto('file-ine','zone-ine','prev-ine','img-ine','rm-ine', ()=>ineUrl, v=>ineUrl=v);
    setupPhoto('file-dom','zone-dom','prev-dom','img-dom','rm-dom', ()=>domUrl, v=>domUrl=v);

    // ── Setup signature canvas ──
    setTimeout(() => {
      const canvas = el.querySelector('#firma-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const placeholder = el.querySelector('#firma-placeholder');
      const status = el.querySelector('#firma-status');
      let hasFirma = false;

      // If editing and has signature, draw it
      if (firmaDataUrl) {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0); };
        img.src = firmaDataUrl;
        placeholder.style.display = 'none';
        status.textContent = '✓ Firma guardada';
        status.style.color = 'var(--success)';
        hasFirma = true;
      }

      const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const src = e.touches ? e.touches[0] : e;
        return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
      };

      const startDraw = (e) => {
        e.preventDefault();
        isDrawing = true;
        const pos = getPos(e);
        lastX = pos.x; lastY = pos.y;
        placeholder.style.display = 'none';
      };
      const draw = (e) => {
        e.preventDefault();
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = '#1A2340';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        lastX = pos.x; lastY = pos.y;
        hasFirma = true;
        firmaDataUrl = canvas.toDataURL();
        status.textContent = '✓ Firma capturada';
        status.style.color = 'var(--success)';
      };
      const endDraw = () => { isDrawing = false; };

      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', endDraw);
      canvas.addEventListener('touchstart', startDraw, { passive: false });
      canvas.addEventListener('touchmove', draw, { passive: false });
      canvas.addEventListener('touchend', endDraw);

      el.querySelector('#clear-firma').onclick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        firmaDataUrl = null;
        hasFirma = false;
        placeholder.style.display = 'flex';
        status.textContent = 'Sin firma aún';
        status.style.color = 'var(--ink-soft)';
      };
    }, 100);

    // ── Save ──
    saveBtn.addEventListener('click', async () => {
      const nombre    = el.querySelector('#nombre').value.trim();
      const telefono  = el.querySelector('#telefono').value.trim();
      const fechaNac  = el.querySelector('#fechaNacimiento').value;
      const calle     = el.querySelector('#calle').value.trim();
      const numExt    = el.querySelector('#numExt').value.trim();
      const colonia   = el.querySelector('#colonia').value.trim();
      const ciudad    = el.querySelector('#ciudad').value.trim();
      const refNombre = el.querySelector('#refNombre').value.trim();
      const refPar    = el.querySelector('#refParentesco').value.trim();
      const refTel    = el.querySelector('#refTelefono').value.trim();

      if (!nombre || !telefono || !fechaNac) { Toast.error('Nombre, teléfono y fecha de nacimiento son obligatorios'); return; }
      if (!calle || !numExt || !colonia || !ciudad) { Toast.error('Completa el domicilio'); return; }
      if (!refNombre || !refPar || !refTel) { Toast.error('Completa la referencia personal'); return; }

      const data = {
        nombre, telefono, fechaNacimiento: fechaNac,
        ine: el.querySelector('#ine').value.trim().toUpperCase(),
        calle, numExt, numInt: el.querySelector('#numInt').value.trim(),
        colonia, cp: el.querySelector('#cp').value.trim(), ciudad,
        refNombre, refParentesco: refPar, refTelefono: refTel,
        refDireccion: el.querySelector('#refDireccion').value.trim(),
        fotoIneUrl: ineUrl, fotoDomicilioUrl: domUrl,
        firmaUrl: firmaDataUrl,
      };

      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

      try {
        if (editing) {
          await Store.updateCliente(clienteId, data);
          Toast.success('Cliente actualizado');
          App.navigate('clienteDetalle', clienteId);
        } else {
          const c = await Store.addCliente(data);
          Toast.success('Cliente registrado');
          App.navigate('clienteDetalle', c.id);
        }
      } catch(err) {
        Toast.error('Error al guardar');
        saveBtn.disabled = false;
        saveBtn.innerHTML = `<i class="ti ti-check"></i> ${editing ? 'Guardar cambios' : 'Registrar cliente'}`;
      }
    });

    return el;
  }
};

    excepcionWrap.innerHTML = `

          <span class="toggle-thumb"></span>
        </button>
      </div>`;

        <div class="method-chip active" data-frec="semanal"><i class="ti ti-calendar-week" style="font-size:13px"></i> Semanal</div>
        <div class="method-chip" data-frec="quincenal"><i class="ti ti-calendar" style="font-size:13px"></i> Quincenal</div>
      </div>`;
    body.appendChild(fFrec);

    const fPlazo = document.createElement('div');

    fPlazo.innerHTML = `

      <div id="plazo-grid"></div>
      <div id="plazo-badge" style="display:none;margin-top:6px;padding:8px 12px;background:var(--green-light);border-radius:var(--r-md);font-size:12px;color:var(--green-deep);font-weight:500"></div>`;

    // Fecha inicio
    const fFecha = document.createElement('div');
    fFecha.className = 'field';
    fFecha.innerHTML = `<label>Fecha de inicio</label><input type="date" id="fechaInicio" value="${Fmt.today()}"/>`;
    body.appendChild(fFecha);

    // Preview resumen
    const preview = document.createElement('div');
    preview.id = 'calc-preview';
    preview.style.cssText = 'display:none;background:var(--navy-light);border-radius:var(--r-lg);padding:16px';
    preview.innerHTML = `
      <div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px;letter-spacing:0.5px">RESUMEN DEL CRÉDITO</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--navy-mid)">Capital</span><span style="font-size:13px;font-weight:600;color:var(--navy)" id="prev-capital">—</span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--navy-mid)">Interés</span><span style="font-size:13px;font-weight:600;color:var(--navy)" id="prev-interes">—</span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--navy-mid)">Número de pagos</span><span style="font-size:13px;font-weight:600;color:var(--navy)" id="prev-pagos">—</span></div>
        <div style="height:0.5px;background:rgba(26,35,64,0.15)"></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--navy-mid)">Total a pagar</span><span style="font-size:17px;font-weight:700;color:var(--navy)" id="prev-total">—</span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--navy-mid)" id="prev-cuota-lbl">Pago por cuota</span><span style="font-size:17px;font-weight:700;color:var(--green-deep)" id="prev-cuota">—</span></div>
      </div>`;
    body.appendChild(preview);

    // Tabla
    const tablaWrap = document.createElement('div');
    tablaWrap.id = 'tabla-wrap';
    tablaWrap.style.display = 'none';
    tablaWrap.innerHTML = `
      <div style="font-size:12px;font-weight:600;color:var(--ink-mid);margin-bottom:8px">Tabla de pagos</div>
      <div class="amort-wrap">
        <table class="amort-table">
          <thead><tr><th>#</th><th>Fecha</th><th>Total</th><th>Capital</th><th>Interés</th></tr></thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>`;
    body.appendChild(tablaWrap);

    // Botón guardar
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.id = 'save-btn';
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="ti ti-cash"></i> Registrar préstamo';
    body.appendChild(saveBtn);

    el.appendChild(body);

    // ── State ──
    let plazoSeleccionado = 0;
    let frecuencia = 'semanal';
    let excepcionAutorizada = false;

    const getInteresPorPlazo = (plazo, frec) => {
      if (frec === 'semanal') {
        if (plazo <= 4) return 30;
        if (plazo <= 8) return 40;
        return 50;
      }
      return getInteresPorQuincenas(plazo);
    };

    const setExcepcion = (activa) => {
      excepcionAutorizada = activa;
      const toggle = el.querySelector('#excepcion-toggle');
      toggle.classList.toggle('on', activa);
      toggle.setAttribute('aria-pressed', String(activa));
    };

    const renderPlazos = () => {
      plazoSeleccionado = 0;
      const esSemanal = frecuencia === 'semanal';
      const opciones = esSemanal
        ? Array.from({ length: 12 }, (_, i) => i + 1)
        : Array.from({ length: 6 }, (_, i) => i + 1);
      const unidad = esSemanal ? 'semana' : 'quincena';
      const grid = el.querySelector('#plazo-grid');

      el.querySelector('#plazo-label').textContent = `Número de ${esSemanal ? 'semanas' : 'quincenas'} *`;
      el.querySelector('#plazo-badge').style.display = 'none';
      grid.style.cssText = `display:grid;grid-template-columns:repeat(${esSemanal ? 4 : 6},1fr);gap:8px`;
      grid.innerHTML = opciones.map(plazo => {
        const interes = getInteresPorPlazo(plazo, frecuencia);
        return `
          <button type="button" class="plazo-btn" data-plazo="${plazo}" style="
            padding:10px 4px;border-radius:var(--r-md);border:1.5px solid var(--sand-mid);
            background:var(--sand);font-size:13px;font-weight:600;color:var(--ink-mid);cursor:pointer;
            display:flex;flex-direction:column;align-items:center;gap:2px">
            <span>${plazo}</span>
            <span style="font-size:9px;font-weight:400">${interes}%</span>
          </button>`;
      }).join('');

      grid.querySelectorAll('.plazo-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          plazoSeleccionado = parseInt(btn.dataset.plazo, 10);
          grid.querySelectorAll('.plazo-btn').forEach(b => {
            b.style.background = 'var(--sand)';
            b.style.borderColor = 'var(--sand-mid)';
            b.style.color = 'var(--ink-mid)';
          });
          btn.style.background = 'var(--navy)';
          btn.style.borderColor = 'var(--navy)';
          btn.style.color = '#fff';

          const interes = getInteresPorPlazo(plazoSeleccionado, frecuencia);
          const badge = el.querySelector('#plazo-badge');
          badge.style.display = 'block';
          badge.textContent = `${plazoSeleccionado} ${unidad}${plazoSeleccionado > 1 ? 's' : ''} → ${interes}% de interés`;
          updateCalc();
        });
      });
    };

    // Límite al cambiar cliente
    el.querySelector('#cliente-sel').addEventListener('change', () => {
      const cId = el.querySelector('#cliente-sel').value;
      const c = Store.getCliente(cId);
      const hint = el.querySelector('#limite-hint');
      setExcepcion(false);
      excepcionWrap.style.display = 'none';
      if (c) {
        const limite = Store.getLimiteCliente(c);
        hint.style.color = 'var(--green)';
        hint.textContent = `Línea de crédito disponible: ${Fmt.currency(limite)}`;
      } else {
        hint.textContent = '';
      }
      updateCalc();
    });

    // Excepción al límite
    el.querySelector('#excepcion-toggle').addEventListener('click', () => {
      setExcepcion(!excepcionAutorizada);
      updateCalc();
    });

    // Frecuencia chips
    el.querySelectorAll('.method-chip[data-frec]').forEach(chip => {
      chip.addEventListener('click', () => {
        frecuencia = chip.dataset.frec;
        el.querySelectorAll('.method-chip[data-frec]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        renderPlazos();
        updateCalc();
      });
    });

    el.querySelector('#monto').addEventListener('input', updateCalc);
    el.querySelector('#fechaInicio').addEventListener('change', updateCalc);

    function updateCalc() {
      const monto = parseFloat(el.querySelector('#monto').value);
      const clienteId = el.querySelector('#cliente-sel').value;
      const fechaInicio = el.querySelector('#fechaInicio').value;
      const c = Store.getCliente(clienteId);
      let limitePermitido = true;

      // Verificar el límite y ofrecer la excepción solamente cuando sea necesaria
      if (c) {
        const limite = Store.getLimiteCliente(c);
        const hint = el.querySelector('#limite-hint');
        const excedeLimite = Number.isFinite(monto) && monto > limite;

        if (excedeLimite) {
          excepcionWrap.style.display = 'block';
          if (excepcionAutorizada) {
            hint.style.color = 'var(--warn)';
            hint.textContent = `Excepción autorizada · límite normal: ${Fmt.currency(limite)}`;
          } else {
            hint.style.color = 'var(--danger)';
            hint.textContent = `Excede el límite de ${Fmt.currency(limite)}`;
            limitePermitido = false;
          }
        } else {
          excepcionWrap.style.display = 'none';
          if (excepcionAutorizada) setExcepcion(false);
          hint.style.color = 'var(--green)';
          hint.textContent = `Línea disponible: ${Fmt.currency(limite)}`;
        }
      } else {
        excepcionWrap.style.display = 'none';
      }

      if (!monto || !plazoSeleccionado || monto < 100 || !limitePermitido) {
        preview.style.display = 'none';
        tablaWrap.style.display = 'none';
        saveBtn.disabled = true;
        return;
      }

      const interes = getInteresPorPlazo(plazoSeleccionado, frecuencia);
      const numPagos = plazoSeleccionado;
      const dias = getDiasFrecuencia(frecuencia);
      const { total, cuota } = Store.calcPrestamo(monto, interes, numPagos);
      const interesTotal = total - monto;
      const interesPorCuota = Math.round((interesTotal / numPagos) * 100) / 100;
      const capitalPorCuota = Math.round((monto / numPagos) * 100) / 100;
      const frecLabel = frecuencia === 'semanal' ? 'semanal' : 'quincenal';

      el.querySelector('#prev-capital').textContent = Fmt.currency(monto);
      el.querySelector('#prev-interes').textContent = `${Fmt.currency(interesTotal)} (${interes}%)`;
      el.querySelector('#prev-pagos').textContent = `${numPagos} pagos ${frecLabel}es`;
      el.querySelector('#prev-total').textContent = Fmt.currency(total);
      el.querySelector('#prev-cuota-lbl').textContent = `Pago ${frecLabel}`;
      el.querySelector('#prev-cuota').textContent = Fmt.currency(cuota);
      preview.style.display = 'block';

      // Tabla
      const tbody = el.querySelector('#tabla-body');
      tbody.innerHTML = '';
      let saldo = total;
      for (let i = 1; i <= numPagos; i++) {
        const fecha = new Date(fechaInicio + 'T00:00:00');
        fecha.setDate(fecha.getDate() + dias * i);
        saldo = Math.max(0, Math.round((saldo - cuota) * 100) / 100);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i}</td><td>${Fmt.date(fecha.toISOString().split('T')[0])}</td><td>${Fmt.currency(cuota)}</td><td>${Fmt.currency(capitalPorCuota)}</td><td>${Fmt.currency(interesPorCuota)}</td>`;
        tbody.appendChild(tr);
      }
      tablaWrap.style.display = 'block';
      saveBtn.disabled = !clienteId;
    }

    saveBtn.addEventListener('click', async () => {
      const clienteId = el.querySelector('#cliente-sel').value;
      const monto = parseFloat(el.querySelector('#monto').value);
      const fechaInicio = el.querySelector('#fechaInicio').value;
      const cliente = Store.getCliente(clienteId);

      if (!clienteId || !monto || !plazoSeleccionado) {
        Toast.error('Completa todos los campos');
        return;
      }

      const limite = cliente ? Store.getLimiteCliente(cliente) : 0;
      const excedeLimite = cliente && monto > limite;
      if (excedeLimite && !excepcionAutorizada) {
        Toast.error('Autoriza la excepción para superar el límite');
        return;
      }

      const interes = getInteresPorPlazo(plazoSeleccionado, frecuencia);
      const numPagos = plazoSeleccionado;
      const { total, cuota } = Store.calcPrestamo(monto, interes, numPagos);
      const datosPlazo = frecuencia === 'semanal'
        ? { semanas: plazoSeleccionado }
        : { quincenas: plazoSeleccionado };

      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';
      try {
        await Store.addPrestamo({
          clienteId,
          monto,
          interes,
          ...datosPlazo,
          unidadPlazo: frecuencia === 'semanal' ? 'semanas' : 'quincenas',
          plazo: numPagos,
          frecuencia,
          fechaInicio,
          totalConInteres: total,
          pagoCuota: cuota,
          excepcionLimite: Boolean(excedeLimite && excepcionAutorizada),
          limiteCreditoAlRegistrar: limite,
        });
        Toast.success('Préstamo registrado');
        App.navigate('clienteDetalle', clienteId);
      } catch(e) {
        Toast.error('Error al guardar');
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="ti ti-cash"></i> Registrar préstamo';
      }
    });

    renderPlazos();

    // Si se abrió desde el detalle de un cliente, muestra desde el inicio su línea disponible.
    if (preClienteId) {
      const c = Store.getCliente(preClienteId);
      if (c) {
        el.querySelector('#limite-hint').textContent = `Línea de crédito disponible: ${Fmt.currency(Store.getLimiteCliente(c))}`;
      }
    }

    return el;
  }
};
</script><script>const RegistrarPago = {

  render(prestamoId) {
    const prestamo = Store.getPrestamo(prestamoId);
    if (!prestamo) return App.navigate('clientes');
    const cliente = Store.getCliente(prestamo.clienteId);
    if (!cliente) return App.navigate('clientes');

    const saldo = Store.getSaldoRestante(prestamoId);
    const pagosHechos = Store.getPagosCount(prestamoId);
    const numCuota = pagosHechos + 1;

    const tabla = Store.getTableraAmortizacion(prestamo);
    const vencidas = tabla.filter(t => t.estado === 'vencido');
    const penalizacionTotal = vencidas.reduce((s, c) => s + Store.getPenalizacion(prestamo, c), 0);

    let metodo = 'transferencia';
    let comprobanteDataUrl = null;
    let notifWhatsApp = true;

    const el = document.createElement('div');

    // ── Header ──
    const header = document.createElement('div');
    header.className = 'page-header';
    header.style.padding = '14px 20px 16px';
    header.innerHTML = `
      <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
      <div style="padding-left:36px">
        <h1>Registrar pago</h1>
        <p>${cliente.nombre} · Cuota ${numCuota} de ${prestamo.plazo}</p>
      </div>`;
    el.appendChild(header);
    el.querySelector('#back-btn').onclick = () => App.navigate('clienteDetalle', prestamo.clienteId);

    // ── Scroll body ──
    const body = document.createElement('div');
    body.style.cssText = 'padding-bottom:80px;';

    // Monto card
    const montoCard = document.createElement('div');
    montoCard.style.cssText = 'margin:12px 16px;background:var(--success-light);border-radius:var(--r-lg);padding:14px;display:flex;justify-content:space-between;align-items:center';
    montoCard.innerHTML = `
      <div>
        <div style="font-size:11px;color:var(--success);font-weight:600;letter-spacing:0.5px">MONTO DE LA CUOTA</div>
        <div style="font-size:28px;font-weight:700;color:var(--success)">${Fmt.currency(prestamo.pagoCuota)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--success)">Saldo restante</div>
        <div style="font-size:15px;font-weight:700;color:var(--success)">${Fmt.currency(saldo)}</div>
      </div>`;
    body.appendChild(montoCard);

    // Penalización si hay
    if (penalizacionTotal > 0) {
      const penal = document.createElement('div');
      penal.style.cssText = 'margin:0 16px 8px';
      penal.innerHTML = `
        <div class="alert-pill">
          <i class="ti ti-alert-triangle" style="font-size:16px"></i>
          <span>Penalización acumulada: <strong>${Fmt.currency(penalizacionTotal)}</strong> (${vencidas.length} cuota${vencidas.length>1?'s':''} vencida${vencidas.length>1?'s':''})</span>
        </div>`;
      body.appendChild(penal);
    }

    // ── Formulario ──
    const form = document.createElement('div');
    form.className = 'form-body';

    // Fecha
    const fieldFecha = document.createElement('div');
    fieldFecha.className = 'field';
    fieldFecha.innerHTML = `<label>Fecha de pago</label><input type="date" id="fecha" value="${Fmt.today()}"/>`;
    form.appendChild(fieldFecha);

    // Método
    const fieldMetodo = document.createElement('div');
    fieldMetodo.className = 'field';
    fieldMetodo.innerHTML = `
      <label>Método de pago</label>
      <div class="method-row" id="method-row">
        <div class="method-chip active" data-met="transferencia"><i class="ti ti-building-bank" style="font-size:13px"></i> Transferencia</div>
        <div class="method-chip" data-met="efectivo"><i class="ti ti-cash" style="font-size:13px"></i> Efectivo</div>
        <div class="method-chip" data-met="codi"><i class="ti ti-device-mobile" style="font-size:13px"></i> CoDi</div>
      </div>`;
    form.appendChild(fieldMetodo);

    // Folio
    const fieldFolio = document.createElement('div');
    fieldFolio.className = 'field';
    fieldFolio.id = 'folio-field';
    fieldFolio.innerHTML = `<label>Folio / referencia</label><input type="text" id="folio" placeholder="Número de operación"/>`;
    form.appendChild(fieldFolio);

    // Comprobante
    const fieldComp = document.createElement('div');
    fieldComp.className = 'field';
    fieldComp.innerHTML = `
      <label>Comprobante <span style="font-size:10px;color:var(--ink-soft);font-weight:400;text-transform:none">— se adjunta al recibo y WhatsApp</span></label>
      <div class="photo-zone" id="photo-zone">
        <i class="ti ti-camera"></i>
        <div class="pz-label">Fotografiar o adjuntar comprobante</div>
        <div class="pz-sub">Recomendado para tu respaldo</div>
        <input type="file" id="comp-file" accept="image/*"/>
      </div>
      <div id="comp-preview" style="display:none" class="photo-preview-box">
        <img id="comp-img" src="" alt="Comprobante"/>
        <button class="photo-remove" id="remove-comp"><i class="ti ti-x"></i></button>
      </div>`;
    form.appendChild(fieldComp);

    // Nota
    const fieldNota = document.createElement('div');
    fieldNota.className = 'field';
    fieldNota.innerHTML = `<label>Nota (opcional)</label><textarea id="nota" placeholder="Ej: pago en mano, abono parcial..."></textarea>`;
    form.appendChild(fieldNota);

    body.appendChild(form);

    // WhatsApp toggle
    const toggle = document.createElement('div');
    toggle.className = 'toggle-wrap';
    toggle.innerHTML = `
      <span class="toggle-label"><i class="ti ti-brand-whatsapp" style="font-size:16px;vertical-align:-3px;color:#25D366"></i> Notificar al cliente por WhatsApp</span>
      <button class="toggle on" id="notif-toggle"><div class="toggle-thumb"></div></button>`;
    body.appendChild(toggle);

    // Botones
    const btns = document.createElement('div');
    btns.style.cssText = 'padding:16px;display:flex;flex-direction:column;gap:8px';
    btns.innerHTML = `
      <button class="btn btn-success" id="save-btn"><i class="ti ti-check"></i> Confirmar y guardar pago</button>
      <button class="btn btn-secondary" id="cancel-btn">Cancelar</button>`;
    body.appendChild(btns);

    el.appendChild(body);

    // ── Event listeners ──
    el.querySelector('#cancel-btn').onclick = () => App.navigate('clienteDetalle', prestamo.clienteId);

    // Método chips
    el.querySelectorAll('.method-chip[data-met]').forEach(chip => {
      chip.addEventListener('click', () => {
        metodo = chip.dataset.met;
        el.querySelectorAll('.method-chip[data-met]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        el.querySelector('#folio-field').style.display = metodo === 'efectivo' ? 'none' : 'flex';
      });
    });

    // Foto comprobante
    const photoZone = el.querySelector('#photo-zone');
    const compFile  = el.querySelector('#comp-file');
    const compPrev  = el.querySelector('#comp-preview');
    const compImg   = el.querySelector('#comp-img');

    photoZone.onclick = () => compFile.click();
    compFile.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        comprobanteDataUrl = ev.target.result;
        compImg.src = comprobanteDataUrl;
        compPrev.style.display = 'block';
        photoZone.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
    el.querySelector('#remove-comp').onclick = () => {
      comprobanteDataUrl = null;
      compPrev.style.display = 'none';
      photoZone.style.display = 'block';
    };

    // Toggle WhatsApp
    const notifBtn = el.querySelector('#notif-toggle');
    notifBtn.onclick = () => {
      notifWhatsApp = !notifWhatsApp;
      notifBtn.classList.toggle('on', notifWhatsApp);
    };

    // Guardar pago
    el.querySelector('#save-btn').addEventListener('click', async () => {
      const fecha = el.querySelector('#fecha').value;
      if (!fecha) { Toast.error('Selecciona la fecha del pago'); return; }
      const folio = el.querySelector('#folio').value.trim();
      const nota  = el.querySelector('#nota').value.trim();

      const saveBtn = el.querySelector('#save-btn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

      try {
        await Store.addPago({
          prestamoId,
          monto: prestamo.pagoCuota,
          fecha, metodo, folio, nota,
          comprobanteUrl: comprobanteDataUrl,
          numCuota,
        });

        const nuevoSaldo = Store.getSaldoRestante(prestamoId);
        Toast.success('Pago registrado correctamente');

        if (notifWhatsApp && cliente.telefono) {
          const nombre = cliente.nombre.split(' ')[0];
          const metodoLabel = { transferencia: 'Transferencia bancaria', efectivo: 'Efectivo', codi: 'CoDi' }[metodo] || metodo;
          const folioTexto = folio ? '\nReferencia: ' + folio : '';
          const pagosAhora = Store.getPagosCount(prestamoId);
          const saldoTexto = nuevoSaldo > 0
            ? 'Tu saldo restante es de *' + Fmt.currency(nuevoSaldo) + '* (' + pagosAhora + ' de ' + prestamo.plazo + ' pagos completados).'
            : '✅ *¡Felicidades! Tu préstamo ha sido liquidado en su totalidad.* Muchas gracias por tu puntualidad.';

          const msg = 'Hola *' + nombre + '* 👋\n\nTe confirmamos tu pago recibido 🪙\n\n'
            + '✅ *Monto:* ' + Fmt.currency(prestamo.pagoCuota) + '\n'
            + '📅 *Fecha:* ' + Fmt.date(fecha) + '\n'
            + '💳 *Método:* ' + metodoLabel + folioTexto + '\n\n'
            + saldoTexto + '\n\n'
            + (comprobanteDataUrl ? '🧾 Adjuntamos tu comprobante de pago.\n\n' : '')
            + 'Cualquier duda, con gusto te atendemos 😊\n\n'
            + '*Varito* · Tu dinerito, siempre a la mano';

          setTimeout(() => window.open('https://wa.me/52' + cliente.telefono + '?text=' + encodeURIComponent(msg), '_blank'), 400);
        }

        App.navigate('clienteDetalle', prestamo.clienteId);
      } catch(err) {
        console.error(err);
        Toast.error('Error al guardar. Intenta de nuevo.');
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="ti ti-check"></i> Confirmar y guardar pago';
      }
    });

    return el;
  }
};
